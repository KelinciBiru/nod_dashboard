<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Warehouse Pulogadung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body class="font-sans text-gray-800 bg-gray-50">

    <!-- =====================================================================
         MODAL ALERT (mengganti browser alert)
    ====================================================================== -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/40 z-[99999] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center transform transition-all">
            <div id="modal-icon" class="text-5xl mb-3"></div>
            <h3 id="modal-title" class="text-lg font-bold text-gray-800 mb-1"></h3>
            <p id="modal-message" class="text-sm text-gray-500 mb-5"></p>
            <button onclick="closeModal()" class="w-full py-2 rounded-xl font-bold text-white transition"
                id="modal-btn">OK</button>
        </div>
    </div>

    <!-- =====================================================================
         MODAL KONFIRMASI (mengganti browser confirm)
    ====================================================================== -->
    <div id="confirm-overlay" class="hidden fixed inset-0 bg-black/40 z-[99999] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
            <div class="text-5xl mb-3">⚠️</div>
            <h3 id="confirm-title" class="text-lg font-bold text-gray-800 mb-1"></h3>
            <p id="confirm-message" class="text-sm text-gray-500 mb-5"></p>
            <div class="flex gap-3">
                <button onclick="confirmResolve(false)"
                    class="flex-1 py-2 rounded-xl font-bold border border-gray-300 text-gray-600 hover:bg-gray-50 transition">
                    Batal
                </button>
                <button onclick="confirmResolve(true)"
                    class="flex-1 py-2 rounded-xl font-bold text-white bg-red-500 hover:bg-red-600 transition">
                    Ya, Lanjutkan
                </button>
            </div>
        </div>
    </div>

    <!-- =====================================================================
         HALAMAN LOGIN
    ====================================================================== -->
    <div id="login-page" class="fixed inset-0 flex items-center justify-center bg-gray-100 z-[9999]">
        <div class="bg-white p-8 rounded-lg shadow-xl w-80 text-center border border-gray-100">
            <div class="flex flex-col items-center mb-4">
                <img src="https://lh3.googleusercontent.com/d/1sy4WhFoKJnGlgFw9j_tnMcNWCxWSA48N" alt="Logo"
                    class="h-20 w-auto max-w-full object-contain mb-2" style="image-rendering:auto;">
            </div>
            <h2 class="text-xl font-bold mb-4 text-gray-700">Login</h2>
            <input type="password" id="passwordInput" onkeydown="if(event.key==='Enter') checkLogin()"
                class="w-full p-2 border border-gray-300 rounded mb-4 focus:ring-2 focus:ring-amber-500 outline-none"
                placeholder="Masukkan Password">
            <button onclick="checkLogin()" style="background-color: #14141e;"
                class="w-full text-white py-2 rounded-full font-bold hover:opacity-90 transition">
                Masuk
            </button>
            <p id="loginError" class="text-red-500 text-sm mt-2 hidden">Password Salah!</p>
        </div>
    </div>

    <!-- =====================================================================
         APP CONTAINER
    ====================================================================== -->
    <div id="app-container" class="hidden h-screen flex-col overflow-hidden">

        <!-- TOPBAR (selalu tampil di atas) -->
        <header
            class="flex-shrink-0 bg-white border-b border-gray-200 px-4 h-14 flex items-center justify-between z-30 shadow-sm">
            <!-- Kiri: tombol toggle sidebar + nama halaman -->
            <div class="flex items-center gap-3">
                <button id="sidebar-toggle" onclick="toggleSidebar()"
                    class="p-2 rounded-lg hover:bg-gray-100 text-gray-600 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <span class="font-bold text-gray-700 text-sm md:text-base" id="page-title">Dashboard</span>
            </div>
            <!-- Kanan: role badge + logout -->
            <div class="flex items-center gap-3">
                <span id="user-role-badge"
                    class="hidden md:inline-block text-xs font-semibold px-3 py-1 rounded-full bg-amber-100 text-amber-700">
                </span>
                <button onclick="logout()"
                    class="flex items-center gap-1.5 text-sm font-semibold text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1.5 rounded-lg border border-red-200 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1" />
                    </svg>
                    <span class="hidden sm:inline">Logout</span>
                </button>
            </div>
        </header>

        <!-- BODY: sidebar + konten -->
        <div class="flex flex-1 overflow-hidden relative">

            <!-- OVERLAY (klik untuk tutup sidebar di mobile) -->
            <div id="sidebar-overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black/30 z-20 md:hidden">
            </div>

            <!-- SIDEBAR (slide in/out) -->
            <aside id="sidebar" class="absolute md:relative z-30 flex flex-col h-full bg-white border-r border-gray-100 shadow-xl md:shadow-none
                       transition-all duration-300 ease-in-out
                       -translate-x-full md:translate-x-0 w-64 flex-shrink-0">

                <!-- Logo -->
                <div class="p-5 border-b border-gray-100 flex items-center gap-3">
                    <img src="https://lh3.googleusercontent.com/d/1sy4WhFoKJnGlgFw9j_tnMcNWCxWSA48N" alt="Logo"
                        class="h-10 w-auto">
                    <div>
                        <p class="font-bold text-gray-800 text-sm leading-tight">Warehouse</p>
                        <p class="text-amber-500 font-semibold text-xs">Pulogadung</p>
                    </div>
                </div>

                <!-- Nav items -->
                <nav class="flex-1 overflow-y-auto p-3 space-y-1">

                    <!-- Dashboard -->
                    <button onclick="navTo('Dashboard')"
                        class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-700 hover:bg-amber-50 hover:text-amber-600 font-semibold text-sm transition">
                        <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                        </svg>
                        Dashboard
                    </button>

                    <!-- Inventory Machine -->
                    <div id="menu-inventory">
                        <button onclick="toggleSubMenu('inventory-sub','arrow-inventory')"
                            class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-gray-700 hover:bg-amber-50 hover:text-amber-600 font-semibold text-sm transition">
                            <div class="flex items-center gap-3">
                                <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                                </svg>
                                <span>Inventory Machine</span>
                            </div>
                            <span id="arrow-inventory" class="text-xs transition-transform duration-200">▼</span>
                        </button>
                        <div id="inventory-sub" class="hidden ml-7 mt-1 space-y-0.5 border-l-2 border-amber-100 pl-3">
                            <button onclick="navTo('Stock Master')"
                                class="sub-item w-full text-left px-2 py-2 text-sm text-gray-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition">Stock
                                Master</button>
                            <button onclick="navTo('Report Inventory')"
                                class="sub-item w-full text-left px-2 py-2 text-sm text-gray-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition">Report</button>
                        </div>
                    </div>

                    <!-- Plan Task -->
                    <div id="menu-plan-task">
                        <button onclick="toggleSubMenu('plan-task-sub','arrow-plan')"
                            class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-gray-700 hover:bg-amber-50 hover:text-amber-600 font-semibold text-sm transition">
                            <div class="flex items-center gap-3">
                                <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                                </svg>
                                <span>Plan Task</span>
                            </div>
                            <span id="arrow-plan" class="text-xs">▼</span>
                        </button>
                        <div id="plan-task-sub" class="hidden ml-7 mt-1 space-y-0.5 border-l-2 border-amber-100 pl-3">
                            <button onclick="navTo('Plan Task')"
                                class="sub-item w-full text-left px-2 py-2 text-sm text-gray-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition">Plan
                                Task</button>
                            <button onclick="navTo('Report KPI')"
                                class="sub-item w-full text-left px-2 py-2 text-sm text-gray-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition">Report
                                KPI</button>
                        </div>
                    </div>

                    <!-- Maintenance -->
                    <div id="menu-maintenance">
                        <button onclick="toggleSubMenu('maintenance-sub','arrow-maintenance')"
                            class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-gray-700 hover:bg-amber-50 hover:text-amber-600 font-semibold text-sm transition">
                            <div class="flex items-center gap-3">
                                <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                                <span>Maintenance</span>
                            </div>
                            <span id="arrow-maintenance" class="text-xs">▼</span>
                        </button>
                        <div id="maintenance-sub" class="hidden ml-7 mt-1 space-y-0.5 border-l-2 border-amber-100 pl-3">
                            <button onclick="navTo('Report Maintenance')"
                                class="sub-item w-full text-left px-2 py-2 text-sm text-gray-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition">Report
                                Maintenance</button>
                        </div>
                    </div>

                    <!-- Purchase Order -->
                    <div id="menu-po">
                        <button onclick="toggleSubMenu('po-sub','arrow-po')"
                            class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-gray-700 hover:bg-amber-50 hover:text-amber-600 font-semibold text-sm transition">
                            <div class="flex items-center gap-3">
                                <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                                <span>Purchase Order</span>
                            </div>
                            <span id="arrow-po" class="text-xs">▼</span>
                        </button>
                        <div id="po-sub" class="hidden ml-7 mt-1 space-y-0.5 border-l-2 border-amber-100 pl-3">
                            <button onclick="navTo('Purchase Order')"
                                class="sub-item w-full text-left px-2 py-2 text-sm text-gray-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition">Form
                                PO</button>
                            <button onclick="navTo('Report Status')"
                                class="sub-item w-full text-left px-2 py-2 text-sm text-gray-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition">Report
                                Status</button>
                        </div>
                    </div>

                    <!-- [TAMBAH MENU BARU DI SINI] -->
                    <!-- Process PO Baru -->
                    <button id="menu-process-po" onclick="navTo('Process PO')"
                        class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-700 hover:bg-amber-50 hover:text-amber-600 font-semibold text-sm transition">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        Process PO
                    </button>

                </nav>

                <!-- Footer sidebar: role info -->
                <div class="p-4 border-t border-gray-100">
                    <div class="flex items-center gap-2 px-2 py-2 rounded-xl bg-gray-50">
                        <div class="w-7 h-7 rounded-full bg-amber-500 flex items-center justify-center flex-shrink-0">
                            <svg class="h-3.5 w-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <div class="overflow-hidden">
                            <p id="user-role-label" class="text-xs font-semibold text-gray-700 truncate"></p>
                            <p class="text-[10px] text-gray-400">Warehouse Pulogadung</p>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- AREA KONTEN UTAMA -->
            <main id="content-area" class="flex-1 p-4 md:p-8 overflow-y-auto bg-gray-50">
                <h1 class="text-3xl font-semibold text-gray-700">Dashboard</h1>
            </main>
        </div>
    </div>

    <script>
        // =========================================================================
        // STATE GLOBAL
        // =========================================================================
        let currentUserRole = '';

        // =========================================================================
        // KONFIGURASI URL API
        // =========================================================================
        const PO_GAS_URL = 'https://script.google.com/macros/s/AKfycbyQHyCGhXLOHGGVJbWh_boZrijju4WYR3MflQQTTlaVVRl_Q0qIVaeh7Fao3JVcRD_n/exec';

        const API_URLS = {
            stockMaster: 'https://script.google.com/macros/s/AKfycbw_dT47dMFwtwM0qTmyOQemxzmrUYccmCwglqhFI8haRTGRmNJc98b_t1fBXxaylrUn/exec',
            reportInventory: 'https://script.google.com/macros/s/AKfycbyrXKkSEcXq01x5RVnS0Ys9d5pIYELsfM8VbUOOCj1qPO4WpqIpHuowq0xZOZ2lUOkyrQ/exec',
            planTask: 'https://script.google.com/macros/s/AKfycbzbCPzwQoMmnp0uKlVIYRdozphCJC7Yrb01SJNebZoOZmKkCvofBw8D3vndo9T1iB3rOg/exec',
            reportKPI: 'https://script.google.com/macros/s/AKfycbwrKz5dFywZ1WzfWyA6JmF_dh1GfKiZQWT6p1aUQDGAftrkNrTCMwV0hpZQczYHpeD1DA/exec',
            reportMaintenance: 'https://script.google.com/macros/s/AKfycbzlEFCiljPTTBlnpzhu26s9WK03JLScJKcLaJkMWYqSGhVeW0GBI9WeW0-t1Wov46WT/exec',
            purchaseOrder: PO_GAS_URL,
            reportStatus: PO_GAS_URL,
        };

        // =========================================================================
        // LOGIN
        // =========================================================================
        function checkLogin() {
            const pass = document.getElementById('passwordInput').value;
            const error = document.getElementById('loginError');

            if (pass === 'admin123') {
                currentUserRole = 'ADMIN';
                startApp();
            } else if (pass === 'staff123') {
                currentUserRole = 'PO_User';
                startApp();
            } else if (pass === 'warehouse123') {
                currentUserRole = 'WAREHOUSE';
                startApp();
            } else {
                error.classList.remove('hidden');
                return;
            }
            error.classList.add('hidden');
        }

        /** Tampilkan app sesuai role setelah login berhasil */
        function startApp() {
            document.getElementById('login-page').classList.add('hidden');

            const app = document.getElementById('app-container');
            app.classList.remove('hidden');
            app.classList.add('flex');

            // Update label role di sidebar footer dan topbar badge
            const roleLabel = document.getElementById('user-role-label');
            const roleBadge = document.getElementById('user-role-badge');
            if (currentUserRole === 'ADMIN') {
                if (roleLabel) roleLabel.textContent = 'Administrator';
                if (roleBadge) { roleBadge.textContent = 'Admin'; roleBadge.classList.remove('hidden'); }
            } else if (currentUserRole === 'WAREHOUSE') {
                if (roleLabel) roleLabel.textContent = 'Team Warehouse';
                if (roleBadge) { roleBadge.textContent = 'Warehouse'; roleBadge.classList.remove('hidden'); }
            } else {
                if (roleLabel) roleLabel.textContent = 'PO User';
                if (roleBadge) { roleBadge.textContent = 'PO User'; roleBadge.classList.remove('hidden'); }
            }

            // Sidebar di desktop: tampil default terbuka
            if (window.innerWidth >= 768) {
                document.getElementById('sidebar').classList.remove('-translate-x-full');
                sidebarOpen = false; // di desktop tidak pakai overlay
            }

            if (currentUserRole === 'PO_User') {
                // Staff: hanya bisa akses Purchase Order, Process PO TERSEMBUNYI
                document.getElementById('menu-inventory').classList.add('hidden');
                document.getElementById('menu-plan-task').classList.add('hidden');
                document.getElementById('menu-maintenance').classList.add('hidden');
                document.getElementById('menu-process-po').classList.add('hidden');
                // Buka PO submenu otomatis
                document.getElementById('po-sub').classList.remove('hidden');
                document.getElementById('arrow-po').textContent = '▲';
                navTo('Purchase Order');
            } else if (currentUserRole === 'WAREHOUSE') {
                // Team Warehouse: hanya tampilkan menu Process PO
                document.getElementById('menu-inventory').classList.add('hidden');
                document.getElementById('menu-plan-task').classList.add('hidden');
                document.getElementById('menu-maintenance').classList.add('hidden');
                document.getElementById('menu-po').classList.add('hidden');
                document.getElementById('menu-process-po').classList.remove('hidden');
                navTo('Process PO');
            } else {
                // ADMIN: semua menu tampil termasuk Process PO
                document.getElementById('menu-process-po').classList.remove('hidden');
                navTo('Dashboard');
            }
        }

        /** Logout: reset state dan kembali ke halaman login */
        function logout() {
            if (!confirm('Yakin ingin logout?')) return;

            // Reset role
            currentUserRole = '';

            // Reset form password
            document.getElementById('passwordInput').value = '';
            document.getElementById('loginError').classList.add('hidden');

            // Sembunyikan app, tampilkan login
            const app = document.getElementById('app-container');
            app.classList.add('hidden');
            app.classList.remove('flex');
            document.getElementById('login-page').classList.remove('hidden');

            // Reset visibilitas menu
            document.getElementById('menu-inventory').classList.remove('hidden');
            document.getElementById('menu-plan-task').classList.remove('hidden');
            document.getElementById('menu-maintenance').classList.remove('hidden');
            document.getElementById('menu-po').classList.remove('hidden');
            document.getElementById('menu-process-po').classList.remove('hidden');

            // Reset badge dan label role
            const roleBadge = document.getElementById('user-role-badge');
            if (roleBadge) roleBadge.classList.add('hidden');
            document.getElementById('page-title').textContent = 'Dashboard';

            // Reset sidebar ke posisi tertutup (mobile)
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.add('hidden');
            sidebarOpen = false;

            // Reset po-sub
            document.getElementById('po-sub').classList.add('hidden');
            document.getElementById('arrow-po').textContent = '▼';

            // Reset konten area
            document.getElementById('content-area').innerHTML =
                '<h1 class="text-3xl font-semibold text-gray-700">Dashboard</h1>';
        }

        // =========================================================================
        // UTILITAS UI
        // =========================================================================
        function setLoading(message = 'Memuat data...') {
            document.getElementById('content-area').innerHTML = `
            <div class="flex flex-col items-center justify-center h-64 gap-4">
                <div class="w-10 h-10 border-4 border-amber-200 border-t-amber-500 rounded-full animate-spin"></div>
                <p class="text-gray-500 text-sm">${message}</p>
            </div>`;
        }

        function setError(message) {
            document.getElementById('content-area').innerHTML =
                `<div class="flex flex-col items-center justify-center h-64 gap-3">
                <div class="text-4xl">❌</div>
                <p class="text-red-500 font-semibold">Terjadi Kesalahan</p>
                <p class="text-gray-400 text-sm text-center max-w-xs">${message}</p>
            </div>`;
        }

        // =========================================================================
        // MODAL ALERT & CONFIRM (pengganti browser alert/confirm)
        // =========================================================================
        function showAlert(type, title, message) {
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            const colors = {
                success: 'bg-green-500 hover:bg-green-600',
                error: 'bg-red-500 hover:bg-red-600',
                info: 'bg-blue-500 hover:bg-blue-600',
                warning: 'bg-amber-500 hover:bg-amber-600',
            };
            document.getElementById('modal-icon').textContent = icons[type] || icons.info;
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('modal-btn').className =
                `w-full py-2 rounded-xl font-bold text-white transition ${colors[type] || colors.info}`;
            document.getElementById('modal-overlay').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
        }

        // Menutup modal jika klik di luar kotak
        document.getElementById('modal-overlay').addEventListener('click', function (e) {
            if (e.target === this) closeModal();

        let confirmResolve = null;
        function showConfirm(title, message) {
            return new Promise(resolve => {
                document.getElementById('confirm-title').textContent = title;
                document.getElementById('confirm-message').textContent = message;
                document.getElementById('confirm-overlay').classList.remove('hidden');
                confirmResolve = (result) => {
                    document.getElementById('confirm-overlay').classList.add('hidden');
                    resolve(result);
                };
            });

        // =========================================================================
        // SIDEBAR TOGGLE
        // =========================================================================
        let sidebarOpen = false;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebarOpen = !sidebarOpen;

            if (sidebarOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        // Tutup sidebar saat resize ke desktop
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768 && sidebarOpen) {
                document.getElementById('sidebar-overlay').classList.add('hidden');
            }
        });

        function toggleSubMenu(menuId, arrowId) {
            const subMenu = document.getElementById(menuId);
            const arrow = document.getElementById(arrowId);
            subMenu.classList.toggle('hidden');
            arrow.textContent = subMenu.classList.contains('hidden') ? '▼' : '▲';
        }

        /** Highlight nav item yang aktif */
        function setActiveNav(pageName) {
            document.querySelectorAll('.nav-item, .sub-item').forEach(el => {
                el.classList.remove('bg-amber-500', 'text-white', 'font-bold');
                el.classList.add('text-gray-700');
            });
            const all = document.querySelectorAll('.nav-item, .sub-item');
            all.forEach(el => {
                if (el.textContent.trim() === pageName ||
                    (pageName === 'Purchase Order' && el.textContent.trim() === 'Form PO') ||
                    (pageName === 'Dashboard' && el.textContent.trim() === 'Dashboard')) {
                    el.classList.add('bg-amber-500', 'text-white', 'font-bold');
                    el.classList.remove('text-gray-700', 'text-gray-500');
                }
            });
        }

        // HALAMAN: PLAN TASK
        // =========================================================================
        async function showPlanTask() {
            setLoading();
            const contentArea = document.getElementById('content-area');
            try {
                const response = await fetch(API_URLS.planTask);
                const data = await response.json();
                const taskData = data.slice(1).filter(row =>
                    row[0] && !row[0].toString().includes('Tidak ada tugas aktif') && row[0] !== ''
                );

                if (taskData.length === 0) {
                    contentArea.innerHTML = `
                    <h1 class="text-3xl font-semibold text-gray-700 mb-6">Plan Task</h1>
                    <div class="flex flex-col items-center justify-center h-64 bg-white rounded-lg border border-gray-300 shadow-sm">
                        <p class="text-4xl mb-4">✅</p>
                        <p class="text-xl font-bold text-gray-600">Task Clear</p>
                        <p class="text-gray-400">Tidak ada tugas yang perlu dikerjakan saat ini.</p>
                    </div>`;
                    return;
                }

                function formatDeadline(cell) {
                    const raw = String(cell).trim();
                    if (!raw.includes('T')) return raw;
                    const date = new Date(raw.split('T')[0]);
                    date.setDate(date.getDate() + 1);
                    const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
                    return `${String(date.getDate()).padStart(2, '0')}-${months[date.getMonth()]}-${date.getFullYear()}`;
                }

                let rows_html = '';
                taskData.forEach(row => {
                    rows_html += '<tr class="hover:bg-gray-50 text-xs">';
                    row.forEach((cell, index) => {
                        let value = String(cell || '-').trim();
                        if (index === 0 || index === 2) {
                            value = value.split('\n').map(t => t.replace(/^- /, '').trim()).filter(t => t !== '').join('<br>');
                        } else if (index === 1) {
                            value = formatDeadline(cell);
                        } else if (index === 4) {
                            const statuses = value.split('\n').map(s => s.replace(/^- /, '').trim()).filter(s => s !== '' && s !== '-');
                            value = [...new Set(statuses)].join('<br>');
                        }
                        const extra = index === 1 ? 'whitespace-nowrap' : '';
                        rows_html += `<td class="p-3 border-r border-gray-200 text-center ${extra}">${value}</td>`;
                    });
                    rows_html += '</tr>';
                });

                contentArea.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-semibold text-gray-700">Task</h1>
                    <button id="shareBtn" onclick="shareToWhatsApp()"
                        class="bg-gray-700 text-white px-4 py-2 rounded-lg font-bold hover:bg-gray-800 shadow-md text-sm">
                        Share to WhatsApp
                    </button>
                </div>
                <div id="captureArea" class="bg-white p-8 border border-gray-200">
                    <h1 class="text-3xl font-semibold text-gray-700 mb-6">Plan Task</h1>
                    <div class="rounded-lg shadow-sm border border-gray-300 overflow-hidden">
                        <table class="w-full border-collapse">
                            <thead>
                                <tr class="bg-gray-100 border-b border-gray-300 text-gray-700 text-xs">
                                    ${data[0].map(h => `<th class="p-3 text-center border-r">${h}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody class="text-gray-600 divide-y divide-gray-200">${rows_html}</tbody>
                        </table>
                    </div>
                </div>`;
            } catch (err) { setError(err.message); }
        }

        // =========================================================================
        // HALAMAN: REPORT KPI
        // =========================================================================
        async function showReportKPI() {
            setLoading('Memuat data KPI...');
            const contentArea = document.getElementById('content-area');
            try {
                const response = await fetch(API_URLS.reportKPI);
                const data = await response.json();

                function renderTable(title, startRow, endRow, colStart, colEnd) {
                    const activeCols = [];
                    for (let j = colStart; j <= colEnd; j++) {
                        const hasData = Array.from({ length: endRow - startRow }, (_, k) => startRow + 1 + k)
                            .some(i => { const cell = data[i]?.[j]; return cell !== '' && cell !== '-' && cell != null; });
                        if (hasData || j === colStart) activeCols.push(j);
                    }
                    let html = `
                    <h2 class="text-sm font-bold text-gray-700 mt-8 mb-3">${title}</h2>
                    <div class="overflow-x-auto bg-white shadow-sm border border-gray-200 rounded-lg">
                        <table class="w-full text-xs border-collapse">
                            <thead><tr class="bg-gray-800 text-white">
                                ${activeCols.map(j => `<th class="p-3 border-r border-gray-600 text-center">${data[startRow][j] || ''}</th>`).join('')}
                            </tr></thead>
                            <tbody class="divide-y divide-gray-200">`;
                    for (let i = startRow + 1; i <= endRow; i++) {
                        if (!data[i]) continue;
                        const rowData = activeCols.map(j => data[i][j]);
                        const isRowEmpty = rowData.slice(1).every(c => !c || c === '-' || c === '');
                        if (isRowEmpty) continue;
                        const isTotal = String(data[i][colStart]).toLowerCase().includes('total');
                        html += `<tr class="${isTotal ? 'bg-amber-100 font-bold' : 'hover:bg-gray-50'}">`;
                        activeCols.forEach(j => {
                            const cell = data[i][j];
                            html += `<td class="p-3 border-r text-center">${(cell === '' || cell == null) ? '-' : cell}</td>`;
                        });
                        html += '</tr>';
                    }
                    html += '</tbody></table></div>';
                    return html;
                }

                function renderProductivityTable(title, startRow, endRow) {
                    const VALID_NAMES = ["Rizal", "Adam", "Helmi", "Raka"];
                    let html = `
                    <h2 class="text-sm font-bold text-gray-700 mt-8 mb-3">${title}</h2>
                    <div class="overflow-x-auto bg-white shadow-sm border border-gray-200 rounded-lg">
                        <table class="w-full text-xs border-collapse">
                            <thead><tr class="bg-gray-800 text-white">
                                <th class="p-3 border-r border-gray-600 text-center">Nama</th>
                                <th class="p-3 border-r border-gray-600 text-center">Loading</th>
                                <th class="p-3 border-r border-gray-600 text-center">Prepare</th>
                                <th class="p-3 border-r border-gray-600 text-center">Support</th>
                                <th class="p-3 border-r border-gray-600 text-center">Perapihan</th>
                            </tr></thead>
                            <tbody class="divide-y divide-gray-200">`;
                    for (let i = startRow; i <= endRow; i++) {
                        if (!data[i]) continue;
                        const nama = data[i].find(c => VALID_NAMES.includes(c));
                        if (!nama) continue;
                        const angka = data[i].filter(c => !isNaN(c) && c !== '' && c != null && !VALID_NAMES.includes(c));
                        html += `
                        <tr class="hover:bg-gray-50">
                            <td class="p-3 border-r font-bold text-center bg-gray-50">${nama}</td>
                            <td class="p-3 border-r text-center">${angka[0] || '0'}</td>
                            <td class="p-3 border-r text-center">${angka[1] || '0'}</td>
                            <td class="p-3 border-r text-center">${angka[2] || '0'}</td>
                            <td class="p-3 border-r text-center">${angka[3] || '0'}</td>
                        </tr>`;
                    }
                    html += '</tbody></table></div>';
                    return html;
                }

                let content = '<h1 class="text-xl font-bold mb-4">Report KPI</h1>';
                content += renderTable("Report KPI Mingguan", 1, 6, 7, 11);
                content += renderTable("Report KPI Bulanan", 1, 6, 0, 5);
                content += renderTable("Tren Activity/Bulan", 16, 20, 6, 9);
                content += renderProductivityTable("Productivity/Bulan", 22, 27);
                contentArea.innerHTML = content;
            } catch (err) { setError(err.message); }
        }

        function updatePOPreview() {
            const category = document.getElementById('category').value;
            const preview = document.getElementById('po-preview');
            if (!category || !CATEGORY_CODE[category]) {
                preview.textContent = 'Pilih kategori untuk melihat preview No. PO';

                return;
            }
            preview.textContent = `${CATEGORY_CODE[category]}-${formatDateForPO(new Date())}-?`;
            preview.className = 'w-full p-3 border border-amber-200 rounded-lg bg-amber-50 text-amber-700 text-sm font-mono tracking-wide font-bold';
        }

        async function submitPO() {
            const namaEl = document.getElementById('nama');
            const categoryEl = document.getElementById('category');
            const fileInput = document.getElementById('pdfFile');
            const btn = document.getElementById('submitBtn');

            if (!namaEl.value) { alert('Pilih nama pemohon terlebih dahulu.'); return; }
            if (!categoryEl.value) { alert('Pilih kategori terlebih dahulu.'); return; }
            const file = fileInput.files[0];

        }

        // =========================================================================
        // IMPORT PDF → EKSTRAK TEKS via pdf.js  (PURE CLIENT-SIDE)
        // Menggunakan koordinat X/Y aktual untuk akurasi tinggi.
        // =========================================================================

        /**
         * Ekstrak teks dari semua halaman PDF.
         * Setiap token disimpan dengan posisi x,y asli (y = top-down).
         * Return: { text: string, pageData: [ rows[] ] }
         * rows[] = [ { y, tokens: [{str, x}] } ]
         */
        async function extractTextFromPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = '';
            const pageData = [];

            for (let p = 1; p <= pdf.numPages; p++) {
                const page  = await pdf.getPage(p);
                const tc    = await page.getTextContent();
                const vp    = page.getViewport({ scale: 1 });
                const rowMap = new Map();

                for (const item of tc.items) {
                    if (!item.str || !item.str.trim()) continue;
                    const x = Math.round(item.transform[4]);
                    // Flip Y: PDF bottom=0 → top-down; bucket 4pt untuk stabilitas
                    const y = Math.round((vp.height - item.transform[5]) / 4) * 4;
                    if (!rowMap.has(y)) rowMap.set(y, { y, tokens: [] });
                    rowMap.get(y).tokens.push({ str: item.str.trim(), x });
                }

                const rows = Array.from(rowMap.values()).sort((a, b) => a.y - b.y);
                rows.forEach(r => r.tokens.sort((a, b) => a.x - b.x));
                pageData.push(rows);

                for (const row of rows) {
                    fullText += row.tokens.map(t => t.str).join(' ') + '\n';
                }
                fullText += '\n';
            }
            return { text: fullText.trim(), pageData };
        }

        /**
         * VALID UOM list (case-insensitive match)
         */
        const VALID_UOM = ['box','pcs','unit','karton','pack','kg','ltr','l','lusin','set',
                           'roll','sheet','btl','dus','pak','ctn','ea','bh','buah','lembar',
                           'm','meter','can','tin','bag','sck','pouch','ktn','botol','sachet'];

        /**
         * VALID DESCRIPTION list
         */
        const VALID_DESC = ['Capsule Selling','Sampling','Machine Selling','Machine Display','Supplies'];

        function isUOM(s) {
            return VALID_UOM.some(u => u.toLowerCase() === s.trim().toLowerCase());
        }

        function isDescription(s) {
            return VALID_DESC.some(d => d.toLowerCase() === s.trim().toLowerCase());
        }

        /**
         * Klasifikasi description sebagai fallback jika kolom DESC tidak ditemukan di PDF
         */
        function classifyDescription(namaBarang) {
            const n = namaBarang.toUpperCase();
            if (/CAPSUL/.test(n))                                        return 'Capsule Selling';
            if (/DISPLAY|DEMO|SHOWROOM/.test(n))                         return 'Machine Display';
            if (/MACHINE|MESIN|COFFEE MAKER|BREWER|ESPRESSO/.test(n))    return 'Machine Selling';
            if (/SAMPL|TESTER|TRIAL/.test(n))                            return 'Sampling';
            return 'Supplies';
        }

        /**
         * PARSER UTAMA — Strategi berbasis koordinat kolom.
         *
         * PDF format NOD:
         *  Header "Ordered by | Ship to" → dua blok kiri/kanan
         *  Metadata: Name, Phone, Order Date (kiri) | Name, Phone, Address, Shipping Date (kanan)
         *  Tabel: NO | NAME | Qty | UOM | DESCRIPTION
         *
         * Pendekatan:
         *  1. Temukan baris header "Ordered by" dan "Ship to" → pisahkan kiri/kanan by X midpoint
         *  2. Dari blok kiri ambil "Name :" → orderedBy
         *     Dari blok kanan ambil "Name :" → shipTo, "Shipping Date :" → shippingDate
         *  3. Temukan baris header tabel → rekam posisi X tiap kolom
         *  4. Baca baris data → distribusikan token ke kolom terdekat
         *  5. Jika description kosong → gunakan classifyDescription
         */
        function parsePOData(pageData, rawText) {
            const lines = rawText.split('\n').map(l => l.trim()).filter(Boolean);

            // ─────────────────────────────────────────────────────────────────
            // HELPER: cari nilai setelah keyword pada teks mentah
            // ─────────────────────────────────────────────────────────────────
            function findAfterKeyword(keywords, maxLook = 4) {
                for (let i = 0; i < lines.length; i++) {
                    const up = lines[i].toUpperCase();
                    for (const kw of keywords) {
                        if (up.includes(kw.toUpperCase())) {
                            // Nilai di baris yang sama setelah ':'
                            const colonIdx = lines[i].indexOf(':');
                            if (colonIdx !== -1) {
                                const after = lines[i].slice(colonIdx + 1).trim();
                                if (after.length > 1) return after;
                            }
                            // Baris-baris berikutnya
                            for (let j = 1; j <= maxLook; j++) {
                                const nx = lines[i + j];
                                if (!nx) continue;
                                if (nx.includes(':')) {
                                    // ada label lain, ambil setelah ':'
                                    const v = nx.slice(nx.indexOf(':') + 1).trim();
                                    if (v.length > 1) return v;
                                } else if (nx.length > 1 && !/^[A-Z\s]{3,}$/.test(nx)) {
                                    return nx;
                                }
                            }
                        }
                    }
                }
                return '';
            }

            // ─────────────────────────────────────────────────────────────────
            // HELPER: ekstrak metadata dari pageData menggunakan X midpoint
            // Mencari baris yang mengandung "Ordered by" DAN "Ship to" berdampingan
            // lalu membagi token kiri/kanan, kemudian scan baris-baris berikutnya
            // ─────────────────────────────────────────────────────────────────
            function extractMetaFromLayout() {
                let result = { orderedBy: '', shipTo: '', shippingDate: '' };

                for (const rows of pageData) {
                    // Cari baris header "Ordered by" / "Ship to"
                    let splitX = -1;
                    let headerRowIdx = -1;

                    for (let ri = 0; ri < rows.length; ri++) {
                        const rowText = rows[ri].tokens.map(t => t.str).join(' ').toUpperCase();
                        if (rowText.includes('ORDERED BY') || rowText.includes('ORDERED  BY')) {
                            // Cari token "Ship" atau "SHIP" untuk dapat posisi X pemisah
                            for (const tk of rows[ri].tokens) {
                                if (tk.str.toUpperCase().includes('SHIP')) {
                                    splitX = tk.x - 10; // sedikit sebelum SHIP
                                    break;
                                }
                            }
                            if (splitX === -1) {
                                // Fallback: pakai tengah viewport
                                const xs = rows[ri].tokens.map(t => t.x);
                                splitX = (Math.min(...xs) + Math.max(...xs)) / 2;
                            }
                            headerRowIdx = ri;
                            break;
                        }
                    }

                    if (headerRowIdx === -1 || splitX === -1) continue;

                    // Scan baris di bawah header sampai ketemu baris tabel (NO / NAME / QTY)
                    for (let ri = headerRowIdx + 1; ri < rows.length; ri++) {
                        const rowText = rows[ri].tokens.map(t => t.str).join(' ').toUpperCase();
                        // Hentikan jika sudah sampai tabel items
                        if (/^\s*NO\b/.test(rowText) || rowText.includes('DEAR TEAM') ||
                            rowText.includes('HEREBY')) break;

                        const leftTokens  = rows[ri].tokens.filter(t => t.x < splitX);
                        const rightTokens = rows[ri].tokens.filter(t => t.x >= splitX);
                        const leftText    = leftTokens.map(t => t.str).join(' ');
                        const rightText   = rightTokens.map(t => t.str).join(' ');

                        // Kiri: ambil Name (= Ordered By)
                        if (!result.orderedBy && /NAME\s*:/i.test(leftText)) {
                            const v = leftText.replace(/.*NAME\s*:\s*/i, '').trim();
                            if (v.length > 1) result.orderedBy = v;
                        }

                        // Kanan: ambil Name (= Ship To)
                        if (!result.shipTo && /NAME\s*:/i.test(rightText)) {
                            const v = rightText.replace(/.*NAME\s*:\s*/i, '').trim();
                            if (v.length > 1) result.shipTo = v;
                        }

                        // Kanan: ambil Shipping Date
                        if (!result.shippingDate && /SHIPPING\s*DATE\s*:/i.test(rightText)) {
                            const v = rightText.replace(/.*SHIPPING\s*DATE\s*:\s*/i, '').trim();
                            if (v.length > 1) result.shippingDate = v;
                        }
                    }

                    if (result.orderedBy || result.shipTo) break; // sudah dapat, stop
                }
                return result;
            }

            // ─────────────────────────────────────────────────────────────────
            // METADATA
            // ─────────────────────────────────────────────────────────────────
            const meta = extractMetaFromLayout();

            // Fallback ke teks mentah jika layout parsing gagal
            const orderedBy = meta.orderedBy ||
                findAfterKeyword(['ORDERED BY','ORDER BY','DIPESAN OLEH','BUYER','NAMA PEMESAN']);
            const shipTo    = meta.shipTo    ||
                findAfterKeyword(['SHIP TO','DELIVER TO','KIRIM KE','ALAMAT PENGIRIMAN']);
            let shippingDate = meta.shippingDate ||
                findAfterKeyword(['SHIPPING DATE','DELIVERY DATE','TANGGAL PENGIRIMAN','SHIP DATE','TGL KIRIM']);
            if (!shippingDate) {
                const m = rawText.match(/\b(\d{1,2}\s+(?:Jan|Feb|Mar|Apr|Mei|May|Jun|Jul|Agt|Aug|Sep|Okt|Oct|Nov|Des|Dec)\w*\s+\d{4}|\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})\b/i);
                if (m) shippingDate = m[0];
            }

            // No PO
            const noPO = findAfterKeyword(['IPO NUMBER','PURCHASE ORDER NO','PO NUMBER','NO. PO','NO PO','NOMOR PO','PO#','ORDER#'])
                || (() => {
                    const m = rawText.match(/\b([A-Z]{1,4}[\/\-]\d{2}[\/\-]\d{2}[\/\-]\d+|[A-Z]{1,5}[-\/]\d{4,}[-\/\d]*\d)\b/);
                    return m ? m[0] : '';
                })();

            // ─────────────────────────────────────────────────────────────────
            // TABEL ITEMS — berbasis koordinat kolom
            // ─────────────────────────────────────────────────────────────────
            const items = [];
            const STOP_KW = ['NOTES','NOTE','CATATAN','TOTAL','SUBTOTAL','GRAND TOTAL',
                             'TANDA TANGAN','APPROVED','AUTHORIZED','SIGNATURE',
                             'PROPOSED BY','PROCESSED BY'];

            for (const rows of pageData) {
                let hdrIdx  = -1;
                let cols    = null; // { no, name, qty, uom, desc } → x position of each header

                for (let ri = 0; ri < rows.length; ri++) {
                    const rowText = rows[ri].tokens.map(t => t.str).join(' ').toUpperCase();

                    // ── Deteksi header tabel ──
                    // Harus mengandung setidaknya NAME/ITEM + QTY/Qty
                    const hasName = /\bNAME\b|\bITEM\b|\bNAMA BARANG\b|\bPRODUCT\b/.test(rowText);
                    const hasQty  = /\bQTY\b|\bQUANTITY\b|\bJUMLAH\b/.test(rowText);

                    if (hasName && hasQty && hdrIdx === -1) {
                        hdrIdx = ri;
                        cols = {};
                        for (const tk of rows[ri].tokens) {
                            const up = tk.str.toUpperCase().trim();
                            if (up === 'NO' || up === 'NO.')                                    cols.no   = tk.x;
                            else if (/^(NAME|ITEM|NAMA|PRODUCT|KETERANGAN)$/.test(up))          cols.name = tk.x;
                            else if (/^(QTY|QUANTITY|JUMLAH)$/.test(up))                        cols.qty  = tk.x;
                            else if (/^(UOM|UNIT|SATUAN)$/.test(up))                            cols.uom  = tk.x;
                            else if (/^(DESCRIPTION|DESC|KETERANGAN|DESKRIPSI)$/.test(up))      cols.desc = tk.x;
                        }
                        // Jika NAME tidak terdeteksi exact, ambil kolom terlebar (kemungkinan nama barang)
                        if (cols.name === undefined && cols.qty !== undefined) {
                            // Kolom paling kiri setelah NO adalah NAME
                            const noX = cols.no !== undefined ? cols.no : 0;
                            const leftmost = rows[ri].tokens
                                .filter(t => t.x > noX + 10 && t.x < cols.qty - 10)
                                .sort((a,b) => a.x - b.x)[0];
                            if (leftmost) cols.name = leftmost.x;
                        }
                        continue;
                    }

                    // ── Baris data setelah header ──
                    if (hdrIdx === -1) continue;

                    // Stop conditions
                    if (STOP_KW.some(k => rowText.trimStart().startsWith(k))) break;
                    if (rows[ri].tokens.length === 0) continue;

                    // Abaikan baris yang hanya berisi nomor urut (baris kosong di template)
                    const allTokensText = rows[ri].tokens.map(t => t.str.trim()).join('');
                    if (/^\d+$/.test(allTokensText)) continue; // hanya nomor, skip

                    if (!cols) continue;

                    // ── Distribusikan token ke kolom ──
                    // Setiap token → kolom dengan X terdekat
                    const colKeys = Object.keys(cols); // ['no','name','qty','uom','desc']
                    const buckets = {};
                    colKeys.forEach(k => buckets[k] = []);

                    for (const tk of rows[ri].tokens) {
                        let bestCol = null, bestDist = Infinity;
                        for (const k of colKeys) {
                            const d = Math.abs(tk.x - cols[k]);
                            if (d < bestDist) { bestDist = d; bestCol = k; }
                        }
                        if (bestCol) buckets[bestCol].push(tk.str.trim());
                    }

                    const namaArr = (buckets.name || []).filter(s => !/^\d+\.?$/.test(s));
                    const namaStr = namaArr.join(' ').trim();
                    const qtyRaw  = (buckets.qty  || []).join(' ').trim();
                    const uomRaw  = (buckets.uom  || []).join(' ').trim();
                    const descRaw = (buckets.desc || []).join(' ').trim();

                    // Validasi: nama barang tidak boleh kosong atau hanya angka
                    if (!namaStr || /^\d+$/.test(namaStr)) continue;
                    // Skip baris stop
                    if (STOP_KW.some(k => namaStr.toUpperCase().includes(k))) continue;

                    // Qty: ambil angka dari qtyRaw (bisa ada noise)
                    const qtyMatch = qtyRaw.match(/\d+(?:[.,]\d+)?/);
                    if (!qtyMatch) continue; // tidak ada angka qty → skip
                    const qty = qtyMatch[0].replace(',', '.');
                    if (parseFloat(qty) <= 0) continue;

                    // UOM: validasi, fallback ke 'Pcs'
                    let uom = uomRaw;
                    if (!isUOM(uom)) {
                        // coba cari token UOM dari semua bucket
                        const allTk = rows[ri].tokens.map(t => t.str.trim());
                        uom = allTk.find(t => isUOM(t)) || 'Pcs';
                    }
                    // Kapitalisasi UOM
                    uom = uom.charAt(0).toUpperCase() + uom.slice(1).toLowerCase();
                    if (uom.toLowerCase() === 'box') uom = 'Box';
                    if (uom.toLowerCase() === 'pcs') uom = 'Pcs';
                    if (uom.toLowerCase() === 'unit') uom = 'Unit';
                    if (uom.toLowerCase() === 'karton') uom = 'Karton';
                    if (uom.toLowerCase() === 'pack') uom = 'Pack';

                    // Description: validasi
                    let desc = descRaw;
                    if (!isDescription(desc)) {
                        // Coba cari dari semua bucket
                        const allTk = rows[ri].tokens.map(t => t.str.trim());
                        const joined = allTk.join(' ');
                        const found = VALID_DESC.find(d => joined.toLowerCase().includes(d.toLowerCase()));
                        desc = found || classifyDescription(namaStr);
                    }

                    items.push({ nama_barang: namaStr, qty_po: qty, uom, description: desc });
                }
            }

            // ─────────────────────────────────────────────────────────────────
            // FALLBACK AKHIR: regex pada teks mentah
            // Hanya dipakai jika tabel tidak terdeteksi sama sekali
            // ─────────────────────────────────────────────────────────────────
            if (items.length === 0) {
                const descPat = VALID_DESC.map(d => d.replace(' ', '\\s+')).join('|');
                // Format: [No.] Nama Barang  Qty  UOM  Description
                const lineRe = new RegExp(
                    '^(?:\\d+\\.?\\s+)?(.+?)\\s+(\\d+(?:[.,]\\d+)?)\\s+(' +
                    VALID_UOM.join('|') + ')\\s+(' + descPat + ')?',
                    'i'
                );
                for (const ln of lines) {
                    const m = ln.match(lineRe);
                    if (!m) continue;
                    const nama = m[1].replace(/^\d+\.?\s*/, '').trim();
                    if (STOP_KW.some(k => nama.toUpperCase().startsWith(k))) continue;
                    if (!nama || nama.length < 2) continue;
                    const uomRaw = m[3] || 'Pcs';
                    const descRaw = m[4] || classifyDescription(nama);
                    items.push({
                        nama_barang: nama,
                        qty_po: m[2].replace(',', '.'),
                        uom: uomRaw.charAt(0).toUpperCase() + uomRaw.slice(1).toLowerCase(),
                        description: isDescription(descRaw) ? descRaw : classifyDescription(nama)
                    });
                }
            }

            return { ordered_by: orderedBy, ship_to: shipTo, shipping_date: shippingDate, no_po: noPO, items };
        }

        async function closePO(poNumber) {
            const ok = await showConfirm('Tutup Purchase Order?', `PO ${poNumber} akan ditandai sebagai Closed. Tindakan ini tidak dapat dibatalkan.`);
            if (!ok) return;

            const btn = document.getElementById(`btn-${poNumber}`);

            btn.disabled = true;
            btn.innerHTML = '<span class="inline-block w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin mr-1"></span>Menyimpan...';

            try {
                const response = await fetch(API_URLS.reportStatus, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'closePO', poNumber }),
                });
                const result = await response.json();
                if (result.success) {
                    statusCell.innerHTML = `<span class="inline-block px-2 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700">Closed</span>`;

                    // Ganti tombol "Closed" → "Remove" dan baris menjadi redup
                    const row = document.getElementById(`row-${poNumber}`);
                    if (row) {
                        row.classList.remove('hover:bg-amber-50');
                        row.classList.add('bg-gray-50', 'opacity-60');
                    }
                    btn.onclick = () => removePORow(poNumber);
                    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>Remove`;
                    btn.className = 'bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-xs font-semibold transition flex items-center mx-auto';
                    btn.disabled = false;
                    showAlert('success', 'PO Berhasil Ditutup', `PO ${poNumber} telah ditandai sebagai Closed.`);
                } else {
                    showAlert('error', 'Gagal Menutup PO', result.message || 'Terjadi kesalahan, coba lagi.');
                    btn.disabled = false;
                    btn.innerText = 'Closed';
                }
            } catch (err) {
                showAlert('error', 'Terjadi Kesalahan', err.message);
                btn.disabled = false;
                btn.innerText = 'Closed';
            }
        }

        async function simpanOutboundFinal() {
            const orderedByEl = document.getElementById('proc-ordered-by');
            const orderedBy = orderedByEl?.value?.trim() || '';
            const shipTo = document.getElementById('proc-ship')?.value?.trim() || '';
            const shippingDate = document.getElementById('proc-shipping-date')?.value?.trim() || '';
            const tglProses = document.getElementById('proc-tgl-proses')?.value || '';
            const crewPacking = document.getElementById('proc-crew-packing')?.value || '';
            // No PO: prioritaskan dropdown pilihan, fallback ke dataset dari PDF
            const noPOFromSelect = document.getElementById('proc-no-po-select')?.value || '';
            const noPO = noPOFromSelect || orderedByEl?.dataset?.nopo || '';

            // Validasi Crew Packing
            if (!crewPacking) {
                showAlert('warning', 'Crew Packing Belum Dipilih', 'Silakan pilih Crew Packing terlebih dahulu.');
                return;
            }

            // ── Validasi ──
            if (!orderedBy) {
                showAlert('warning', 'Data Belum Lengkap', 'Field ORDERED BY masih kosong. Import PDF terlebih dahulu atau isi manual.');
                return;
            }

            const rows = document.querySelectorAll('#proc-table-body tr');
            // Cek apakah ada baris valid (bukan hanya placeholder)
            const hasRealRows = Array.from(rows).some(row => row.cells.length >= 5 &&
                !row.querySelector('td[colspan]'));
            if (!hasRealRows) {
                showAlert('warning', 'Tabel Kosong', 'Import PDF terlebih dahulu untuk mengisi data item PO.');
                return;
            }

            // ── Kumpulkan data items dari tabel ──
            const items = [];
            rows.forEach(row => {
                if (row.cells.length < 5 || row.querySelector('td[colspan]')) return;
                const qtyOutboundInput = row.querySelector('input[type="number"]');
                const descSelect = row.querySelector('select');
                const namaBarang = row.cells[0].innerText.trim();
                const qtyPO = row.cells[1].innerText.trim();
                if (!namaBarang || namaBarang === '-') return; // skip baris kosong
                items.push({
                    namaBarang: namaBarang,
                    qtyPO: qtyPO,
                    qtyOutbound: qtyOutboundInput ? qtyOutboundInput.value : row.cells[2].innerText.trim(),
                    uom: row.cells[3].innerText.trim(),
                    description: descSelect ? descSelect.value : row.cells[4].innerText.trim(),
                });
            });

            if (items.length === 0) {
                showAlert('warning', 'Tidak Ada Item', 'Tabel item kosong atau semua baris tidak valid.');
                return;
            }

            const ok = await showConfirm(
                'Simpan & Proses PO?',
                `${items.length} item akan disimpan ke Outbound_Log${noPO ? ' dan status PO ' + noPO + ' akan diubah menjadi "Ready To Ship"' : ''}.`
            );
            if (!ok) return;

            // ── Tampilkan loading di tombol ──
            const saveBtn = document.querySelector('button[onclick="simpanOutboundFinal()"]');
            const originalBtnHTML = saveBtn ? saveBtn.innerHTML : '';
            if (saveBtn) {
                saveBtn.disabled = true;
                saveBtn.innerHTML = `<span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-2"></span> Menyimpan...`;
            }

            const payload = {
                action: 'simpanOutbound',
                noPO: noPO,
                orderedBy: orderedBy,
                shipTo: shipTo,
                shippingDate: shippingDate,
                tanggalProsesPO: tglProses,
                crewPacking: crewPacking,
                items: items
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' }, // GAS butuh text/plain untuk avoid CORS preflight
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.success) {
                    // ── Update badge status di Report Status secara langsung (jika elemen ada di DOM) ──
                    if (noPO) {
                        const statusCell = document.getElementById(`status-${noPO}`);
                        if (statusCell) {
                            statusCell.innerHTML = `<span class="inline-block px-2 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-700">Ready To Ship</span>`;
                        }
                        const rowEl = document.getElementById(`row-${noPO}`);
                        if (rowEl) {
                            rowEl.classList.remove('hover:bg-amber-50');
                            rowEl.classList.add('bg-blue-50');
                        }
                    }

                    showAlert('success', '✅ Berhasil Diproses!',
                        `Data outbound (${items.length} item) tersimpan ke Outbound_Log${noPO ? '.\nStatus PO ' + noPO + ' → Ready To Ship' : '.'}`
                    );

                    // Reset form setelah berhasil
                    setTimeout(() => {
                        document.getElementById('proc-ordered-by').value = '';
                        document.getElementById('proc-ordered-by').dataset.nopo = '';
                        document.getElementById('proc-ship').value = '';
                        document.getElementById('proc-shipping-date').value = '';
                        document.getElementById('proc-tgl-proses').value = new Date().toISOString().split('T')[0];
                        document.getElementById('import-status').textContent = '';
                        const pdfInput = document.getElementById('pdfFile');
                        if (pdfInput) pdfInput.value = '';
                        const crewEl = document.getElementById('proc-crew-packing');
                        if (crewEl) crewEl.value = '';
                        const poSelect = document.getElementById('proc-no-po-select');
                        if (poSelect) poSelect.value = '';
                        document.getElementById('proc-table-body').innerHTML =
                            '<tr><td colspan="5" class="p-6 text-center text-gray-400 italic">Pilih file PDF lalu klik tombol "Import" untuk mengisi data secara otomatis</td></tr>';
                    }, 1500);

                } else {
                    showAlert('error', 'Gagal Menyimpan', result.message || 'Terjadi kesalahan pada server. Periksa GAS log.');
                }
            } catch (err) {
                showAlert('error', 'Terjadi Kesalahan', 'Tidak dapat terhubung ke server: ' + err.message);
            } finally {
                if (saveBtn) {
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = originalBtnHTML || `<svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Proses`;
                }
            }
        }
