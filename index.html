        // =========================================================================
        // IMPORT PDF → EKSTRAK TEKS via pdf.js  (PURE CLIENT-SIDE)
        // Menggunakan koordinat X/Y aktual untuk akurasi tinggi.
        // =========================================================================

        /**
         * Ekstrak teks dari semua halaman PDF.
         * Setiap token disimpan dengan posisi x,y asli (y = top-down).
         * Return: { text: string, pageData: [ rows[] ] }
         * rows[] = [ { y, tokens: [{str, x}] } ]
         */
        async function extractTextFromPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = '';
            const pageData = [];

            for (let p = 1; p <= pdf.numPages; p++) {
                const page = await pdf.getPage(p);
                const tc = await page.getTextContent();
                const vp = page.getViewport({ scale: 1 });
                const rowMap = new Map();

                for (const item of tc.items) {
                    if (!item.str || !item.str.trim()) continue;
                    const x = Math.round(item.transform[4]);
                    // Flip Y: PDF bottom=0 → top-down; bucket 4pt untuk stabilitas
                    const y = Math.round((vp.height - item.transform[5]) / 4) * 4;
                    if (!rowMap.has(y)) rowMap.set(y, { y, tokens: [] });
                    rowMap.get(y).tokens.push({ str: item.str.trim(), x });
                }

                const rows = Array.from(rowMap.values()).sort((a, b) => a.y - b.y);
                rows.forEach(r => r.tokens.sort((a, b) => a.x - b.x));
                pageData.push(rows);

                for (const row of rows) {
                    fullText += row.tokens.map(t => t.str).join(' ') + '\n';
                }
                fullText += '\n';
            }
            return { text: fullText.trim(), pageData };
        }

        /**
         * VALID UOM list (case-insensitive match)
         */
        const VALID_UOM = ['box', 'pcs', 'unit', 'karton', 'pack', 'kg', 'ltr', 'l', 'lusin', 'set',
            'roll', 'sheet', 'btl', 'dus', 'pak', 'ctn', 'ea', 'bh', 'buah', 'lembar',
            'm', 'meter', 'can', 'tin', 'bag', 'sck', 'pouch', 'ktn', 'botol', 'sachet'];

        /**
         * VALID DESCRIPTION list
         */
        const VALID_DESC = ['Capsule Selling', 'Sampling', 'Machine Selling', 'Machine Display', 'Machine Event', 'Supplies'];

        function isUOM(s) {
            return VALID_UOM.some(u => u.toLowerCase() === s.trim().toLowerCase());
        }

        function isDescription(s) {
            return VALID_DESC.some(d => d.toLowerCase() === s.trim().toLowerCase());
        }

        /**
         * Klasifikasi description sebagai fallback jika kolom DESC tidak ditemukan di PDF
         */
        function classifyDescription(namaBarang) {
            const n = namaBarang.toUpperCase();
            if (/CAPSUL/.test(n)) return 'Capsule Selling';
            if (/DISPLAY|DEMO|SHOWROOM/.test(n)) return 'Machine Display';
            if (/MACHINE|MESIN|COFFEE MAKER|BREWER|ESPRESSO/.test(n)) return 'Machine Selling';
            if (/SAMPL|TESTER|TRIAL/.test(n)) return 'Sampling';
            return 'Supplies';
        }

        /**
         * PARSER UTAMA — Strategi berbasis koordinat kolom.
         *
         * PDF format NOD:
         *  Header "Ordered by | Ship to" → dua blok kiri/kanan
         *  Metadata: Name, Phone, Order Date (kiri) | Name, Phone, Address, Shipping Date (kanan)
         *  Tabel: NO | NAME | Qty | UOM | DESCRIPTION
         *
         * Pendekatan:
         *  1. Temukan baris header "Ordered by" dan "Ship to" → pisahkan kiri/kanan by X midpoint
         *  2. Dari blok kiri ambil "Name :" → orderedBy
         *     Dari blok kanan ambil "Name :" → shipTo, "Shipping Date :" → shippingDate
         *  3. Temukan baris header tabel → rekam posisi X tiap kolom
         *  4. Baca baris data → distribusikan token ke kolom terdekat
         *  5. Jika description kosong → gunakan classifyDescription
         */
        function parsePOData(pageData, rawText) {
            const lines = rawText.split('\n').map(l => l.trim()).filter(Boolean);

            // ─────────────────────────────────────────────────────────────────
            // HELPER: cari nilai setelah keyword pada teks mentah
            // ─────────────────────────────────────────────────────────────────
            function findAfterKeyword(keywords, maxLook = 4) {
                for (let i = 0; i < lines.length; i++) {
                    const up = lines[i].toUpperCase();
                    for (const kw of keywords) {
                        if (up.includes(kw.toUpperCase())) {
                            // Nilai di baris yang sama setelah ':'
                            const colonIdx = lines[i].indexOf(':');
                            if (colonIdx !== -1) {
                                const after = lines[i].slice(colonIdx + 1).trim();
                                if (after.length > 1) return after;
                            }
                            // Baris-baris berikutnya
                            for (let j = 1; j <= maxLook; j++) {
                                const nx = lines[i + j];
                                if (!nx) continue;
                                if (nx.includes(':')) {
                                    // ada label lain, ambil setelah ':'
                                    const v = nx.slice(nx.indexOf(':') + 1).trim();
                                    if (v.length > 1) return v;
                                } else if (nx.length > 1 && !/^[A-Z\s]{3,}$/.test(nx)) {
                                    return nx;
                                }
                            }
                        }
                    }
                }
                return '';
            }

            // ─────────────────────────────────────────────────────────────────
            // HELPER: ekstrak metadata dari pageData menggunakan X midpoint
            // Mendukung dua format:
            //   FORMAT A (Request Order NOD): field label di kiri seperti
            //     "Ordered By : Nama", "Ship To : Nama", "Shipping Date : ..."
            //   FORMAT B (PO eksternal lama): blok "Ordered by | Ship to"
            //     dengan sub-field "Name :", "Shipping Date :"
            // ─────────────────────────────────────────────────────────────────
            function extractMetaFromLayout() {
                let result = { orderedBy: '', shipTo: '', shippingDate: '' };

                for (const rows of pageData) {

                    // ── FORMAT A: Request Order NOD ──
                    // Ciri khas: ada baris yang token-tokennya membentuk "Ordered By : <nilai>"
                    // dan baris lain "Ship To : <nilai>". Setiap baris bisa mengandung
                    // dua kolom (kiri & kanan) yang dipisahkan posisi X.
                    let foundFormatA = false;
                    for (let ri = 0; ri < rows.length; ri++) {
                        const rowText = rows[ri].tokens.map(t => t.str).join(' ');
                        const rowUp = rowText.toUpperCase();

                        // Deteksi baris "Ordered By : ..." (kiri) dan "Ship To : ..." (kanan)
                        // Bisa ada di baris yang SAMA (dua kolom) atau baris berbeda
                        if (/ORDERED\s*BY\s*:/i.test(rowText)) {
                            foundFormatA = true;
                            // Pisahkan berdasarkan posisi X: cari titik split (Ship To jika ada di baris sama)
                            let splitX = Infinity;
                            for (const tk of rows[ri].tokens) {
                                if (/^SHIP$/i.test(tk.str)) { splitX = tk.x - 5; break; }
                                if (/^KATEGORI$/i.test(tk.str)) { splitX = tk.x - 5; break; }
                            }
                            // Kumpulkan token kiri (Ordered By block)
                            const leftTokens = rows[ri].tokens.filter(t => t.x < splitX);
                            const leftText = leftTokens.map(t => t.str).join(' ');
                            if (!result.orderedBy && /ORDERED\s*BY\s*:/i.test(leftText)) {
                                // Ambil nilai setelah ":"  — hanya sampai kata pertama yang bukan nama
                                const afterColon = leftText.replace(/.*ORDERED\s*BY\s*:\s*/i, '').trim();
                                // Ambil hanya nama: stop sebelum keyword "Alamat", "Phone", "No.", dll.
                                const nameOnly = afterColon.split(/\s+(?=ALAMAT\s*:|PHONE\s*:|NO\.\s*TELP|TELP\s*:|SHIPPING)/i)[0].trim();
                                if (nameOnly.length > 1) result.orderedBy = nameOnly;
                            }
                            // Cek juga apakah Ship To ada di baris yang sama (kolom kanan)
                            const rightTokens = rows[ri].tokens.filter(t => t.x >= splitX);
                            const rightText = rightTokens.map(t => t.str).join(' ');
                            if (!result.shipTo && /SHIP\s*TO\s*:/i.test(rightText)) {
                                const v = rightText.replace(/.*SHIP\s*TO\s*:\s*/i, '').trim();
                                // Ambil hanya nama (satu "segment" sebelum Alamat/Phone/dll)
                                const nameOnly = v.split(/\s+(?=ALAMAT\s*:|PHONE\s*:|SHIPPING)/i)[0].trim();
                                if (nameOnly.length > 1) result.shipTo = nameOnly;
                            }
                        }

                        // Baris tersendiri "Ship To : ..." (jika berbeda baris dari Ordered By)
                        if (!result.shipTo && /SHIP\s*TO\s*:/i.test(rowText)) {
                            foundFormatA = true;
                            const v = rowText.replace(/.*SHIP\s*TO\s*:\s*/i, '').trim();
                            // Buang teks setelah keyword lain yang mungkin ikut terbaca
                            const nameOnly = v.split(/\s+(?=ALAMAT\s*:|PHONE\s*:|SHIPPING\s*DATE\s*:)/i)[0].trim();
                            if (nameOnly.length > 1) result.shipTo = nameOnly;
                        }

                        // Baris "Shipping Date : ..."
                        if (!result.shippingDate && /SHIPPING\s*DATE\s*:/i.test(rowText)) {
                            foundFormatA = true;
                            // Ambil token SETELAH ":" yang ada di baris ini
                            // Temukan posisi X token ":"
                            let colonX = -1;
                            for (const tk of rows[ri].tokens) {
                                if (tk.str === ':' && colonX === -1) {
                                    // Cek apakah ada token SHIPPING sebelumnya di baris ini
                                    const before = rows[ri].tokens.filter(t => t.x < tk.x).map(t => t.str).join(' ');
                                    if (/SHIPPING/i.test(before)) { colonX = tk.x; break; }
                                }
                            }
                            if (colonX !== -1) {
                                const afterColon = rows[ri].tokens
                                    .filter(t => t.x > colonX)
                                    .map(t => t.str).join(' ').trim();
                                if (afterColon.length > 1) result.shippingDate = afterColon;
                            } else {
                                const v = rowText.replace(/.*SHIPPING\s*DATE\s*:\s*/i, '').trim();
                                if (v.length > 1) result.shippingDate = v;
                            }
                        }
                    }

                    if (foundFormatA && (result.orderedBy || result.shipTo)) break;

                    // ── FORMAT B: PO Eksternal (format lama dengan blok "Ordered by | Ship to") ──
                    let splitX = -1;
                    let headerRowIdx = -1;

                    for (let ri = 0; ri < rows.length; ri++) {
                        const rowText = rows[ri].tokens.map(t => t.str).join(' ').toUpperCase();
                        // Format B: baris HEADER yang isinya hanya "Ordered by" dan "Ship to"
                        // (bukan baris data seperti "Ordered By : Nama")
                        if ((rowText.includes('ORDERED BY') || rowText.includes('ORDERED  BY')) &&
                            !/:/.test(rowText)) {
                            for (const tk of rows[ri].tokens) {
                                if (tk.str.toUpperCase().includes('SHIP')) {
                                    splitX = tk.x - 10;
                                    break;
                                }
                            }
                            if (splitX === -1) {
                                const xs = rows[ri].tokens.map(t => t.x);
                                splitX = (Math.min(...xs) + Math.max(...xs)) / 2;
                            }
                            headerRowIdx = ri;
                            break;
                        }
                    }

                    if (headerRowIdx === -1 || splitX === -1) continue;

                    for (let ri = headerRowIdx + 1; ri < rows.length; ri++) {
                        const rowText = rows[ri].tokens.map(t => t.str).join(' ').toUpperCase();
                        if (/^\s*NO\b/.test(rowText) || rowText.includes('DEAR TEAM') ||
                            rowText.includes('HEREBY')) break;

                        const leftTokens = rows[ri].tokens.filter(t => t.x < splitX);
                        const rightTokens = rows[ri].tokens.filter(t => t.x >= splitX);
                        const leftText = leftTokens.map(t => t.str).join(' ');
                        const rightText = rightTokens.map(t => t.str).join(' ');

                        if (!result.orderedBy && /NAME\s*:/i.test(leftText)) {
                            const v = leftText.replace(/.*NAME\s*:\s*/i, '').trim();
                            if (v.length > 1) result.orderedBy = v;
                        }
                        if (!result.shipTo && /NAME\s*:/i.test(rightText)) {
                            const v = rightText.replace(/.*NAME\s*:\s*/i, '').trim();
                            if (v.length > 1) result.shipTo = v;
                        }
                        if (!result.shippingDate && /SHIPPING\s*DATE\s*:/i.test(rightText)) {
                            const v = rightText.replace(/.*SHIPPING\s*DATE\s*:\s*/i, '').trim();
                            if (v.length > 1) result.shippingDate = v;
                        }
                    }

                    if (result.orderedBy || result.shipTo) break;
                }
                return result;
            }

            // ─────────────────────────────────────────────────────────────────
            // METADATA
            // ─────────────────────────────────────────────────────────────────
            const meta = extractMetaFromLayout();

            // Fallback ke teks mentah jika layout parsing gagal
            const _orderedByRaw = meta.orderedBy ||
                findAfterKeyword(['ORDERED BY', 'ORDER BY', 'DIPESAN OLEH', 'BUYER', 'NAMA PEMESAN']);
            // Buang bagian alamat/phone yang ikut terbaca setelah nama
            const orderedBy = _orderedByRaw
                .split(/\s+(?=Alamat\s*:|Phone\s*:|No\.\s*Telp|Telp\s*:|Shipping)/i)[0].trim();
            const _shipToRaw = meta.shipTo ||
                findAfterKeyword(['SHIP TO', 'DELIVER TO', 'KIRIM KE', 'ALAMAT PENGIRIMAN']);
            // Untuk Ship To: ambil hanya nama lokasi, buang "Ship To :" jika ikut terbaca
            const shipTo = _shipToRaw
                .replace(/^(SHIP\s*TO\s*:?\s*)/i, '')
                .split(/\s+(?=Alamat\s*:|Phone\s*:|Shipping\s*Date)/i)[0].trim();
            let shippingDate = meta.shippingDate ||
                findAfterKeyword(['SHIPPING DATE', 'DELIVERY DATE', 'TANGGAL PENGIRIMAN', 'SHIP DATE', 'TGL KIRIM']);
            if (!shippingDate) {
                const m = rawText.match(/\b(\d{1,2}\s+(?:Jan|Feb|Mar|Apr|Mei|May|Jun|Jul|Agt|Aug|Sep|Okt|Oct|Nov|Des|Dec)\w*\s+\d{4}|\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})\b/i);
                if (m) shippingDate = m[0];
            }

            // No PO
            const noPO = findAfterKeyword(['IPO NUMBER', 'PURCHASE ORDER NO', 'PO NUMBER', 'NO. PO', 'NO PO', 'NOMOR PO', 'PO#', 'ORDER#'])
                || (() => {
                    const m = rawText.match(/\b([A-Z]{1,4}[\/\-]\d{2}[\/\-]\d{2}[\/\-]\d+|[A-Z]{1,5}[-\/]\d{4,}[-\/\d]*\d)\b/);
                    return m ? m[0] : '';
                })();

            // ─────────────────────────────────────────────────────────────────
            // TABEL ITEMS — berbasis koordinat kolom
            // ─────────────────────────────────────────────────────────────────
            const items = [];
            const STOP_KW = ['NOTES', 'NOTE', 'CATATAN', 'TOTAL', 'SUBTOTAL', 'GRAND TOTAL',
                'TANDA TANGAN', 'APPROVED', 'AUTHORIZED', 'SIGNATURE',
                'PROPOSED BY', 'PROCESSED BY'];

            for (const rows of pageData) {
                let hdrIdx = -1;
                let cols = null; // { no, name, qty, uom, desc } → x position of each header

                for (let ri = 0; ri < rows.length; ri++) {
                    const rowText = rows[ri].tokens.map(t => t.str).join(' ').toUpperCase();

                    // ── Deteksi header tabel ──
                    // Harus mengandung setidaknya NAME/ITEM + QTY/Qty
                    const hasName = /\bNAME\b|\bITEM\b|\bNAMA BARANG\b|\bPRODUCT\b/.test(rowText);
                    const hasQty = /\bQTY\b|\bQUANTITY\b|\bJUMLAH\b/.test(rowText);

                    if (hasName && hasQty && hdrIdx === -1) {
                        hdrIdx = ri;
                        cols = {};
                        for (const tk of rows[ri].tokens) {
                            const up = tk.str.toUpperCase().trim();
                            if (up === 'NO' || up === 'NO.') cols.no = tk.x;
                            else if (/^(NAME|ITEM|NAMA|PRODUCT|KETERANGAN)$/.test(up)) cols.name = tk.x;
                            else if (/^(QTY|QUANTITY|JUMLAH)$/.test(up)) cols.qty = tk.x;
                            else if (/^(UOM|UNIT|SATUAN)$/.test(up)) cols.uom = tk.x;
                            else if (/^(DESCRIPTION|DESC|KETERANGAN|DESKRIPSI)$/.test(up)) cols.desc = tk.x;
                        }
                        // Jika NAME tidak terdeteksi exact, ambil kolom terlebar (kemungkinan nama barang)
                        if (cols.name === undefined && cols.qty !== undefined) {
                            // Kolom paling kiri setelah NO adalah NAME
                            const noX = cols.no !== undefined ? cols.no : 0;
                            const leftmost = rows[ri].tokens
                                .filter(t => t.x > noX + 10 && t.x < cols.qty - 10)
                                .sort((a, b) => a.x - b.x)[0];
                            if (leftmost) cols.name = leftmost.x;
                        }
                        continue;
                    }

                    // ── Baris data setelah header ──
                    if (hdrIdx === -1) continue;

                    // Stop conditions
                    if (STOP_KW.some(k => rowText.trimStart().startsWith(k))) break;
                    if (rows[ri].tokens.length === 0) continue;

                    // Abaikan baris yang hanya berisi nomor urut (baris kosong di template)
                    const allTokensText = rows[ri].tokens.map(t => t.str.trim()).join('');
                    if (/^\d+$/.test(allTokensText)) continue; // hanya nomor, skip

                    if (!cols) continue;

                    // ── Distribusikan token ke kolom ──
                    // Setiap token → kolom dengan X terdekat
                    const colKeys = Object.keys(cols); // ['no','name','qty','uom','desc']
                    const buckets = {};
                    colKeys.forEach(k => buckets[k] = []);

                    for (const tk of rows[ri].tokens) {
                        let bestCol = null, bestDist = Infinity;
                        for (const k of colKeys) {
                            const d = Math.abs(tk.x - cols[k]);
                            if (d < bestDist) { bestDist = d; bestCol = k; }
                        }
                        if (bestCol) buckets[bestCol].push(tk.str.trim());
                    }

                    const namaArr = (buckets.name || []).filter(s => !/^\d+\.?$/.test(s));
                    const namaStr = namaArr.join(' ').trim();
                    const qtyRaw = (buckets.qty || []).join(' ').trim();
                    const uomRaw = (buckets.uom || []).join(' ').trim();
                    const descRaw = (buckets.desc || []).join(' ').trim();

                    // Validasi: nama barang tidak boleh kosong atau hanya angka
                    if (!namaStr || /^\d+$/.test(namaStr)) continue;
                    // Skip baris stop
                    if (STOP_KW.some(k => namaStr.toUpperCase().includes(k))) continue;

                    // Qty: ambil angka dari qtyRaw (bisa ada noise)
                    const qtyMatch = qtyRaw.match(/\d+(?:[.,]\d+)?/);
                    if (!qtyMatch) continue; // tidak ada angka qty → skip
                    const qty = qtyMatch[0].replace(',', '.');
                    if (parseFloat(qty) <= 0) continue;

                    // UOM: validasi, fallback ke 'Pcs'
                    let uom = uomRaw;
                    if (!isUOM(uom)) {
                        // coba cari token UOM dari semua bucket
                        const allTk = rows[ri].tokens.map(t => t.str.trim());
                        uom = allTk.find(t => isUOM(t)) || 'Pcs';
                    }
                    // Kapitalisasi UOM
                    uom = uom.charAt(0).toUpperCase() + uom.slice(1).toLowerCase();
                    if (uom.toLowerCase() === 'box') uom = 'Box';
                    if (uom.toLowerCase() === 'pcs') uom = 'Pcs';
                    if (uom.toLowerCase() === 'unit') uom = 'Unit';
                    if (uom.toLowerCase() === 'karton') uom = 'Karton';
                    if (uom.toLowerCase() === 'pack') uom = 'Pack';

                    // Description: validasi
                    let desc = descRaw;
                    if (!isDescription(desc)) {
                        // Coba cari dari semua bucket
                        const allTk = rows[ri].tokens.map(t => t.str.trim());
                        const joined = allTk.join(' ');
                        const found = VALID_DESC.find(d => joined.toLowerCase().includes(d.toLowerCase()));
                        desc = found || classifyDescription(namaStr);
                    }

                    items.push({ nama_barang: namaStr, qty_po: qty, uom, description: desc });
                }
            }

            // ─────────────────────────────────────────────────────────────────
            // FALLBACK AKHIR: regex pada teks mentah
            // Hanya dipakai jika tabel tidak terdeteksi sama sekali
            // ─────────────────────────────────────────────────────────────────
            if (items.length === 0) {
                const descPat = VALID_DESC.map(d => d.replace(' ', '\\s+')).join('|');
                // Format: [No.] Nama Barang  Qty  UOM  Description
                const lineRe = new RegExp(
                    '^(?:\\d+\\.?\\s+)?(.+?)\\s+(\\d+(?:[.,]\\d+)?)\\s+(' +
                    VALID_UOM.join('|') + ')\\s+(' + descPat + ')?',
                    'i'
                );
                for (const ln of lines) {
                    const m = ln.match(lineRe);
                    if (!m) continue;
                    const nama = m[1].replace(/^\d+\.?\s*/, '').trim();
                    if (STOP_KW.some(k => nama.toUpperCase().startsWith(k))) continue;
                    if (!nama || nama.length < 2) continue;
                    const uomRaw = m[3] || 'Pcs';
                    const descRaw = m[4] || classifyDescription(nama);
                    items.push({
                        nama_barang: nama,
                        qty_po: m[2].replace(',', '.'),
                        uom: uomRaw.charAt(0).toUpperCase() + uomRaw.slice(1).toLowerCase(),
                        description: isDescription(descRaw) ? descRaw : classifyDescription(nama)
                    });
                }
            }

            return { ordered_by: orderedBy, ship_to: shipTo, shipping_date: shippingDate, no_po: noPO, items };
        }

        // =========================================================================
        // DELIVERY ORDER → GENERATE PDF (client-side, jsPDF + autotable)
        // =========================================================================
        async function generateDeliveryOrderPDF() {
            const tglProses = document.getElementById('proc-tgl-proses')?.value || '';
            const noPOFromSelect = document.getElementById('proc-no-po-select')?.value || '';
            const orderedByEl = document.getElementById('proc-ordered-by');

            const crewPacking = document.getElementById('proc-crew-packing')?.value || '';

            const shipTo = document.getElementById('proc-ship')?.value?.trim() || '';
            const shippingDate = document.getElementById('proc-shipping-date')?.value?.trim() || '';

            // Validasi
            if (!tglProses) { showAlert('warning', 'Data Belum Lengkap', 'Tanggal Proses PO belum diisi.'); return; }
            if (!noPO) { showAlert('warning', 'Data Belum Lengkap', 'No. PO belum dipilih/terisi.'); return; }
            if (!crewPacking) { showAlert('warning', 'Data Belum Lengkap', 'Crew Packing belum dipilih.'); return; }

            // Ambil isi tabel
            const rows = document.querySelectorAll('#proc-table-body tr');
            const items = [];
            rows.forEach(row => {
                if (row.hasAttribute('data-placeholder')) return;
                const tds = row.querySelectorAll('td');
                if (tds.length < 5) return;

                const namaInput = row.querySelector('.nama-barang-input');
                const nama = namaInput ? namaInput.value.trim() : tds[0].textContent.trim();
                if (!nama || nama === '-') return;

                const qtyOutInput = tds[2] ? tds[2].querySelector('input') : null;
                const qty = qtyOutInput ? qtyOutInput.value : (tds[2] ? tds[2].textContent.trim() : '');
                const uom = tds[3] ? tds[3].textContent.trim() : '';
                const descSel = tds[4] ? tds[4].querySelector('select') : null;
                const description = descSel ? descSel.value : (tds[4] ? tds[4].textContent.trim() : '');
                // Kolom Remark hanya ada pada baris manual (tds[5] sebelum kolom Aksi)
                const remark = (tds.length >= 7 && tds[5]) ? tds[5].textContent.trim() : '';

                items.push({ nama, qty, uom, description, remark });
            });

            if (items.length === 0) {
                showAlert('warning', 'Tabel Kosong', 'Tidak ada item untuk dimasukkan ke Delivery Order.');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            const pageWidth = doc.internal.pageSize.getWidth();
            const marginX = 14;

            // ── Header Background Image ──
            try {
                doc.addImage(HEADER_BG_IMG, 'PNG', 0, 0, pageWidth, 32);
            } catch (_) { /* skip if fails */ }

            // ── Logo NOD (pojok kiri atas) ──
            const logoData = await loadImageAsDataURL(NOD_LOGO_URL);
            let logoBottomY = 18;
            if (logoData) {
                try {
                    const dims = getImageFitDims(logoData, 26, 14);
                    doc.addImage(logoData.dataUrl, logoData.format, marginX, 8, dims.w, dims.h);
                    logoBottomY = 8 + dims.h;
                } catch (_) {
                    drawFallbackLogo(doc, marginX);
                    logoBottomY = 22;
                }
            } else {
                drawFallbackLogo(doc, marginX);
                logoBottomY = 22;
            }

            // ── Tagline dibawah logo ──
            doc.setFont('helvetica', 'italic');
            doc.setFontSize(7.5);
            doc.setTextColor(120, 113, 108);
            doc.text('Your All-in-One Drink Maker', marginX, logoBottomY + 4);

            // ── Judul Dokumen ──
            doc.setTextColor(17, 24, 39);
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(16);
            doc.text('DELIVERY ORDER', pageWidth - marginX, 16, { align: 'right' });
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(9);
            doc.setTextColor(107, 114, 128);
            doc.text('No. PO: ' + noPO, pageWidth - marginX, 22, { align: 'right' });

            // Garis pemisah
            doc.setDrawColor(229, 231, 235);
            doc.setLineWidth(0.4);
            doc.line(marginX, 28, pageWidth - marginX, 28);

            // ── Info Box ──
            let y = 36;
            doc.setFontSize(10);
            doc.setTextColor(31, 41, 55);

            const infoLeft = [
                ['Tanggal Proses PO', formatTanggalIndo(tglProses)],
                ['No. PO', noPO],
                ['Crew Packing', crewPacking],
            ];
            const infoRight = [
                ['Ordered By', orderedBy || '-'],
                ['Ship To', shipTo || '-'],
                ['Shipping Date', shippingDate || '-'],
            ];

            const colLeftX = marginX;
            const colLeftLabelW = 34;
            const colRightX = pageWidth / 2 + 4;
            const colRightLabelW = 28;
            const lineH = 6;

            infoLeft.forEach((row, i) => {
                const yy = y + i * lineH;
                doc.setFont('helvetica', 'bold');
                doc.text(row[0], colLeftX, yy);
                doc.setFont('helvetica', 'normal');
                doc.text(':', colLeftX + colLeftLabelW, yy);
                doc.text(String(row[1] || '-'), colLeftX + colLeftLabelW + 3, yy);
            });

            infoRight.forEach((row, i) => {
                const yy = y + i * lineH;
                doc.setFont('helvetica', 'bold');
                doc.text(row[0], colRightX, yy);
                doc.setFont('helvetica', 'normal');
                doc.text(':', colRightX + colRightLabelW, yy);
                const textVal = String(row[1] || '-');
                const maxW = pageWidth - marginX - (colRightX + colRightLabelW + 3);
                const wrapped = doc.splitTextToSize(textVal, maxW);
                doc.text(wrapped, colRightX + colRightLabelW + 3, yy);
            });

            y += infoLeft.length * lineH + 6;

            // ── Tabel Item ──
            const tableBody = items.map((it, idx) => [
                String(idx + 1),
                it.nama,
                it.qty || '-',
                it.uom || '-',
                it.description || '-',
                it.remark || '-'
            ]);

            doc.autoTable({
                startY: y,
                head: [['No', 'Nama Barang', 'Qty', 'UOM', 'Description', 'Remark']],
                body: tableBody,
                theme: 'grid',
                styles: { font: 'helvetica', fontSize: 8.5, cellPadding: 2.2, valign: 'middle' },
                headStyles: { fillColor: [31, 41, 55], textColor: 255, fontStyle: 'bold', halign: 'center' },
                columnStyles: {
                    0: { halign: 'center', cellWidth: 9 },
                    2: { halign: 'center', cellWidth: 18 },
                    3: { halign: 'center', cellWidth: 18 },
                    5: { cellWidth: 30 },
                },
                margin: { left: marginX, right: marginX },
            });

            // ── Tanda Tangan ──
            let finalY = doc.lastAutoTable.finalY + 18;
            const pageHeight = doc.internal.pageSize.getHeight();
            if (finalY > pageHeight - 90) {
                doc.addPage();
                finalY = 30;
            }

            const sigColW = (pageWidth - marginX * 2) / 3;
            const sigLabels = ['Disiapkan oleh,', 'Diperiksa oleh,', 'Diterima oleh,'];
            const sigNames = [crewPacking, '', shipTo || ''];

            sigLabels.forEach((label, i) => {
                const x = marginX + i * sigColW;
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);
                doc.setTextColor(31, 41, 55);
                doc.text(label, x, finalY);
                doc.line(x, finalY + 18, x + sigColW - 10, finalY + 18);
                doc.setFont('helvetica', 'bold');
                doc.text(sigNames[i] || '( ___________ )', x, finalY + 24);
            });

            // ── Footer Image (NOD) ──
            const footerW = pageWidth - marginX * 2;
            const footerH = footerW * (355 / 1060); // rasio asli gambar
            const footerY = pageHeight - footerH;
            try {
                doc.addImage(NOD_FOOTER_IMG, 'JPEG', marginX, footerY, footerW, footerH);
            } catch (_) { /* abaikan jika gagal */ }

            // ── Footer Text (generated info) ──
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(7);
            doc.setTextColor(180, 180, 180);
            doc.text('Generated by NOD Warehouse System — ' + new Date().toLocaleString('id-ID'), marginX, footerY - 2);

            const fileName = `Delivery_Order_${noPO || 'PO'}_${tglProses || ''}.pdf`;
            doc.save(fileName);
        }

        /** Format tanggal YYYY-MM-DD → DD Bulan YYYY (Indonesia) */
        function formatTanggalIndo(dateStr) {
            if (!dateStr) return '-';
            const bulan = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            const [yy, mm, dd] = dateStr.split('-');
            if (!yy || !mm || !dd) return dateStr;
            return `${parseInt(dd, 10)} ${bulan[parseInt(mm, 10) - 1]} ${yy}`;
        }

        /**
         * Load gambar dari URL eksternal, convert ke data URL (base64) via canvas,
         * agar bisa dipakai jsPDF addImage(). Return null jika gagal (CORS/network).
         */
        let _nodLogoCache = null;
        function loadImageAsDataURL(url) {
            if (_nodLogoCache) return Promise.resolve(_nodLogoCache);
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                const timeout = setTimeout(() => resolve(null), 6000);
                img.onload = () => {
                    clearTimeout(timeout);
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.naturalWidth;
                        canvas.height = img.naturalHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        const dataUrl = canvas.toDataURL('image/png');
                        const result = { dataUrl, format: 'PNG', width: img.naturalWidth, height: img.naturalHeight };
                        _nodLogoCache = result;
                        resolve(result);
                    } catch (_) {
                        resolve(null);
                    }
                };
                img.onerror = () => { clearTimeout(timeout); resolve(null); };
                img.src = url;
            });
        }

        /** Hitung dimensi gambar (mm) agar fit dalam box maxW x maxH, menjaga aspect ratio */
        function getImageFitDims(logoData, maxW, maxH) {
            const ratio = logoData.width / logoData.height;
            let w = maxW, h = maxW / ratio;
            if (h > maxH) { h = maxH; w = maxH * ratio; }
            return { w, h };
        }

        /** Fallback logo teks "NOD" jika gambar gagal dimuat */
        function drawFallbackLogo(doc, marginX) {
            doc.setFillColor(17, 24, 39);
            doc.roundedRect(marginX, 10, 22, 12, 2, 2, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(13);
            doc.text('NOD', marginX + 11, 18, { align: 'center' });
        }

                _sourceItemsCache = Array.isArray(data) ? data.filter(Boolean) : [];
            } catch (_) {
                _sourceItemsCache = [];
            }
            return _sourceItemsCache;
        }

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    const next = active ? active.nextElementSibling : lis[0];
                    if (active) active.classList.remove('bg-amber-100');
                    if (next) next.classList.add('bg-amber-100');
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    const prev = active ? active.previousElementSibling : lis[lis.length - 1];
                    if (active) active.classList.remove('bg-amber-100');
                    if (prev) prev.classList.add('bg-amber-100');
                } else if (e.key === 'Enter') {
                    if (active) { e.preventDefault(); input.value = active.textContent; list.classList.add('hidden'); }

                    list.classList.add('hidden');

        // =========================================================================
        // SCAN QR CODE (html5-qrcode)
        // =========================================================================
        let _inboundHtml5QrCode = null;
        let _inboundScannerActive = false;

        async function toggleInboundScanner() {
            const container = document.getElementById('inb-qr-reader-container');
            const btn = document.getElementById('inb-scan-btn');
            const statusEl = document.getElementById('inb-scan-status');

            if (_inboundScannerActive) {
                try { await _inboundHtml5QrCode.stop(); _inboundHtml5QrCode.clear(); } catch (_) { }
                _inboundScannerActive = false;
                container.classList.add('hidden');
                btn.innerHTML = `<svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4h4V2H2v6h2V4zm16 0v4h2V2h-6v2h4zM4 16H2v6h6v-2H4v-4zm16 4h-4v2h6v-6h-2v4zM7 7h2v2H7V7zm0 8h2v2H7v-2zm8-8h2v2h-2V7zm0 8h2v2h-2v-2zm-4-4h2v2h-2v-2z"/></svg> Scan QR Code`;
                if (statusEl) statusEl.textContent = '';
                return;
            }

            container.classList.remove('hidden');
            statusEl.textContent = 'Mengaktifkan kamera...';
            statusEl.className = 'text-xs text-blue-500';

            try {
                _inboundHtml5QrCode = new Html5Qrcode('inb-qr-reader');
                await _inboundHtml5QrCode.start(
                    { facingMode: 'environment' },
                    { fps: 10, qrbox: 220 },
                    onInboundQrScanSuccess,
                    () => { /* ignore per-frame errors */ }
                );
                _inboundScannerActive = true;
                btn.innerHTML = `<svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg> Tutup Scanner`;
                statusEl.textContent = 'Arahkan kamera ke QR Code barang.';
                statusEl.className = 'text-xs text-gray-400';
            } catch (err) {
                statusEl.textContent = '❌ Gagal mengaktifkan kamera: ' + err.message;
                statusEl.className = 'text-xs text-red-500';
                container.classList.add('hidden');
            }
        }

        /** Callback ketika QR code berhasil di-scan: cocokkan ke Source Items lalu isi ke tabel */
        async function onInboundQrScanSuccess(decodedText) {
            const statusEl = document.getElementById('inb-scan-status');
            const items = await getSourceItems();

            const raw = decodedText.trim();
            // Cocokkan: exact match dulu, lalu partial/contains
            let matched = items.find(i => i.toLowerCase() === raw.toLowerCase());
            if (!matched) matched = items.find(i => i.toLowerCase().includes(raw.toLowerCase()) || raw.toLowerCase().includes(i.toLowerCase()));

            const namaBarang = matched || raw;
            tambahBarisInbound(namaBarang);

            if (statusEl) {
                statusEl.textContent = matched
                    ? `✅ Terdeteksi: "${namaBarang}" — ditambahkan ke tabel.`
                    : `⚠️ "${raw}" tidak ditemukan di daftar item, ditambahkan apa adanya.`;
                statusEl.className = matched ? 'text-xs text-green-600' : 'text-xs text-amber-600';
            }
        }

        // =========================================================================
        // PROSES INBOUND → KIRIM KE SPREADSHEET
        // =========================================================================
        async function prosesInbound() {
            const tanggal = document.getElementById('inb-tanggal')?.value || '';
            const exLokasi = document.getElementById('inb-ex-lokasi')?.value?.trim() || '';
            const crew = document.getElementById('inb-crew')?.value || '';
            const category = document.getElementById('inb-category')?.value || '';

            // ── Validasi ──
            const today = new Date().toISOString().split('T')[0];
            if (!tanggal) { showAlert('warning', 'Data Belum Lengkap', 'Tanggal Inbound belum diisi.'); return; }
            if (tanggal > today) { showAlert('warning', 'Tanggal Tidak Valid', 'Tanggal Inbound tidak boleh lebih dari hari ini.'); return; }
            if (!exLokasi) { showAlert('warning', 'Data Belum Lengkap', 'Ex Lokasi belum diisi.'); return; }
            if (!crew) { showAlert('warning', 'Data Belum Lengkap', 'Crew belum dipilih.'); return; }
            if (!category) { showAlert('warning', 'Data Belum Lengkap', 'Kategori belum dipilih.'); return; }

            const rows = document.querySelectorAll('#inb-table-body tr');
            const items = [];
            rows.forEach(row => {
                if (row.hasAttribute('data-placeholder')) return;
                const namaInput = row.querySelector('.nama-barang-input');
                const qtyInput = row.querySelector('.qty-input');
                const serialInput = row.querySelector('.serial-input');
                const remarkInput = row.querySelector('.remark-input');
                const nama = namaInput ? namaInput.value.trim() : '';
                if (!nama) return;
                items.push({
                    namaBarang: nama,
                    qty: qtyInput ? qtyInput.value : '',
                    serialNumber: serialInput ? serialInput.value.trim() : '',
                    remark: remarkInput ? remarkInput.value.trim() : '',
                });
            });

            if (items.length === 0) {
                showAlert('warning', 'Tabel Kosong', 'Tambahkan minimal 1 barang pada Detail Inbound.');
                return;
            }

            const ok = await showConfirm('Proses Inbound?', `${items.length} item akan disimpan ke spreadsheet Inbound.`);
            if (!ok) return;

            const btn = document.querySelector('button[onclick="prosesInbound()"]');
            const originalHTML = btn ? btn.innerHTML : '';
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = `<span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-2"></span> Menyimpan...`;
            }

            const payload = {
                action: 'simpanInbound',
                tanggalProses: tanggal,
                crew: crew,
                exLocation: exLokasi,
                category: category,
                items: items
            };

            try {
                const response = await fetch(INBOUND_GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.success) {
                    showAlert('success', '✅ Berhasil Diproses!', `Data inbound (${items.length} item) tersimpan ke spreadsheet.`);
                    // Reset form
                    document.getElementById('inb-ex-lokasi').value = '';
                    document.getElementById('inb-crew').value = '';
                    document.getElementById('inb-category').value = '';
                    document.getElementById('inb-tanggal').value = today;
                    document.getElementById('inb-table-body').innerHTML =
                        '<tr data-placeholder><td colspan="5" class="p-6 text-center text-gray-400 italic">Belum ada data. Klik "Tambah Baris" atau scan QR Code.</td></tr>';
                } else {
                    showAlert('error', 'Gagal Menyimpan', result.message || 'Terjadi kesalahan pada server. Periksa GAS log.');
                }
            } catch (err) {
                showAlert('error', 'Terjadi Kesalahan', 'Tidak dapat terhubung ke server: ' + err.message);
            } finally {
                if (btn) { btn.disabled = false; btn.innerHTML = originalHTML; }
            }
        }

                allRows.forEach(row => {

                    <td class="p-3 border-b">
                        ${isClosed
                            ? `<button id="btn-${noPO}" onclick="removePORow('${noPO}')"
                                class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-xs font-semibold transition flex items-center gap-1 mx-auto">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                </svg>
                                Remove
                               </button>`
                            : `<button id="btn-${noPO}" onclick="closePO('${noPO}')"
                                class="${isReady ? 'bg-green-500 hover:bg-green-600' : 'bg-blue-500 hover:bg-blue-600'} text-white px-3 py-1 rounded text-xs font-semibold transition">
                                Closed
                               </button>`
                        }
                    </td>` : '';

                    rows_html += `
                    <tr id="row-${noPO}" class="${isClosed ? 'bg-gray-50 opacity-60' : isReady ? 'bg-blue-50' : 'hover:bg-amber-50'}">
                        <td class="p-3 border-b font-mono">${noPO}</td>
                        <td class="p-3 border-b">${nama}</td>
                        <td class="p-3 border-b">${kat}</td>
                        <td class="p-3 border-b" id="status-${noPO}">${statusBadge}</td>
                        ${isAdmin ? `<td class="p-3 border-b">${linkCell}</td>` : ''}
                        ${aksiCell}
                    </tr>`;
                });

                if (allRows.length === 0) {
                    contentArea.innerHTML = `
                    <h1 class="text-2xl font-bold mb-4">Report Status PO</h1>
                    <div class="p-8 text-center bg-white border border-gray-200 rounded-lg shadow-sm">
                        <p class="text-gray-500">✅ Tidak ada PO yang berlangsung.</p>
                    </div>`;
                    return;
                }

                contentArea.innerHTML = `
                <h1 class="text-2xl font-bold mb-4">Report Status PO</h1>
                <div class="overflow-x-auto bg-white shadow-sm border border-gray-200 rounded-lg">
                    <table class="w-full text-xs text-center border-collapse">
                        <thead>
                            <tr class="bg-gray-800 text-white">
                                <th class="p-3">No. PO</th>
                                <th class="p-3">Nama</th>
                                <th class="p-3">Kategori</th>
                                <th class="p-3">Status</th>
                                ${isAdmin ? '<th class="p-3">Link</th><th class="p-3">Aksi</th>' : ''}
                            </tr>
                        </thead>
                        <tbody id="po-table-body">${rows_html}</tbody>
                    </table>
                </div>`;
            } catch (err) { setError(err.message); }
        }

        async function closePO(poNumber) {
            const ok = await showConfirm('Tutup Purchase Order?', `PO ${poNumber} akan ditandai sebagai Closed. Tindakan ini tidak dapat dibatalkan.`);
            if (!ok) return;

            const btn = document.getElementById(`btn-${poNumber}`);
            const statusCell = document.getElementById(`status-${poNumber}`);
            btn.disabled = true;
            btn.innerHTML = '<span class="inline-block w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin mr-1"></span>Menyimpan...';

            try {
                const response = await fetch(API_URLS.reportStatus, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'closePO', poNumber }),
                });
                const result = await response.json();
                if (result.success) {
                    statusCell.innerHTML = `<span class="inline-block px-2 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700">Closed</span>`;

                    // Ganti tombol "Closed" → "Remove" dan baris menjadi redup
                    const row = document.getElementById(`row-${poNumber}`);
                    if (row) {
                        row.classList.remove('hover:bg-amber-50');
                        row.classList.add('bg-gray-50', 'opacity-60');
                    }
                    btn.onclick = () => removePORow(poNumber);
                    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>Remove`;
                    btn.className = 'bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-xs font-semibold transition flex items-center mx-auto';
                    btn.disabled = false;
                    showAlert('success', 'PO Berhasil Ditutup', `PO ${poNumber} telah ditandai sebagai Closed.`);
                } else {
                    showAlert('error', 'Gagal Menutup PO', result.message || 'Terjadi kesalahan, coba lagi.');
                    btn.disabled = false;
                    btn.innerText = 'Closed';
                }
            } catch (err) {
                showAlert('error', 'Terjadi Kesalahan', err.message);
                btn.disabled = false;
                btn.innerText = 'Closed';
            }
        }

        /**
         * Menghapus baris PO dari tampilan (bukan dari sheet).
         * Hanya menghilangkan baris di tabel secara visual — data di sheet tetap ada.
         */
        async function removePORow(poNumber) {
            const ok = await showConfirm(
                'Hapus baris dari tampilan?',
                `Baris PO ${poNumber} akan dihapus dari tampilan ini. Data di sheet tetap tersimpan.`
            );
            if (!ok) return;

            const row = document.getElementById(`row-${poNumber}`);
            if (!row) return;

            // Animasi fade out sebelum dihapus
            row.style.transition = 'opacity 0.3s, transform 0.3s';
            row.style.opacity = '0';
            row.style.transform = 'translateX(20px)';

            setTimeout(() => {
                row.remove();

                // Jika tabel sudah kosong, tampilkan pesan
                const tbody = document.getElementById('po-table-body');
                if (tbody && tbody.querySelectorAll('tr').length === 0) {
                    document.getElementById('content-area').innerHTML = `
                    <h1 class="text-2xl font-bold mb-4">Report Status PO</h1>
                    <div class="p-8 text-center bg-white border border-gray-200 rounded-lg shadow-sm">
                        <p class="text-gray-500">✅ Tidak ada PO yang ditampilkan.</p>
                    </div>`;
                }
            }, 300);
        }

        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwk8W85KT0L-G8YJfxXSZvWzp-hwC0eDecSzD99Flv_v6vP3-vki3pv-Mdthz7-0Y2Y/exec";

        async function simpanOutboundFinal() {
            const orderedByEl = document.getElementById('proc-ordered-by');
            const orderedBy = orderedByEl?.value?.trim() || '';
            const shipTo = document.getElementById('proc-ship')?.value?.trim() || '';
            const shippingDate = document.getElementById('proc-shipping-date')?.value?.trim() || '';
            const tglProses = document.getElementById('proc-tgl-proses')?.value || '';
            const crewPacking = document.getElementById('proc-crew-packing')?.value || '';
            // No PO: prioritaskan dropdown pilihan, fallback ke dataset dari PDF
            const noPOFromSelect = document.getElementById('proc-no-po-select')?.value || '';
            const noPO = noPOFromSelect || orderedByEl?.dataset?.nopo || '';

            // Validasi Crew Packing
            if (!crewPacking) {
                showAlert('warning', 'Crew Packing Belum Dipilih', 'Silakan pilih Crew Packing terlebih dahulu.');
                return;
            }

            // ── Validasi ──
            if (!orderedBy) {
                showAlert('warning', 'Data Belum Lengkap', 'Field ORDERED BY masih kosong. Import PDF terlebih dahulu atau isi manual.');
                return;
            }

            const rows = document.querySelectorAll('#proc-table-body tr');
            // Cek apakah ada baris valid (bukan hanya placeholder)
            const hasRealRows = Array.from(rows).some(row => row.cells.length >= 5 &&
                !row.querySelector('td[colspan]'));
            if (!hasRealRows) {
                showAlert('warning', 'Tabel Kosong', 'Import PDF terlebih dahulu untuk mengisi data item PO.');
                return;
            }

            // ── Kumpulkan data items dari tabel ──
            const items = [];
            rows.forEach(row => {
                if (row.cells.length < 5 || row.querySelector('td[colspan]')) return;
                const qtyOutboundInput = row.querySelector('input[type="number"]');
                const descSelect = row.querySelector('select');
                const namaBarangInput = row.querySelector('.nama-barang-input');
                const namaBarang = namaBarangInput ? namaBarangInput.value.trim() : row.cells[0].innerText.trim();
                const qtyPO = row.cells[1].innerText.trim();
                if (!namaBarang || namaBarang === '-') return; // skip baris kosong
                items.push({
                    namaBarang: namaBarang,
                    qtyPO: qtyPO,
                    qtyOutbound: qtyOutboundInput ? qtyOutboundInput.value : row.cells[2].innerText.trim(),
                    uom: row.cells[3].innerText.trim(),
                    description: descSelect ? descSelect.value : row.cells[4].innerText.trim(),
                });
            });

            if (items.length === 0) {
                showAlert('warning', 'Tidak Ada Item', 'Tabel item kosong atau semua baris tidak valid.');
                return;
            }

            const ok = await showConfirm(
                'Simpan & Proses PO?',
                `${items.length} item akan disimpan ke Outbound_Log${noPO ? ' dan status PO ' + noPO + ' akan diubah menjadi "Ready To Ship"' : ''}.`
            );
            if (!ok) return;

            // ── Tampilkan loading di tombol ──
            const saveBtn = document.querySelector('button[onclick="simpanOutboundFinal()"]');
            const originalBtnHTML = saveBtn ? saveBtn.innerHTML : '';
            if (saveBtn) {
                saveBtn.disabled = true;
                saveBtn.innerHTML = `<span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-2"></span> Menyimpan...`;
            }

            const payload = {
                action: 'simpanOutbound',
                noPO: noPO,
                orderedBy: orderedBy,
                shipTo: shipTo,
                shippingDate: shippingDate,
                tanggalProsesPO: tglProses,
                crewPacking: crewPacking,
                updatePOStatus: noPO ? true : false,   // flag: update status PO_Data
                newPOStatus: 'Ready To Ship',
                items: items
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' }, // GAS butuh text/plain untuk avoid CORS preflight
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.success) {

                    // ── Status PO sudah diupdate oleh GAS Outbound sekaligus ──
                    const statusUpdated = result.statusUpdated === true;

                    if (noPO && statusUpdated) {
                        // ── Update badge di DOM (Report Status) jika halaman sedang terbuka ──
                        const statusCell = document.getElementById(`status-${noPO}`);
                        if (statusCell) {
                            statusCell.innerHTML = `<span class="inline-block px-2 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-700">Ready To Ship</span>`;
                        }
                        const rowEl = document.getElementById(`row-${noPO}`);
                        if (rowEl) {
                            rowEl.classList.remove('hover:bg-amber-50');
                            rowEl.classList.add('bg-blue-50');
                        }
                        // ── Hapus PO ini dari dropdown Open PO ──
                        const optEl = document.querySelector(`#proc-no-po-select option[value="${noPO}"]`);
                        if (optEl) optEl.remove();
                    }

                    // Pesan sukses
                    const statusMsg = noPO
                        ? (statusUpdated
                            ? `\nStatus PO ${noPO} → ✅ Ready To Ship`
                            : `\n⚠️ Status PO ${noPO} tidak ditemukan di PO_Data.`)
                        : '';
                    showAlert('success', '✅ Berhasil Diproses!',
                        `Data outbound (${items.length} item) tersimpan ke Outbound_Log.${statusMsg}`
                    );

                    // ── Reset form setelah berhasil ──
                    setTimeout(() => {
                        document.getElementById('proc-ordered-by').value = '';
                        document.getElementById('proc-ordered-by').dataset.nopo = '';
                        document.getElementById('proc-ship').value = '';
                        document.getElementById('proc-shipping-date').value = '';
                        document.getElementById('proc-tgl-proses').value = new Date().toISOString().split('T')[0];
                        document.getElementById('import-status').textContent = '';
                        const pdfInput = document.getElementById('pdfFile');
                        if (pdfInput) pdfInput.value = '';
                        const crewEl = document.getElementById('proc-crew-packing');
                        if (crewEl) crewEl.value = '';
                        const poSelect = document.getElementById('proc-no-po-select');
                        if (poSelect) poSelect.value = '';
                        document.getElementById('proc-table-body').innerHTML =
                            '<tr><td colspan="5" class="p-6 text-center text-gray-400 italic">Pilih file PDF lalu klik tombol "Import" untuk mengisi data secara otomatis</td></tr>';
                    }, 1500);

                } else {
                    showAlert('error', 'Gagal Menyimpan', result.message || 'Terjadi kesalahan pada server. Periksa GAS log.');
                }
            } catch (err) {
                showAlert('error', 'Terjadi Kesalahan', 'Tidak dapat terhubung ke server: ' + err.message);
            } finally {
                if (saveBtn) {
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = originalBtnHTML || `<svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Proses`;
                }
            }
        }
        // =========================================================================
        // FITUR: SHARE TO WHATSAPP
        // =========================================================================
        function shareToWhatsApp() {
            const captureArea = document.getElementById('captureArea');
            const btn = document.getElementById('shareBtn');
            btn.style.display = 'none';
            html2canvas(captureArea, { scale: 2, useCORS: true, backgroundColor: '#ffffff' })
                .then(canvas => {
                    canvas.toBlob(blob => {
                        btn.style.display = 'inline-block';
                        const file = new File([blob], 'PlanTask.png', { type: 'image/png' });
                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            navigator.share({ files: [file] });
                        } else {
                            const link = document.createElement('a');
                            link.download = 'PlanTask.png';
                            link.href = canvas.toDataURL('image/png');
                            link.click();
                        }
                    });
                });
        }
        // Konfigurasi wajib untuk pdf.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
