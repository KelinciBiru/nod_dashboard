<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Warehouse Pulogadung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>

<body class="font-sans text-gray-800 bg-gray-50">

    <!-- =====================================================================
         MODAL ALERT (mengganti browser alert)
    ====================================================================== -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/40 z-[99999] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center transform transition-all">
            <div id="modal-icon" class="text-5xl mb-3"></div>
            <h3 id="modal-title" class="text-lg font-bold text-gray-800 mb-1"></h3>
            <p id="modal-message" class="text-sm text-gray-500 mb-5"></p>
            <button onclick="closeModal()" class="w-full py-2 rounded-xl font-bold text-white transition"
                id="modal-btn">OK</button>
        </div>
    </div>

    <!-- =====================================================================
         MODAL KONFIRMASI (mengganti browser confirm)
    ====================================================================== -->
    <div id="confirm-overlay" class="hidden fixed inset-0 bg-black/40 z-[99999] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
            <div class="text-5xl mb-3">⚠️</div>
            <h3 id="confirm-title" class="text-lg font-bold text-gray-800 mb-1"></h3>
            <p id="confirm-message" class="text-sm text-gray-500 mb-5"></p>
            <div class="flex gap-3">
                <button onclick="confirmResolve(false)"
                    class="flex-1 py-2 rounded-xl font-bold border border-gray-300 text-gray-600 hover:bg-gray-50 transition">
                    Batal
                </button>
                <button onclick="confirmResolve(true)"
                    class="flex-1 py-2 rounded-xl font-bold text-white bg-red-500 hover:bg-red-600 transition">
                    Ya, Lanjutkan
                </button>
            </div>
        </div>
    </div>

    <!-- =====================================================================
         HALAMAN LOGIN
    ====================================================================== -->
    <div id="login-page" class="fixed inset-0 flex items-center justify-center bg-gray-100 z-[9999]">
        <div class="bg-white p-8 rounded-lg shadow-xl w-80 text-center border border-gray-100">
            <div class="flex flex-col items-center mb-4">
                <img src="https://lh3.googleusercontent.com/d/1sy4WhFoKJnGlgFw9j_tnMcNWCxWSA48N" alt="Logo"
                    class="h-20 w-auto max-w-full object-contain mb-2" style="image-rendering:auto;">
            </div>
            <h2 class="text-xl font-bold mb-2 text-gray-700">Login</h2>
            <input type="password" id="passwordInput" onkeydown="if(event.key==='Enter') checkLogin()"
                class="w-full p-2 border border-gray-300 rounded mb-4 focus:ring-2 focus:ring-amber-500 outline-none"
                placeholder="Masukkan Password">
            <button onclick="checkLogin()" style="background-color: #14141e;"
                class="w-full text-white py-2 rounded-full font-bold hover:opacity-90 transition">
                Masuk
            </button>
            <p id="loginError" class="text-red-500 text-sm mt-2 hidden">Password Salah!</p>
            <p style="font-size: 8px; color: #999999; text-align: center; margin-top: 20px;">
                Developed By kelincibulubiru. © NOD. - Internal System 2026
            </p>
        </div>
    </div>

    <!-- =====================================================================
         APP CONTAINER
    ====================================================================== -->
    <div id="app-container" class="hidden h-screen flex-col overflow-hidden">

        <!-- TOPBAR (selalu tampil di atas) -->
        <header
            class="flex-shrink-0 bg-white border-b border-gray-200 px-4 h-14 flex items-center justify-between z-30 shadow-sm">
            <!-- Kiri: tombol toggle sidebar + nama halaman -->
            <div class="flex items-center gap-3">
                <button id="sidebar-toggle" onclick="toggleSidebar()"
                    class="p-2 rounded-lg hover:bg-gray-100 text-gray-600 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <span class="font-bold text-gray-700 text-sm md:text-base" id="page-title">Dashboard</span>
            </div>
            <!-- Kanan: role badge + logout -->
            <div class="flex items-center gap-3 relative">
                <button id="notif-bell-btn" onclick="toggleNotifPopup()"
                    class="hidden relative p-2 rounded-lg hover:bg-gray-100 text-gray-600 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    <span id="notif-bell-dot"
                        class="hidden absolute top-1 right-1 h-2 w-2 rounded-full bg-red-500"></span>
                </button>
                <div id="notif-popup"
                    class="hidden absolute top-12 right-0 w-72 bg-white border border-gray-200 rounded-lg shadow-lg z-50 max-h-80 overflow-y-auto">
                    <div class="p-3 border-b border-gray-100 font-bold text-sm text-gray-700" id="notif-popup-title">
                        PO Ready To Ship
                    </div>
                    <div id="notif-popup-content" class="divide-y divide-gray-100">
                        <div class="p-3 text-sm text-gray-400 text-center">Memuat...</div>
                    </div>
                </div>
                <span id="user-role-badge"
                    class="hidden md:inline-block text-xs font-semibold px-3 py-1 rounded-full bg-amber-100 text-amber-700">
                </span>
                <button onclick="logout()"
                    class="flex items-center gap-1.5 text-sm font-semibold text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1.5 rounded-lg border border-red-200 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1" />
                    </svg>
                    <span class="hidden sm:inline">Logout</span>
                </button>
            </div>
        </header>

        <!-- BODY: sidebar + konten -->
        <div class="flex flex-1 overflow-hidden relative">

            <!-- OVERLAY (klik untuk tutup sidebar di mobile) -->
            <div id="sidebar-overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black/30 z-20 md:hidden">
            </div>

            <!-- SIDEBAR (slide in/out) -->
            <aside id="sidebar" class="absolute md:relative z-30 flex flex-col h-full bg-white border-r border-gray-100 shadow-xl md:shadow-none
                       transition-all duration-300 ease-in-out
                       -translate-x-full md:translate-x-0 w-64 flex-shrink-0">

                <!-- Logo -->
                <div class="p-5 border-b border-gray-100 flex items-center gap-3">
                    <img src="https://lh3.googleusercontent.com/d/1sy4WhFoKJnGlgFw9j_tnMcNWCxWSA48N" alt="Logo"
                        class="h-10 w-auto">
                    <div>
                        <p class="font-bold text-gray-800 text-sm leading-tight">Warehouse</p>
                        <p class="text-amber-500 font-semibold text-xs">Pulogadung</p>
                    </div>
                </div>

                <!-- Nav items -->
                <nav class="flex-1 overflow-y-auto p-3 space-y-1">

                    <!-- Dashboard -->
                    <button onclick="navTo('Dashboard')"
                        class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-700 hover:bg-amber-50 hover:text-amber-600 font-semibold text-sm transition">
                        <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                        </svg>
                        Dashboard
                    </button>

                    <!-- Inventory Machine -->
                    <div id="menu-inventory">
                        <button onclick="toggleSubMenu('inventory-sub','arrow-inventory')"
                            class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-gray-700 hover:bg-amber-50 hover:text-amber-600 font-semibold text-sm transition">
                            <div class="flex items-center gap-3">
                                <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                                </svg>
                                <span>Inventory Machine</span>
                            </div>
                            <span id="arrow-inventory" class="text-xs transition-transform duration-200">▼</span>
                        </button>
                        <div id="inventory-sub" class="hidden ml-7 mt-1 space-y-0.5 border-l-2 border-amber-100 pl-3">
                            <button onclick="navTo('Stock Master')"
                                class="sub-item w-full text-left px-2 py-2 text-sm text-gray-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition">Stock
                                Master</button>
                            <button onclick="navTo('Report Inventory')"
                                class="sub-item w-full text-left px-2 py-2 text-sm text-gray-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition">Report</button>
                        </div>
                    </div>

                    <!-- Plan Task -->
                    <div id="menu-plan-task">
                        <button onclick="toggleSubMenu('plan-task-sub','arrow-plan')"
                            class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-gray-700 hover:bg-amber-50 hover:text-amber-600 font-semibold text-sm transition">
                            <div class="flex items-center gap-3">
                                <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                                </svg>
                                <span>Plan Task</span>
                            </div>
                            <span id="arrow-plan" class="text-xs">▼</span>
                        </button>
                        <div id="plan-task-sub" class="hidden ml-7 mt-1 space-y-0.5 border-l-2 border-amber-100 pl-3">
                            <button onclick="navTo('Plan Task')"
                                class="sub-item w-full text-left px-2 py-2 text-sm text-gray-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition">Plan
                                Task</button>
                            <button onclick="navTo('Report KPI')"
                                class="sub-item w-full text-left px-2 py-2 text-sm text-gray-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition">Report
                                KPI</button>
                        </div>
                    </div>

                    <!-- Maintenance -->
                    <div id="menu-maintenance">
                        <button onclick="toggleSubMenu('maintenance-sub','arrow-maintenance')"
                            class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-gray-700 hover:bg-amber-50 hover:text-amber-600 font-semibold text-sm transition">
                            <div class="flex items-center gap-3">
                                <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                                <span>Maintenance</span>
                            </div>
                            <span id="arrow-maintenance" class="text-xs">▼</span>
                        </button>
                        <div id="maintenance-sub" class="hidden ml-7 mt-1 space-y-0.5 border-l-2 border-amber-100 pl-3">
                            <button onclick="navTo('Report Maintenance')"
                                class="sub-item w-full text-left px-2 py-2 text-sm text-gray-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition">Report
                                Maintenance</button>
                        </div>
                    </div>

                    <!-- Purchase Order -->
                    <div id="menu-po">
                        <button onclick="toggleSubMenu('po-sub','arrow-po')"
                            class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-gray-700 hover:bg-amber-50 hover:text-amber-600 font-semibold text-sm transition">
                            <div class="flex items-center gap-3">
                                <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                                <span>Purchase Order</span>
                            </div>
                            <span id="arrow-po" class="text-xs">▼</span>
                        </button>
                        <div id="po-sub" class="hidden ml-7 mt-1 space-y-0.5 border-l-2 border-amber-100 pl-3">
                            <button onclick="navTo('Purchase Order')"
                                class="sub-item w-full text-left px-2 py-2 text-sm text-gray-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition">Form
                                PO</button>
                            <button onclick="navTo('Report Status')"
                                class="sub-item w-full text-left px-2 py-2 text-sm text-gray-500 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition">Report
                                Status</button>
                        </div>
                    </div>

                    <!-- [TAMBAH MENU BARU DI SINI] -->
                    <!-- Process Inbound Baru -->
                    <button id="menu-process-inbound" onclick="navTo('Process Inbound')"
                        class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-700 hover:bg-amber-50 hover:text-amber-600 font-semibold text-sm transition">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 16l4 4L21 6M3 12h18" />
                        </svg>
                        Process Inbound
                    </button>

                    <!-- Process PO Baru -->
                    <button id="menu-process-po" onclick="navTo('Process PO')"
                        class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-700 hover:bg-amber-50 hover:text-amber-600 font-semibold text-sm transition">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        Process PO
                    </button>

                </nav>

                <!-- Footer sidebar: role info -->
                <div class="p-4 border-t border-gray-100">
                    <div class="flex items-center gap-2 px-2 py-2 rounded-xl bg-gray-50">
                        <div class="w-7 h-7 rounded-full bg-amber-500 flex items-center justify-center flex-shrink-0">
                            <svg class="h-3.5 w-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <div class="overflow-hidden">
                            <p id="user-role-label" class="text-xs font-semibold text-gray-700 truncate"></p>
                            <p class="text-[10px] text-gray-400">Warehouse Pulogadung</p>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- AREA KONTEN UTAMA -->
            <main id="content-area" class="flex-1 p-4 md:p-8 overflow-y-auto bg-gray-50">
                <h1 class="text-3xl font-semibold text-gray-700">Dashboard</h1>
            </main>
        </div>
    </div>

        // =========================================================================
        // LOGIN
        // =========================================================================
        function checkLogin() {
            const pass = document.getElementById('passwordInput').value;
            const error = document.getElementById('loginError');

            if (pass === 'admin123') {
                currentUserRole = 'ADMIN';
                startApp();
            } else if (pass === 'staff123') {
                currentUserRole = 'PO_User';
                startApp();
            } else if (pass === 'warehouse123') {
                currentUserRole = 'WAREHOUSE';
                startApp();
            } else {
                error.classList.remove('hidden');
                return;
            }
            error.classList.add('hidden');
        }

        /** Tampilkan app sesuai role setelah login berhasil */
        function startApp() {
            document.getElementById('login-page').classList.add('hidden');

            const app = document.getElementById('app-container');
            app.classList.remove('hidden');
            app.classList.add('flex');

            // Update label role di sidebar footer dan topbar badge
            const roleLabel = document.getElementById('user-role-label');
            const roleBadge = document.getElementById('user-role-badge');
            if (currentUserRole === 'ADMIN') {
                if (roleLabel) roleLabel.textContent = 'Administrator';
                if (roleBadge) { roleBadge.textContent = 'Admin'; roleBadge.classList.remove('hidden'); }
            } else if (currentUserRole === 'WAREHOUSE') {
                if (roleLabel) roleLabel.textContent = 'Team Warehouse';
                if (roleBadge) { roleBadge.textContent = 'Warehouse'; roleBadge.classList.remove('hidden'); }
            } else {
                if (roleLabel) roleLabel.textContent = 'PO User';
                if (roleBadge) { roleBadge.textContent = 'PO User'; roleBadge.classList.remove('hidden'); }
            }

            // Sidebar di desktop: tampil default terbuka
            if (window.innerWidth >= 768) {
                document.getElementById('sidebar').classList.remove('-translate-x-full');
                sidebarOpen = false; // di desktop tidak pakai overlay
            }

            if (currentUserRole === 'PO_User') {
                // Staff: hanya bisa akses Purchase Order, Process PO TERSEMBUNYI
                document.getElementById('menu-inventory').classList.add('hidden');
                document.getElementById('menu-plan-task').classList.add('hidden');
                document.getElementById('menu-maintenance').classList.add('hidden');
                document.getElementById('menu-process-po').classList.add('hidden');
                document.getElementById('menu-process-inbound').classList.add('hidden');
                // Buka PO submenu otomatis
                document.getElementById('po-sub').classList.remove('hidden');
                document.getElementById('arrow-po').textContent = '▲';
                navTo('Purchase Order');

                // Tampilkan tombol notifikasi & load data Ready To Ship
                const bellBtn = document.getElementById('notif-bell-btn');
                if (bellBtn) bellBtn.classList.remove('hidden');
                loadNotifReadyToShip();
            } else if (currentUserRole === 'WAREHOUSE') {
                // Team Warehouse: hanya tampilkan menu Process PO
                document.getElementById('menu-inventory').classList.add('hidden');
                document.getElementById('menu-plan-task').classList.add('hidden');
                document.getElementById('menu-maintenance').classList.add('hidden');
                document.getElementById('menu-po').classList.add('hidden');
                document.getElementById('menu-process-po').classList.remove('hidden');
                document.getElementById('menu-process-inbound').classList.remove('hidden');
                navTo('Process PO');

                // Tampilkan tombol notifikasi & load data Open
                const bellBtn2 = document.getElementById('notif-bell-btn');
                if (bellBtn2) bellBtn2.classList.remove('hidden');
                loadNotifReadyToShip();
            } else {
                // ADMIN: semua menu tampil termasuk Process PO
                document.getElementById('menu-process-po').classList.remove('hidden');
                document.getElementById('menu-process-inbound').classList.remove('hidden');
                navTo('Dashboard');
            }
        }

        /** Logout: reset state dan kembali ke halaman login */
        function logout() {
            if (!confirm('Yakin ingin logout?')) return;

            // Reset role
            currentUserRole = '';

            // Reset form password
            document.getElementById('passwordInput').value = '';
            document.getElementById('loginError').classList.add('hidden');

            // Sembunyikan app, tampilkan login
            const app = document.getElementById('app-container');
            app.classList.add('hidden');
            app.classList.remove('flex');
            document.getElementById('login-page').classList.remove('hidden');

            // Reset visibilitas menu
            document.getElementById('menu-inventory').classList.remove('hidden');
            document.getElementById('menu-plan-task').classList.remove('hidden');
            document.getElementById('menu-maintenance').classList.remove('hidden');
            document.getElementById('menu-po').classList.remove('hidden');
            document.getElementById('menu-process-po').classList.remove('hidden');
            document.getElementById('menu-process-inbound').classList.remove('hidden');

            // Reset badge dan label role
            const roleBadge = document.getElementById('user-role-badge');
            if (roleBadge) roleBadge.classList.add('hidden');
            document.getElementById('page-title').textContent = 'Dashboard';

            // Sembunyikan notifikasi bell & popup
            const bellBtn = document.getElementById('notif-bell-btn');
            if (bellBtn) bellBtn.classList.add('hidden');
            const notifPopup = document.getElementById('notif-popup');
            if (notifPopup) notifPopup.classList.add('hidden');

            // Reset sidebar ke posisi tertutup (mobile)
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.add('hidden');
            sidebarOpen = false;

            // Reset po-sub
            document.getElementById('po-sub').classList.add('hidden');
            document.getElementById('arrow-po').textContent = '▼';

            // Reset konten area
            document.getElementById('content-area').innerHTML =
                '<h1 class="text-3xl font-semibold text-gray-700">Dashboard</h1>';
        }

        // =========================================================================
        // NOTIFIKASI: PO Ready To Ship (untuk PO_User)
        // =========================================================================

        /** Tampilkan/sembunyikan popup notifikasi */
        function toggleNotifPopup() {
            const popup = document.getElementById('notif-popup');
            if (!popup) return;
            const willShow = popup.classList.contains('hidden');
            if (willShow) {
                popup.classList.remove('hidden');
                loadNotifReadyToShip();
                // Tutup popup jika klik di luar
                setTimeout(() => {
                    document.addEventListener('click', closeNotifPopupOutside);
                }, 0);
            } else {
                popup.classList.add('hidden');
                document.removeEventListener('click', closeNotifPopupOutside);
            }
        }

        /** Handler untuk menutup popup notifikasi saat klik di luar area */
        function closeNotifPopupOutside(e) {
            const popup = document.getElementById('notif-popup');
            const bellBtn = document.getElementById('notif-bell-btn');
            if (!popup || !bellBtn) return;
            if (!popup.contains(e.target) && !bellBtn.contains(e.target)) {
                popup.classList.add('hidden');
                document.removeEventListener('click', closeNotifPopupOutside);
            }
        }

        /** Ambil data PO sesuai status target role lalu tampilkan di popup notifikasi */
        async function loadNotifReadyToShip() {
            const contentEl = document.getElementById('notif-popup-content');
            const dotEl = document.getElementById('notif-bell-dot');
            const titleEl = document.getElementById('notif-popup-title');
            if (!contentEl) return;

            // Tentukan status target & label sesuai role
            const targetStatus = currentUserRole === 'WAREHOUSE' ? 'Open' : 'Ready To Ship';
            const badgeClass = currentUserRole === 'WAREHOUSE'
                ? 'bg-red-100 text-red-700'
                : 'bg-blue-100 text-blue-700';
            if (titleEl) titleEl.textContent = `PO ${targetStatus}`;

            try {
                let data = [];
                try {
                    const res1 = await fetch(API_URLS.reportStatus + '?action=getPOData');
                    const raw1 = await res1.json();
                    data = Array.isArray(raw1) ? raw1 : [];
                } catch (_) { }

                if (data.length === 0) {
                    const res2 = await fetch(API_URLS.reportStatus);
                    const raw2 = await res2.json();
                    data = Array.isArray(raw2) ? raw2 : [];
                }

                const filteredRows = data.slice(1).filter(row => {
                    const noPO = String(row[1] || '').trim();
                    const statusRaw = row[4] ? row[4].toString().trim() : '';
                    if (noPO === '') return false;
                    if (targetStatus === 'Open') {
                        // Anggap PO "Open" jika status kosong atau bukan Ready To Ship/Closed
                        return statusRaw !== 'Ready To Ship' && statusRaw !== 'Closed';
                    }
                    return statusRaw === targetStatus;
                });

                if (dotEl) {
                    if (filteredRows.length > 0) dotEl.classList.remove('hidden');
                    else dotEl.classList.add('hidden');
                }

                if (filteredRows.length === 0) {
                    contentEl.innerHTML = `<div class="p-3 text-sm text-gray-400 text-center">Tidak ada PO ${targetStatus}.</div>`;
                    return;
                }

                contentEl.innerHTML = filteredRows.map(row => {
                    const noPO = row[1] || '-';
                    const nama = row[2] || '-';
                    return `
                    <div class="p-3 hover:bg-blue-50 transition">
                        <p class="text-sm font-semibold text-gray-700 font-mono">${noPO}</p>
                        <p class="text-xs text-gray-500">${nama}</p>
                        <span class="inline-block mt-1 px-2 py-0.5 rounded-full text-[10px] font-bold ${badgeClass}">${targetStatus}</span>
                    </div>`;
                }).join('');
            } catch (err) {
                contentEl.innerHTML = `<div class="p-3 text-sm text-red-400 text-center">Gagal memuat notifikasi.</div>`;
            }
        }

            </div>`;
        }

        // =========================================================================
        // MODAL ALERT & CONFIRM (pengganti browser alert/confirm)
        // =========================================================================
        function showAlert(type, title, message) {
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            const colors = {
                success: 'bg-green-500 hover:bg-green-600',
                error: 'bg-red-500 hover:bg-red-600',
                info: 'bg-blue-500 hover:bg-blue-600',
                warning: 'bg-amber-500 hover:bg-amber-600',
            };
            document.getElementById('modal-icon').textContent = icons[type] || icons.info;
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('modal-btn').className =
                `w-full py-2 rounded-xl font-bold text-white transition ${colors[type] || colors.info}`;
            document.getElementById('modal-overlay').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
        }

        // Menutup modal jika klik di luar kotak
        document.getElementById('modal-overlay').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        let confirmResolve = null;
        function showConfirm(title, message) {
            return new Promise(resolve => {
                document.getElementById('confirm-title').textContent = title;
                document.getElementById('confirm-message').textContent = message;
                document.getElementById('confirm-overlay').classList.remove('hidden');
                confirmResolve = (result) => {
                    document.getElementById('confirm-overlay').classList.add('hidden');
                    resolve(result);
                };
            });
        }

        // =========================================================================
        // SIDEBAR TOGGLE
        // =========================================================================
        let sidebarOpen = false;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebarOpen = !sidebarOpen;

            if (sidebarOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');

            if (window.innerWidth >= 768 && sidebarOpen) {
                document.getElementById('sidebar-overlay').classList.add('hidden');

            const subMenu = document.getElementById(menuId);
            const arrow = document.getElementById(arrowId);
            subMenu.classList.toggle('hidden');
            arrow.textContent = subMenu.classList.contains('hidden') ? '▼' : '▲';

                el.classList.add('text-gray-700');

        // =========================================================================
        async function showPlanTask() {
            setLoading();
            const contentArea = document.getElementById('content-area');
            try {
                const response = await fetch(API_URLS.planTask);
                const data = await response.json();
                const taskData = data.slice(1).filter(row =>
                    row[0] && !row[0].toString().includes('Tidak ada tugas aktif') && row[0] !== ''
                );

                if (taskData.length === 0) {
                    contentArea.innerHTML = `
                    <h1 class="text-3xl font-semibold text-gray-700 mb-6">Plan Task</h1>
                    <div class="flex flex-col items-center justify-center h-64 bg-white rounded-lg border border-gray-300 shadow-sm">
                        <p class="text-4xl mb-4">✅</p>
                        <p class="text-xl font-bold text-gray-600">Task Clear</p>
                        <p class="text-gray-400">Tidak ada tugas yang perlu dikerjakan saat ini.</p>
                    </div>`;
                    return;
                }

                function formatDeadline(cell) {
                    const raw = String(cell).trim();
                    if (!raw.includes('T')) return raw;
                    const date = new Date(raw.split('T')[0]);
                    date.setDate(date.getDate() + 1);
                    const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
                    return `${String(date.getDate()).padStart(2, '0')}-${months[date.getMonth()]}-${date.getFullYear()}`;
                }

                let rows_html = '';
                taskData.forEach(row => {
                    rows_html += '<tr class="hover:bg-gray-50 text-xs">';
                    row.forEach((cell, index) => {
                        let value = String(cell || '-').trim();
                        if (index === 0 || index === 2) {
                            value = value.split('\n').map(t => t.replace(/^- /, '').trim()).filter(t => t !== '').join('<br>');
                        } else if (index === 1) {
                            value = formatDeadline(cell);
                        } else if (index === 4) {
                            const statuses = value.split('\n').map(s => s.replace(/^- /, '').trim()).filter(s => s !== '' && s !== '-');
                            value = [...new Set(statuses)].join('<br>');
                        }
                        const extra = index === 1 ? 'whitespace-nowrap' : '';
                        rows_html += `<td class="p-3 border-r border-gray-200 text-center ${extra}">${value}</td>`;
                    });
                    rows_html += '</tr>';
                });

                contentArea.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-semibold text-gray-700">Task</h1>
                    <button id="shareBtn" onclick="shareToWhatsApp()"
                        class="bg-gray-700 text-white px-4 py-2 rounded-lg font-bold hover:bg-gray-800 shadow-md text-sm">
                        Share to WhatsApp
                    </button>
                </div>
                <div id="captureArea" class="bg-white p-8 border border-gray-200">
                    <h1 class="text-3xl font-semibold text-gray-700 mb-6">Plan Task</h1>
                    <div class="rounded-lg shadow-sm border border-gray-300 overflow-hidden">
                        <table class="w-full border-collapse">
                            <thead>
                                <tr class="bg-gray-100 border-b border-gray-300 text-gray-700 text-xs">
                                    ${data[0].map(h => `<th class="p-3 text-center border-r">${h}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody class="text-gray-600 divide-y divide-gray-200">${rows_html}</tbody>
                        </table>
                    </div>
                </div>`;
            } catch (err) { setError(err.message); }
        }

        // =========================================================================

        // =========================================================================
        async function showReportKPI() {
            setLoading('Memuat data KPI...');
            const contentArea = document.getElementById('content-area');
            try {
                const response = await fetch(API_URLS.reportKPI);
                const data = await response.json();

                function renderTable(title, startRow, endRow, colStart, colEnd) {
                    const activeCols = [];
                    for (let j = colStart; j <= colEnd; j++) {
                        const hasData = Array.from({ length: endRow - startRow }, (_, k) => startRow + 1 + k)
                            .some(i => { const cell = data[i]?.[j]; return cell !== '' && cell !== '-' && cell != null; });
                        if (hasData || j === colStart) activeCols.push(j);
                    }
                    let html = `
                    <h2 class="text-sm font-bold text-gray-700 mt-8 mb-3">${title}</h2>
                    <div class="overflow-x-auto bg-white shadow-sm border border-gray-200 rounded-lg">
                        <table class="w-full text-xs border-collapse">
                            <thead><tr class="bg-gray-800 text-white">
                                ${activeCols.map(j => `<th class="p-3 border-r border-gray-600 text-center">${data[startRow][j] || ''}</th>`).join('')}
                            </tr></thead>
                            <tbody class="divide-y divide-gray-200">`;
                    for (let i = startRow + 1; i <= endRow; i++) {
                        if (!data[i]) continue;
                        const rowData = activeCols.map(j => data[i][j]);
                        const isRowEmpty = rowData.slice(1).every(c => !c || c === '-' || c === '');
                        if (isRowEmpty) continue;
                        const isTotal = String(data[i][colStart]).toLowerCase().includes('total');
                        html += `<tr class="${isTotal ? 'bg-amber-100 font-bold' : 'hover:bg-gray-50'}">`;
                        activeCols.forEach(j => {
                            const cell = data[i][j];
                            html += `<td class="p-3 border-r text-center">${(cell === '' || cell == null) ? '-' : cell}</td>`;
                        });
                        html += '</tr>';
                    }
                    html += '</tbody></table></div>';
                    return html;
                }

                function renderProductivityTable(title, startRow, endRow) {
                    const VALID_NAMES = ["Rizal", "Adam", "Helmi", "Raka"];
                    let html = `
                    <h2 class="text-sm font-bold text-gray-700 mt-8 mb-3">${title}</h2>
                    <div class="overflow-x-auto bg-white shadow-sm border border-gray-200 rounded-lg">
                        <table class="w-full text-xs border-collapse">
                            <thead><tr class="bg-gray-800 text-white">
                                <th class="p-3 border-r border-gray-600 text-center">Nama</th>
                                <th class="p-3 border-r border-gray-600 text-center">Loading</th>
                                <th class="p-3 border-r border-gray-600 text-center">Prepare</th>
                                <th class="p-3 border-r border-gray-600 text-center">Support</th>
                                <th class="p-3 border-r border-gray-600 text-center">Perapihan</th>
                            </tr></thead>
                            <tbody class="divide-y divide-gray-200">`;
                    for (let i = startRow; i <= endRow; i++) {
                        if (!data[i]) continue;
                        const nama = data[i].find(c => VALID_NAMES.includes(c));
                        if (!nama) continue;
                        const angka = data[i].filter(c => !isNaN(c) && c !== '' && c != null && !VALID_NAMES.includes(c));
                        html += `
                        <tr class="hover:bg-gray-50">
                            <td class="p-3 border-r font-bold text-center bg-gray-50">${nama}</td>
                            <td class="p-3 border-r text-center">${angka[0] || '0'}</td>
                            <td class="p-3 border-r text-center">${angka[1] || '0'}</td>
                            <td class="p-3 border-r text-center">${angka[2] || '0'}</td>
                            <td class="p-3 border-r text-center">${angka[3] || '0'}</td>
                        </tr>`;
                    }
                    html += '</tbody></table></div>';
                    return html;
                }

                let content = '<h1 class="text-xl font-bold mb-4">Report KPI</h1>';
                content += renderTable("Report KPI Mingguan", 1, 6, 7, 11);
                content += renderTable("Report KPI Bulanan", 1, 6, 0, 5);
                content += renderTable("Tren Activity/Bulan", 16, 20, 6, 9);
                content += renderProductivityTable("Productivity/Bulan", 22, 27);
                contentArea.innerHTML = content;
            } catch (err) { setError(err.message); }
        }

        function updatePOPreview() {
            const category = document.getElementById('category').value;
            const preview = document.getElementById('po-preview');
            if (!category || !CATEGORY_CODE[category]) {
                preview.textContent = 'Pilih kategori untuk melihat preview No. PO';
                preview.className = 'w-full p-3 border border-gray-200 rounded-lg bg-gray-100 text-gray-500 text-sm font-mono tracking-wide';
                return;
            }
            preview.textContent = `${CATEGORY_CODE[category]}-${formatDateForPO(new Date())}-?`;
            preview.className = 'w-full p-3 border border-amber-200 rounded-lg bg-amber-50 text-amber-700 text-sm font-mono tracking-wide font-bold';
        }

        /** Auto-trigger No. PO preview when item table gets first row filled */
        function checkAutoTriggerPOPreview() {
            const category = document.getElementById('category');
            const preview = document.getElementById('po-preview');
            if (!category || !preview) return;
            // Only auto-trigger if category already selected but preview not yet shown
            const hasCategory = category.value && CATEGORY_CODE[category.value];
            if (hasCategory) return; // already triggered via onchange
            const tbody = document.getElementById('po-item-table-body');
            if (!tbody) return;
            const hasItem = tbody.querySelectorAll('tr:not([data-placeholder])').length > 0;
            if (hasItem && category.value) {
                updatePOPreview();
            }
        }

        async function submitPO() {
            const namaEl = document.getElementById('nama');
            const categoryEl = document.getElementById('category');
            const allocatedToEl = document.getElementById('allocated-to');
            const fileInput = document.getElementById('pdfFile');
            const btn = document.getElementById('submitBtn');
            const btnLabel = document.getElementById('submitBtnLabel');

            if (!namaEl.value) { alert('Pilih nama pemohon terlebih dahulu.'); return; }
            if (!categoryEl.value) { alert('Pilih kategori terlebih dahulu.'); return; }
            const file = fileInput.files[0];
            if (!file) { alert('Pilih file PDF terlebih dahulu.'); return; }

            const setSubmitLoading = (loading) => {
                btn.disabled = loading;
                let spinner = btn.querySelector('.submit-spinner');
                if (loading) {
                    if (!spinner) {
                        spinner = document.createElement('svg');
                        spinner.className = 'submit-spinner animate-spin h-4 w-4 flex-shrink-0';
                        spinner.setAttribute('viewBox', '0 0 24 24');
                        spinner.setAttribute('fill', 'none');
                        spinner.innerHTML = '<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>';
                        btn.insertBefore(spinner, btnLabel);
                    }
                    btnLabel.textContent = 'Mengirim...';
                } else {
                    if (spinner) spinner.remove();
                    btnLabel.textContent = 'Kirim PO';
                }
            };

            setSubmitLoading(true);

            const reader = new FileReader();
            reader.onload = async function (e) {
                const payload = {
                    action: 'submitPO',
                    nama: namaEl.value,
                    category: categoryEl.value,
                    categoryCode: CATEGORY_CODE[categoryEl.value],
                    allocatedTo: allocatedToEl ? allocatedToEl.value.trim() : '',
                    tanggal: formatDateForPO(new Date()),
                    fileData: e.target.result.split(',')[1],
                    fileName: file.name,
                    fileType: file.type,
                };
                try {
                    const response = await fetch(API_URLS.purchaseOrder, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await response.json();
                    alert('Berhasil! No. PO: ' + result.po);
                    resetFormPO();
                } catch (err) {
                    alert('Gagal kirim: ' + err.message);
                } finally {
                    setSubmitLoading(false);
                }
            };
            reader.readAsDataURL(file);
        }

        /** Reset semua kotak pengisian di Form PO agar siap digunakan kembali */
        function resetFormPO() {
            const namaEl = document.getElementById('nama');
            const categoryEl = document.getElementById('category');
            const allocatedToEl = document.getElementById('allocated-to');
            const alamatEl = document.getElementById('po-alamat');

            if (phoneEl) phoneEl.value = '';
            if (shippingDateEl) shippingDateEl.value = '';
            if (fileInput) fileInput.value = '';

        function tambahBarisFormPO() {
            const tbody = document.getElementById('po-item-table-body');

            const placeholder = tbody.querySelector('tr[data-placeholder]');
            if (placeholder) placeholder.remove();

            const DESCRIPTION_OPTIONS = ['Supplies', 'Sampling', 'Machine Selling', 'Machine Display', 'Capsule Selling', 'Machine Event'];
            const UOM_OPTIONS = ['Pcs', 'Box', 'Unit', 'Pack', 'Karton', 'Kg', 'Ltr', 'Lusin', 'Set', 'Roll', 'Sheet', 'Btl', 'Dus', 'Meter'];
            const descOpts = DESCRIPTION_OPTIONS.map(o => `<option value="${o}">${o}</option>`).join('');
            const uomOpts = UOM_OPTIONS.map(o => `<option value="${o}">${o}</option>`).join('');

            const bg = tbody.querySelectorAll('tr').length % 2 === 0 ? 'bg-white' : 'bg-gray-50';
            const tr = document.createElement('tr');
            tr.className = `${bg} border-b border-gray-100`;

            tr.innerHTML = `
                <td class="p-2 font-medium relative">
                    <div class="relative">
                        <input type="text"
                            class="po-item-nama w-full p-1 border border-gray-300 rounded text-xs focus:ring-1 focus:ring-amber-400 outline-none"
                            placeholder="Ketik/pilih item..."
                            autocomplete="off">
                        <ul class="autocomplete-list absolute z-50 left-0 top-full mt-0.5 w-64 bg-white border border-gray-200 rounded-lg shadow-lg max-h-48 overflow-y-auto hidden text-xs"></ul>
                    </div>
                </td>
                <td class="p-2 text-center">
                    <input type="number" min="1" value="1" class="po-item-qty w-full p-1 border border-gray-300 rounded text-center text-xs focus:ring-1 focus:ring-amber-400 outline-none">
                </td>
                <td class="p-2 text-center">
                    <select class="po-item-uom w-full text-xs border border-gray-200 rounded p-1 focus:ring-1 focus:ring-amber-400 outline-none bg-white">
                        ${uomOpts}
                    </select>
                </td>
                <td class="p-2">
                    <select class="po-item-desc w-full text-xs border border-gray-200 rounded p-1 focus:ring-1 focus:ring-amber-400 outline-none bg-white">${descOpts}</select>
                </td>
                <td class="p-2">
                    <input type="text" class="po-item-note w-full p-1 border border-gray-300 rounded text-xs focus:ring-1 focus:ring-amber-400 outline-none" placeholder="Catatan...">
                </td>
                <td class="p-2 text-center">
                    <button onclick="hapusBarisFormPO(this)" title="Hapus baris"
                        class="text-red-400 hover:text-red-600 hover:bg-red-50 rounded p-1 transition">
                        <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </td>`;

            tbody.appendChild(tr);

            // Auto-show No. PO preview when first row is added
            checkAutoTriggerPOPreview();

            // Autocomplete logic
            const input = tr.querySelector('.po-item-nama');
            const list = tr.querySelector('.autocomplete-list');

            function renderList(filtered) {
                list.innerHTML = '';
                if (filtered.length === 0) { list.classList.add('hidden'); return; }
                filtered.forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    li.className = 'px-3 py-2 hover:bg-amber-50 hover:text-amber-700 cursor-pointer transition';
                    li.onmousedown = (e) => {
                        e.preventDefault();
                        input.value = item;
                        list.classList.add('hidden');
                    };
                    list.appendChild(li);
                });
                list.classList.remove('hidden');
            }

            input.addEventListener('input', async () => {
                const q = input.value.trim().toLowerCase();
                if (!q) { list.classList.add('hidden'); return; }
                const items = await getSourceItems();
                const filtered = items.filter(i => i.toLowerCase().includes(q)).slice(0, 20);
                renderList(filtered);
            });

            input.addEventListener('focus', async () => {
                const q = input.value.trim().toLowerCase();
                if (q) {
                    const items = await getSourceItems();
                    const filtered = items.filter(i => i.toLowerCase().includes(q)).slice(0, 20);
                    renderList(filtered);
                }
            });

            input.addEventListener('blur', () => {
                setTimeout(() => list.classList.add('hidden'), 150);
            });

            input.addEventListener('keydown', (e) => {
                const lis = list.querySelectorAll('li');
                const active = list.querySelector('li.bg-amber-100');
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    const next = active ? active.nextElementSibling : lis[0];
                    if (active) active.classList.remove('bg-amber-100');
                    if (next) next.classList.add('bg-amber-100');
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    const prev = active ? active.previousElementSibling : lis[lis.length - 1];
                    if (active) active.classList.remove('bg-amber-100');
                    if (prev) prev.classList.add('bg-amber-100');
                } else if (e.key === 'Enter') {
                    if (active) { e.preventDefault(); input.value = active.textContent; list.classList.add('hidden'); }
                } else if (e.key === 'Escape') {
                    list.classList.add('hidden');
                }
            });

            input.focus();
        }

        function hapusBarisFormPO(btn) {
            const tr = btn.closest('tr');
            const tbody = document.getElementById('po-item-table-body');
            if (!tbody) return;
            tr.remove();
            if (tbody.querySelectorAll('tr').length === 0) {
                tbody.innerHTML = '<tr data-placeholder><td colspan="6" class="p-6 text-center text-gray-400 italic">Klik "Tambah Baris" untuk menambah item</td></tr>';
            }
        }

        async function downloadRequestOrderPDFInner() {
            const namaEl = document.getElementById('nama');
            const categoryEl = document.getElementById('category');
            const allocatedToEl = document.getElementById('allocated-to');
            const poPreview = document.getElementById('po-preview');

            const orderedBy = namaEl ? namaEl.value : '';
            const allocatedTo = allocatedToEl ? allocatedToEl.value.trim() : '';
            const alamat = document.getElementById('po-alamat')?.value?.trim() || '';
            const phone = document.getElementById('po-phone')?.value?.trim() || '';
            const shippingDateRaw = document.getElementById('po-shipping-date')?.value || '';
            const shippingDate = shippingDateRaw ? formatTanggalIndo(shippingDateRaw) : '-';
            const noPO = poPreview ? poPreview.textContent.trim() : '';

            // Ambil item dari tabel
            const rows = document.querySelectorAll('#po-item-table-body tr:not([data-placeholder])');
            const items = [];
            rows.forEach(row => {
                const nama = row.querySelector('.po-item-nama')?.value?.trim() || '';
                if (!nama) return;
                const qty = row.querySelector('.po-item-qty')?.value || '1';
                const uom = row.querySelector('.po-item-uom')?.value || '-';
                const description = row.querySelector('.po-item-desc')?.value || '-';
                const note = row.querySelector('.po-item-note')?.value?.trim() || '';
                items.push({ nama, qty, uom, description, note });
            });

            if (items.length === 0) {
                showAlert('warning', 'Tabel Kosong', 'Tambahkan minimal satu item sebelum download.');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            const pageWidth = doc.internal.pageSize.getWidth();
            const marginX = 14;
            const today = new Date().toISOString().split('T')[0];

            // ── Hitung No. PO berikutnya dari data yang sudah ada ──
            let resolvedPONumber = null;
            if (categoryEl && categoryEl.value && CATEGORY_CODE[categoryEl.value]) {
                const catCode = CATEGORY_CODE[categoryEl.value];
                const dateStr = formatDateForPO(new Date());
                const prefix = `${catCode}-${dateStr}-`;
                try {
                    let poData = [];
                    try {
                        const r = await fetch(API_URLS.reportStatus + '?action=getPOData');
                        const raw = await r.json();
                        poData = Array.isArray(raw) ? raw : [];
                    } catch (_) {}
                    if (poData.length === 0) {
                        const r2 = await fetch(API_URLS.reportStatus);
                        const raw2 = await r2.json();
                        poData = Array.isArray(raw2) ? raw2 : [];
                    }
                    // Cari sequence tertinggi dengan prefix yang sama
                    let maxSeq = 0;
                    poData.slice(1).forEach(row => {
                        const no = String(row[1] || '').trim();
                        if (no.startsWith(prefix)) {
                            const seq = parseInt(no.replace(prefix, ''), 10);
                            if (!isNaN(seq) && seq > maxSeq) maxSeq = seq;
                        }
                    });
                    resolvedPONumber = `${prefix}${maxSeq + 1}`;
                } catch (_) {}
            }

            // ── Header Background Image ──
            try {
                doc.addImage(HEADER_BG_IMG, 'PNG', 0, 0, pageWidth, 32);
            } catch (_) { /* skip if fails */ }

            // ── Logo NOD ──
            const logoData = await loadImageAsDataURL(NOD_LOGO_URL);
            let logoBottomY = 18;
            if (logoData) {
                try {
                    const dims = getImageFitDims(logoData, 26, 14);
                    doc.addImage(logoData.dataUrl, logoData.format, marginX, 8, dims.w, dims.h);
                    logoBottomY = 8 + dims.h;
                } catch (_) {
                    drawFallbackLogo(doc, marginX);
                    logoBottomY = 22;
                }
            } else {
                drawFallbackLogo(doc, marginX);
                logoBottomY = 22;
            }

            // ── Tagline ──
            doc.setFont('helvetica', 'italic');
            doc.setFontSize(7.5);
            doc.setTextColor(120, 113, 108);
            doc.text('Your All-in-One Drink Maker', marginX, logoBottomY + 4);

            // ── Judul Dokumen: REQUEST ORDER ──
            doc.setTextColor(17, 24, 39);
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(16);
            doc.text('REQUEST ORDER', pageWidth - marginX, 16, { align: 'right' });
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(9);
            doc.setTextColor(107, 114, 128);
            const poLabel = resolvedPONumber || (noPO && noPO !== 'Pilih kategori untuk melihat preview No. PO' ? noPO : '-');
            doc.text('No. PO: ' + poLabel, pageWidth - marginX, 22, { align: 'right' });

            // Garis pemisah
            doc.setDrawColor(229, 231, 235);
            doc.setLineWidth(0.4);
            doc.line(marginX, 28, pageWidth - marginX, 28);

            // ── Info Box ──
            let y = 36;
            doc.setFontSize(10);
            doc.setTextColor(31, 41, 55);

            const infoLeft = [
                ['Tanggal', formatTanggalIndo(today)],
                ['No. PO', poLabel],
                ['Ordered By', orderedBy || '-'],
                ['Phone', phone || '-'],
            ];
            const infoRight = [
                ['Kategori', categoryEl ? categoryEl.value || '-' : '-'],
                ['Ship To', allocatedTo || '-'],
                ['Alamat', alamat || '-'],
                ['Shipping Date', shippingDate],
            ];

            const colLeftX = marginX;
            const colLeftLabelW = 28;
            const colRightX = pageWidth / 2 + 4;
            const colRightLabelW = 28;
            const lineH = 6;
            const colRightValueX = colRightX + colRightLabelW + 3;
            const colRightMaxW = pageWidth - marginX - colRightValueX;

            // Render left column (no wrapping needed)
            infoLeft.forEach((row, i) => {
                const yy = y + i * lineH;
                doc.setFont('helvetica', 'bold'); doc.text(row[0], colLeftX, yy);
                doc.setFont('helvetica', 'normal'); doc.text(':', colLeftX + colLeftLabelW, yy);
                doc.text(String(row[1] || '-'), colLeftX + colLeftLabelW + 3, yy);
            });

            // Render right column with text wrapping (justify) for multi-line values
            let rightY = y;
            infoRight.forEach((row) => {
                if (!row[0]) return;
                doc.setFont('helvetica', 'bold'); doc.text(row[0], colRightX, rightY);
                doc.setFont('helvetica', 'normal'); doc.text(':', colRightX + colRightLabelW, rightY);
                const wrapped = doc.splitTextToSize(String(row[1] || '-'), colRightMaxW);
                doc.text(wrapped, colRightValueX, rightY);
                rightY += lineH * wrapped.length;
            });

            y += Math.max(infoLeft.length * lineH, rightY - y) + 6;

            // ── Tabel Item ──
            const tableBody = items.map((it, idx) => [
                String(idx + 1),
                it.nama,
                it.qty || '-',
                it.uom || '-',
                it.description || '-',
                it.note || '-'
            ]);

            doc.autoTable({
                startY: y,
                head: [['No', 'Item', 'Qty', 'UOM', 'Description', 'Note']],
                body: tableBody,
                theme: 'grid',
                styles: { font: 'helvetica', fontSize: 8.5, cellPadding: 2.2, valign: 'middle' },
                headStyles: { fillColor: [31, 41, 55], textColor: 255, fontStyle: 'bold', halign: 'center' },
                columnStyles: {
                    0: { halign: 'center', cellWidth: 9 },
                    2: { halign: 'center', cellWidth: 16 },
                    3: { halign: 'center', cellWidth: 18 },
                    5: { cellWidth: 35 },
                },
                margin: { left: marginX, right: marginX },
            });

            // ── Tanda Tangan ──
            let finalY = doc.lastAutoTable.finalY + 18;
            const pageHeight = doc.internal.pageSize.getHeight();
            if (finalY > pageHeight - 90) { doc.addPage(); finalY = 30; }

            const sigColW = (pageWidth - marginX * 2) / 3;
            const sigLabels = ['Diminta oleh,', 'Disetujui oleh,', 'Diterima oleh,'];

        }
