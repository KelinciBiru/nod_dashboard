        /** Kumpulkan isi field Process Inbound (termasuk baris item dinamis) jadi draft */
        function _collectProcessInboundDraft() {
            const tbody = document.getElementById('inb-table-body');
            const items = [];
            if (tbody) {
                tbody.querySelectorAll('tr:not([data-placeholder])').forEach(tr => {
                    items.push({
                        nama: tr.querySelector('.nama-barang-input')?.value || '',
                        qty: tr.querySelector('.qty-input')?.value || '',
                        serial: tr.querySelector('.serial-input')?.value || '',
                        remark: tr.querySelector('.remark-input')?.value || ''
                    });
                });
            }
            return {
                tanggal: document.getElementById('inb-tanggal')?.value || '',
                exLokasi: document.getElementById('inb-ex-lokasi')?.value || '',
                crew: document.getElementById('inb-crew')?.value || '',
                category: document.getElementById('inb-category')?.value || '',
                items
            };
        }

        /** Restore isian Process Inbound dari draft tersimpan (jika ada) */
        function _restoreProcessInboundDraft() {
            const draft = _loadDraft(DRAFT_KEYS.processInbound);
            if (!draft) return;

            if (draft.tanggal) document.getElementById('inb-tanggal').value = draft.tanggal;
            if (draft.exLokasi) document.getElementById('inb-ex-lokasi').value = draft.exLokasi;
            if (draft.crew) document.getElementById('inb-crew').value = draft.crew;
            if (draft.category) document.getElementById('inb-category').value = draft.category;

            if (Array.isArray(draft.items) && draft.items.length > 0) {
                draft.items.forEach(item => {
                    tambahBarisInbound();
                    const tbody = document.getElementById('inb-table-body');
                    const tr = tbody.querySelector('tr:last-child');
                    if (!tr) return;
                    if (tr.querySelector('.nama-barang-input')) tr.querySelector('.nama-barang-input').value = item.nama || '';
                    if (tr.querySelector('.qty-input')) tr.querySelector('.qty-input').value = item.qty || '1';
                    if (tr.querySelector('.serial-input')) tr.querySelector('.serial-input').value = item.serial || '';
                    if (tr.querySelector('.remark-input')) tr.querySelector('.remark-input').value = item.remark || '';
                });
            }
        }

        /** Pasang listener input/change pada semua field Process Inbound agar autosave ke draft.
         *  Melepas listener lama dulu (jika ada) agar tidak menumpuk setiap kali
         *  halaman Process Inbound dibuka ulang. */
        let _processInboundAutosaveHandler = null;
        function _attachProcessInboundAutosave() {
            const contentArea = document.getElementById('content-area');
            if (!contentArea) return;
            if (_processInboundAutosaveHandler) {
                contentArea.removeEventListener('input', _processInboundAutosaveHandler);
                contentArea.removeEventListener('change', _processInboundAutosaveHandler);
            }
            _processInboundAutosaveHandler = () => _saveDraft(DRAFT_KEYS.processInbound, _collectProcessInboundDraft());
            contentArea.addEventListener('input', _processInboundAutosaveHandler);
            contentArea.addEventListener('change', _processInboundAutosaveHandler);
        }
        function validateInboundDate(input) {
            const errEl = document.getElementById('inb-tanggal-error');
            const today = new Date().toISOString().split('T')[0];
            if (input.value > today) {
                input.value = today;
                if (errEl) errEl.classList.remove('hidden');
                setTimeout(() => { if (errEl) errEl.classList.add('hidden'); }, 2500);
            } else {
                if (errEl) errEl.classList.add('hidden');
            }
        }

        /** Tambah baris kosong ke tabel Detail Inbound, dengan autocomplete Nama Barang */
        function tambahBarisInbound(prefillName = '') {
            const tbody = document.getElementById('inb-table-body');
            if (!tbody) return;
            const placeholder = tbody.querySelector('tr[data-placeholder]');
            if (placeholder) placeholder.remove();

            const bg = tbody.querySelectorAll('tr').length % 2 === 0 ? 'bg-white' : 'bg-gray-50';
            const tr = document.createElement('tr');
            tr.className = `${bg} border-b border-gray-100`;
            tr.innerHTML = `
                <td class="p-2 font-medium relative" style="min-width:180px">
                    <div class="relative">
                        <input type="text" value="${prefillName.replace(/"/g, '&quot;')}"
                            class="nama-barang-input w-full p-1 border border-gray-300 rounded text-xs focus:ring-1 focus:ring-amber-400 outline-none"
                            style="min-width:160px"
                            placeholder="Ketik nama barang..." autocomplete="off">
                        <ul class="autocomplete-list absolute z-50 left-0 top-full mt-0.5 w-64 bg-white border border-gray-200 rounded-lg shadow-lg max-h-48 overflow-y-auto hidden text-xs"></ul>
                    </div>
                </td>
                <td class="p-2 text-center"><input type="number" min="0" value="1" class="qty-input w-20 p-1 border border-gray-300 rounded text-center text-xs focus:ring-1 focus:ring-amber-400 outline-none"></td>
                <td class="p-2" style="min-width:140px"><input type="text" class="serial-input w-full p-1 border border-gray-300 rounded text-xs focus:ring-1 focus:ring-amber-400 outline-none" style="min-width:120px" placeholder="Serial Number"></td>
                <td class="p-2" style="min-width:120px"><input type="text" class="remark-input w-full p-1 border border-gray-300 rounded text-xs focus:ring-1 focus:ring-amber-400 outline-none" style="min-width:100px" placeholder="Remark"></td>
                <td class="p-2 text-center"><button onclick="hapusBarisInbound(this)" title="Hapus baris" class="text-red-400 hover:text-red-600 hover:bg-red-50 rounded p-1 transition"><svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></td>`;

            tbody.appendChild(tr);

            const input = tr.querySelector('.nama-barang-input');
            const list = tr.querySelector('.autocomplete-list');

            function renderList(filtered) {
                list.innerHTML = '';
                if (filtered.length === 0) { list.classList.add('hidden'); return; }
                filtered.forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    li.className = 'px-3 py-2 hover:bg-amber-50 hover:text-amber-700 cursor-pointer transition';
                    li.onmousedown = (e) => { e.preventDefault(); input.value = item; list.classList.add('hidden'); };
                    list.appendChild(li);
                });
                list.classList.remove('hidden');
            }

            input.addEventListener('input', async () => {
                const q = input.value.trim().toLowerCase();
                if (!q) { list.classList.add('hidden'); return; }
                const items = await getSourceItems();
                renderList(items.filter(i => i.toLowerCase().includes(q)).slice(0, 20));
            });
            input.addEventListener('focus', async () => {
                const q = input.value.trim().toLowerCase();
                if (!q) return;
                const items = await getSourceItems();
                renderList(items.filter(i => i.toLowerCase().includes(q)).slice(0, 20));
            });
            input.addEventListener('blur', () => setTimeout(() => list.classList.add('hidden'), 150));

            if (!prefillName) input.focus();
            return tr;
        }

        function hapusBarisInbound(btn) {
            const row = btn.closest('tr'); if (!row) return;
            row.style.transition = 'opacity 0.2s, transform 0.2s';
            row.style.opacity = '0'; row.style.transform = 'translateX(10px)';
            setTimeout(() => {
                row.remove();
                const tbody = document.getElementById('inb-table-body');
                if (tbody && tbody.querySelectorAll('tr').length === 0) {
                    tbody.innerHTML = `<tr data-placeholder><td colspan="5" class="p-6 text-center text-gray-400 italic">Belum ada data. Klik "Tambah Baris" atau scan QR Code.</td></tr>`;
                }
            }, 200);
        }

        // =========================================================================
        // SCAN QR CODE — Inbound pakai modal kamera yang sama dengan Route
        // =========================================================================
        let _inboundHtml5QrCode = null;
        let _inboundScannerActive = false;
        let _inboundLastScan = '';
        let _inboundCooldown = false;

        function _inboundQrCallback(decodedText) {
            onInboundQrScanSuccess(decodedText).then(() => {
                // Setelah 1.8 detik cooldown, buka kamera lagi untuk item berikutnya
                setTimeout(() => {
                    if (_inboundScannerActive && document.getElementById('inb-scan-status')) {
                        _inboundLastScan = '';
                        _inboundCooldown = false;
                        startQRCamera(undefined, _inboundQrCallback);
                    }
                }, 1800);
            });
        }

        async function toggleInboundScanner() {
            const statusEl = document.getElementById('inb-scan-status');
            const btn = document.getElementById('inb-scan-btn');

            if (_inboundScannerActive) {
                _inboundScannerActive = false;
                stopQRCamera();
                if (statusEl) { statusEl.textContent = ''; statusEl.className = 'text-xs text-gray-400'; }
                if (btn) btn.innerHTML = `<svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4h4V2H2v6h2V4zm16 0v4h2V2h-6v2h4zM4 16H2v6h6v-2H4v-4zm16 4h-4v2h6v-6h-2v4zM7 7h2v2H7V7zm0 8h2v2H7v-2zm8-8h2v2h-2V7zm0 8h2v2h-2v-2zm-4-4h2v2h-2v-2z"/></svg> Scan QR Code`;
                return;
            }

            _inboundScannerActive = true;
            _inboundLastScan = '';
            _inboundCooldown = false;

            if (btn) btn.innerHTML = `<svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg> Tutup Scanner`;
            if (statusEl) { statusEl.textContent = 'Membuka kamera...'; statusEl.className = 'text-xs text-blue-500'; }

            await startQRCamera(undefined, _inboundQrCallback);
        }

        /** Callback ketika QR code berhasil di-scan — dengan cooldown 2 detik agar tidak duplikat */
        async function onInboundQrScanSuccess(decodedText) {
            const statusEl = document.getElementById('inb-scan-status');
            const raw = decodedText.trim();

            // ── Proteksi duplikat: abaikan jika sama dengan scan terakhir ATAU cooldown aktif ──
            if (_inboundCooldown || raw === _inboundLastScan) return;

            _inboundCooldown = true;
            _inboundLastScan = raw;

            // Pause scanner sementara popup tampil
            _inboundScannerActive = false;
            stopQRCamera();
            const scanBtn = document.getElementById('inb-scan-btn');
            if (scanBtn) scanBtn.innerHTML = `<svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4h4V2H2v6h2V4zm16 0v4h2V2h-6v2h4zM4 16H2v6h6v-2H4v-4zm16 4h-4v2h6v-6h-2v4zM7 7h2v2H7V7zm0 8h2v2H7v-2zm8-8h2v2h-2V7zm0 8h2v2h-2v-2zm-4-4h2v2h-2v-2z"/></svg> Scan QR Code`;

            if (statusEl) {
                statusEl.textContent = '⏸ Scanner dijeda. Pilih item dari popup...';
                statusEl.className = 'text-xs text-amber-500';
            }

            const sourceItems = await getSourceItems();

            // ── Parse QR: coba JSON array, JSON object dengan items, atau teks biasa ──
            let qrItems = [];
            try {
                const parsed = JSON.parse(raw);
                if (Array.isArray(parsed)) {
                    // Format: ["Item A", "Item B", ...]
                    qrItems = parsed.map(i => String(i).trim()).filter(Boolean);
                } else if (parsed && typeof parsed === 'object') {
                    // Format: { items: [...] } atau { nama_barang: "...", ... }
                    if (Array.isArray(parsed.items)) {
                        qrItems = parsed.items.map(i =>
                            typeof i === 'object' ? (i.nama_barang || i.nama || i.name || String(i)) : String(i)
                        ).filter(Boolean);
                    } else if (parsed.nama_barang || parsed.nama || parsed.name) {
                        qrItems = [parsed.nama_barang || parsed.nama || parsed.name];
                    } else {
                        qrItems = [raw];
                    }
                } else {
                    qrItems = [raw];
                }
            } catch (_) {
                // Teks biasa — bisa dipisah newline atau koma
                if (raw.includes('\n')) {
                    qrItems = raw.split('\n').map(s => s.trim()).filter(Boolean);
                } else if (raw.includes('|')) {
                    qrItems = raw.split('|').map(s => s.trim()).filter(Boolean);
                } else {
                    qrItems = [raw];
                }
            }

            // ── Cocokkan setiap item QR ke source items (stock master) ──
            const resolvedItems = qrItems.map(q => {
                let matched = sourceItems.find(i => i.toLowerCase() === q.toLowerCase());
                if (!matched) matched = sourceItems.find(i =>
                    i.toLowerCase().includes(q.toLowerCase()) ||
                    q.toLowerCase().includes(i.toLowerCase())
                );
                return { label: matched || q, matched: !!matched, original: q };
            });

            playScanBeep();

            // ── Tampilkan popup checkbox ──
            const selectedItems = await showInboundItemSelectPopup(resolvedItems);

            // Reset cooldown setelah popup ditutup
            _inboundCooldown = false;
            _inboundLastScan = '';

            if (!selectedItems || selectedItems.length === 0) {
                if (statusEl) {
                    statusEl.textContent = 'Scan dibatalkan. Klik tombol Scan untuk mencoba lagi.';
                    statusEl.className = 'text-xs text-gray-400';
                }
                return;
            }

            // ── Tambahkan item yang dipilih ke tabel ──
            selectedItems.forEach(nama => tambahBarisInbound(nama));

            if (statusEl) {
                statusEl.textContent = `✅ ${selectedItems.length} item ditambahkan ke tabel. Klik Scan untuk lanjut.`;
                statusEl.className = 'text-xs text-green-600 font-semibold';
            }

            showScanSuccessToast(
                'Item Ditambahkan!',
                `<strong>${selectedItems.length} item</strong> berhasil ditambahkan ke tabel inbound.`
            );
        }

        /**
         * Tampilkan popup checkbox untuk memilih item hasil scan QR.
         * @param {Array<{label:string, matched:boolean, original:string}>} resolvedItems
         * @returns {Promise<string[]>} - array nama barang yang dipilih, atau [] jika batal
         */
        function showInboundItemSelectPopup(resolvedItems) {
            return new Promise(resolve => {
                // Hapus popup lama jika ada
                const old = document.getElementById('inb-item-select-modal');
                if (old) old.remove();

                const modal = document.createElement('div');
                modal.id = 'inb-item-select-modal';
                modal.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm';

                const checkboxRows = resolvedItems.map((item, idx) => `
                    <label class="flex items-start gap-3 p-3 rounded-xl cursor-pointer hover:bg-amber-50 transition group border border-transparent hover:border-amber-200"
                        for="inb-item-cb-${idx}">
                        <input type="checkbox" id="inb-item-cb-${idx}" value="${item.label.replace(/"/g, '&quot;')}"
                            class="mt-0.5 w-4 h-4 rounded accent-amber-500 flex-shrink-0 cursor-pointer" checked>
                        <div class="flex-1 min-w-0">
                            <span class="block text-sm font-semibold text-gray-800 leading-tight">${item.label}</span>
                            ${!item.matched ? `<span class="text-[10px] text-amber-500 font-medium">⚠ Item tidak ditemukan di Stock Master — akan ditambahkan apa adanya</span>` : `<span class="text-[10px] text-green-600">✓ Terdeteksi dari Stock Master</span>`}
                        </div>
                    </label>`).join('');

                modal.innerHTML = `
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 flex flex-col overflow-hidden" style="max-height:90vh;">
                    <!-- Header -->
                    <div class="flex items-center gap-3 px-5 py-4 border-b border-gray-100 bg-gray-50 flex-shrink-0">
                        <div class="w-9 h-9 rounded-full bg-amber-100 flex items-center justify-center flex-shrink-0">
                            <svg class="h-5 w-5 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                            </svg>
                        </div>
                        <div>
                            <p class="font-bold text-gray-800 text-sm">Pilih Item dari QR Code</p>
                            <p class="text-[11px] text-gray-400">${resolvedItems.length} item terdeteksi — centang yang ingin ditambahkan</p>
                        </div>
                    </div>

                    <!-- Tombol Pilih Semua / Hapus Semua -->
                    <div class="flex gap-2 px-5 py-2.5 border-b border-gray-100 flex-shrink-0">
                        <button id="inb-select-all-btn"
                            class="text-[11px] font-semibold text-amber-600 hover:text-amber-700 underline underline-offset-2 transition">
                            Pilih Semua
                        </button>
                        <span class="text-gray-300 text-xs">|</span>
                        <button id="inb-deselect-all-btn"
                            class="text-[11px] font-semibold text-gray-400 hover:text-gray-600 underline underline-offset-2 transition">
                            Hapus Semua
                        </button>
                        <span id="inb-selected-count" class="ml-auto text-[11px] text-gray-400 font-medium">${resolvedItems.length} dipilih</span>
                    </div>

                    <!-- Daftar Checkbox -->
                    <div class="overflow-y-auto flex-1 px-4 py-3 flex flex-col gap-1">
                        ${checkboxRows}
                    </div>

                    <!-- Footer Tombol -->
                    <div class="flex gap-2 px-5 py-4 border-t border-gray-100 bg-gray-50 flex-shrink-0">
                        <button id="inb-item-confirm-btn"
                            class="flex-1 py-2.5 bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-white text-sm font-bold rounded-xl transition shadow-sm">
                            Tambahkan ke Tabel
                        </button>
                        <button id="inb-item-cancel-btn"
                            class="py-2.5 px-4 bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-semibold rounded-xl transition">
                            Batal
                        </button>
                    </div>
                </div>`;

                document.body.appendChild(modal);

                // ── Update counter ──
                function updateCount() {
                    const checked = modal.querySelectorAll('input[type="checkbox"]:checked').length;
                    const countEl = document.getElementById('inb-selected-count');
                    if (countEl) countEl.textContent = `${checked} dipilih`;
                    const confirmBtn = document.getElementById('inb-item-confirm-btn');
                    if (confirmBtn) {
                        confirmBtn.disabled = checked === 0;
                        confirmBtn.className = checked === 0
                            ? 'flex-1 py-2.5 bg-gray-300 text-gray-400 text-sm font-bold rounded-xl cursor-not-allowed'
                            : 'flex-1 py-2.5 bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-white text-sm font-bold rounded-xl transition shadow-sm';
                    }
                }

                modal.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.addEventListener('change', updateCount));

                document.getElementById('inb-select-all-btn').onclick = () => {
                    modal.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
                    updateCount();
                };
                document.getElementById('inb-deselect-all-btn').onclick = () => {
                    modal.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                    updateCount();
                };

                document.getElementById('inb-item-confirm-btn').onclick = () => {
                    const selected = [...modal.querySelectorAll('input[type="checkbox"]:checked')].map(cb => cb.value);
                    modal.remove();
                    resolve(selected);
                };

                document.getElementById('inb-item-cancel-btn').onclick = () => {
                    modal.remove();
                    resolve([]);
                };

                // Klik di luar modal = batal
                modal.addEventListener('click', e => {
                    if (e.target === modal) { modal.remove(); resolve([]); }
                });

                updateCount();
            });
        }

        // =========================================================================
        // PROSES INBOUND → KIRIM KE SPREADSHEET
        // =========================================================================
        async function prosesInbound() {
            const tanggal = document.getElementById('inb-tanggal')?.value || '';
            const exLokasi = document.getElementById('inb-ex-lokasi')?.value?.trim() || '';
            const crew = document.getElementById('inb-crew')?.value || '';
            const category = document.getElementById('inb-category')?.value || '';

            // ── Validasi ──
            const today = new Date().toISOString().split('T')[0];
            if (!tanggal) { showAlert('warning', 'Data Belum Lengkap', 'Tanggal Inbound belum diisi.'); return; }
            if (tanggal > today) { showAlert('warning', 'Tanggal Tidak Valid', 'Tanggal Inbound tidak boleh lebih dari hari ini.'); return; }
            if (!exLokasi) { showAlert('warning', 'Data Belum Lengkap', 'Ex Lokasi belum diisi.'); return; }
            if (!crew) { showAlert('warning', 'Data Belum Lengkap', 'Crew belum dipilih.'); return; }
            if (!category) { showAlert('warning', 'Data Belum Lengkap', 'Kategori belum dipilih.'); return; }

            const rows = document.querySelectorAll('#inb-table-body tr');
            const items = [];
            rows.forEach(row => {
                if (row.hasAttribute('data-placeholder')) return;
                const namaInput = row.querySelector('.nama-barang-input');
                const qtyInput = row.querySelector('.qty-input');
                const serialInput = row.querySelector('.serial-input');
                const remarkInput = row.querySelector('.remark-input');
                const nama = namaInput ? namaInput.value.trim() : '';
                if (!nama) return;
                items.push({
                    namaBarang: nama,
                    qty: qtyInput ? qtyInput.value : '',
                    serialNumber: serialInput ? serialInput.value.trim() : '',
                    remark: remarkInput ? remarkInput.value.trim() : '',
                });
            });

            if (items.length === 0) {
                showAlert('warning', 'Tabel Kosong', 'Tambahkan minimal 1 barang pada Detail Inbound.');
                return;
            }

            const ok = await showConfirm('Proses Inbound?', `${items.length} item akan disimpan ke spreadsheet Inbound.`);
            if (!ok) return;

            const btn = document.querySelector('button[onclick="prosesInbound()"]');
            const originalHTML = btn ? btn.innerHTML : '';
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = `<span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-2"></span> Menyimpan...`;
            }

            const payload = {
                action: 'simpanInbound',
                tanggalProses: tanggal,
                crew: crew,
                exLocation: exLokasi,
                category: category,
                items: items
            };

            try {
                const response = await fetch(INBOUND_GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.success) {
                    showAlert('success', '✅ Berhasil Diproses!', `Data inbound (${items.length} item) tersimpan ke spreadsheet.`);
                    // Reset form
                    document.getElementById('inb-ex-lokasi').value = '';
                    document.getElementById('inb-crew').value = '';
                    document.getElementById('inb-category').value = '';
                    document.getElementById('inb-tanggal').value = today;
                    document.getElementById('inb-table-body').innerHTML =
                        '<tr data-placeholder><td colspan="5" class="p-6 text-center text-gray-400 italic">Belum ada data. Klik "Tambah Baris" atau scan QR Code.</td></tr>';
                    _clearDraft(DRAFT_KEYS.processInbound);
                } else {
                    showAlert('error', 'Gagal Menyimpan', result.message || 'Terjadi kesalahan pada server. Periksa GAS log.');
                }
            } catch (err) {
                showAlert('error', 'Terjadi Kesalahan', 'Tidak dapat terhubung ke server: ' + err.message);
            } finally {
                if (btn) { btn.disabled = false; btn.innerHTML = originalHTML; }
            }
        }

        // =========================================================================
        // HALAMAN: REPORT STATUS PO
        // =========================================================================
        async function showReportStatus() {
            setLoading('Memuat status PO...');
            const contentArea = document.getElementById('content-area');
            const isAdmin   = currentUserRole === 'ADMIN';
            const isPOUser  = currentUserRole === 'PO_User';

            // Kolom PO_Data (sesuai GAS terbaru):
            // [0]=Timestamp [1]=No.PO [2]=Ordered By [3]=Ship To
            // [4]=Status    [5]=Link PDF [6]=Kategori  [7]=Alamat
            // [8]=Phone     [9]=Shipping Date          [10]=Note

            try {
                let data = [];
                try {
                    const res1 = await fetch(API_URLS.reportStatus + '?action=getPOData');
                    const raw1 = await res1.json();
                    data = Array.isArray(raw1) ? raw1 : [];
                } catch (_) { }

                if (data.length === 0) {
                    const res2 = await fetch(API_URLS.reportStatus);
                    const raw2 = await res2.json();
                    data = Array.isArray(raw2) ? raw2 : [];
                }

                // Parse tanggal format "DD/MM/YYYY HH:MM:SS" dari kolom A
                const parseTanggalPO = (str) => {
                    if (!str) return null;
                    const match = String(str).match(/^(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2}):(\d{2})$/);
                    if (!match) return null;
                    const [, dd, mm, yyyy, hh, mi, ss] = match;
                    return new Date(+yyyy, +mm - 1, +dd, +hh, +mi, +ss);
                };

                // Closed > 7 hari disembunyikan
                const sevenDaysAgo = new Date();
                sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
                sevenDaysAgo.setHours(0, 0, 0, 0);

                const allRows = data.slice(1).filter(row => {
                    if (!row[1] || String(row[1]).trim() === '') return false;
                    const statusStr = row[4] ? row[4].toString().trim() : '';
                    if (statusStr === 'Closed') {
                        const tglPO = parseTanggalPO(row[0]);
                        if (!tglPO || isNaN(tglPO.getTime())) return false;
                        return tglPO >= sevenDaysAgo;
                    }
                    return true;
                });

                if (allRows.length === 0) {
                    contentArea.innerHTML = `
                    <h1 class="text-2xl font-bold mb-4">Report Status PO</h1>
                    <div class="p-8 text-center bg-white border border-gray-200 rounded-lg shadow-sm">
                        <p class="text-gray-500">✅ Tidak ada PO yang berlangsung.</p>
                    </div>`;
                    return;
                }

                let rows_html = '';
                allRows.forEach(row => {
                    const noPO      = row[1] || '-';
                    const orderedBy = row[2] || '-';   // kolom C
                    const shipTo    = row[3] || '-';   // kolom D
                    const status    = row[4];
                    const link      = row[5];          // kolom F
                    const statusStr = status ? status.toString().trim() : '';
                    const isClosed  = statusStr === 'Closed';
                    const isReady   = statusStr === 'Ready To Ship';
                    const isOnDelivery   = statusStr === 'On-Delivery';
                    const isDone    = statusStr === 'Done';

                    const statusBadge = isClosed
                        ? `<span class="inline-block px-2 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700">Closed</span>`
                        : isDone
                            ? `<span class="inline-block px-2 py-1 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700">Done</span>`
                            : isReady
                                ? `<span class="inline-block px-2 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-700">Ready To Ship</span>`
                                : isOnDelivery 
                                ? `<span class="inline-block px-2 py-1 rounded-full text-xs font-bold bg-orange-100 text-orange-700">On-Delivery</span>`
                                : `<span class="inline-block px-2 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700">Open</span>`;

                    const linkCell = (link && link !== '')
                        ? `<a href="${link}" target="_blank"
                              class="inline-block max-w-[200px] truncate align-middle text-blue-600 underline hover:text-blue-800 text-xs">
                              Lihat PDF
                           </a>`
                        : '-';

                    const aksiCell = isAdmin ? `
                        <td class="p-3 border-b">
                            ${isClosed
                                ? `<button id="btn-${noPO}" onclick="removePORow('${noPO}')"
                                    class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-xs font-semibold transition flex items-center gap-1 mx-auto">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                    </svg>
                                    Remove
                                   </button>`
                                : `<button id="btn-${noPO}" onclick="closePO('${noPO}')"
                                    class="${isDone ? 'bg-emerald-500 hover:bg-emerald-600' : isReady ? 'bg-green-500 hover:bg-green-600' : 'bg-blue-500 hover:bg-blue-600'} text-white px-3 py-1 rounded text-xs font-semibold transition">
                                    Closed
                                   </button>`
                            }
                        </td>` : '';

                    const rowBg = isClosed ? 'bg-gray-50 opacity-60'
                                : isDone   ? 'bg-emerald-50'
                                : isReady  ? 'bg-blue-50'
                                           : 'hover:bg-amber-50';

                    rows_html += `
                    <tr id="row-${noPO}" class="${rowBg}">
                        <td class="p-3 border-b font-mono text-left">${noPO}</td>
                        <td class="p-3 border-b">${orderedBy}</td>
                        <td class="p-3 border-b">${shipTo}</td>

                        ${aksiCell}
                    </tr>`;
                });

                // Header: PO_User hanya 4 kolom, Admin + kolom Link & Aksi
                const theadExtra = isAdmin ? '<th class="p-3">Link PDF</th><th class="p-3">Aksi</th>' : '';

                contentArea.innerHTML = `
                <h1 class="text-2xl font-bold mb-4">Report Status PO</h1>
                <div class="overflow-x-auto bg-white shadow-sm border border-gray-200 rounded-lg">
                    <table class="w-full text-xs text-center border-collapse">
                        <thead>
                            <tr class="bg-gray-800 text-white">
                                <th class="p-3 text-left">No. PO</th>

                                <th class="p-3">Ship To</th>
                                <th class="p-3">Status</th>
                                ${theadExtra}
                            </tr>
                        </thead>
                        <tbody id="po-table-body">${rows_html}</tbody>
                    </table>
                </div>`;

            } catch (err) { setError(err.message); }
        }

        async function closePO(poNumber) {
            const ok = await showConfirm('Tutup Purchase Order?', `PO ${poNumber} akan ditandai sebagai Closed. Tindakan ini tidak dapat dibatalkan.`);
            if (!ok) return;

            const btn = document.getElementById(`btn-${poNumber}`);
            const statusCell = document.getElementById(`status-${poNumber}`);

            btn.innerHTML = '<span class="inline-block w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin mr-1"></span>Menyimpan...';

            try {
                const response = await fetch(API_URLS.reportStatus, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'closePO', poNumber }),
                });
                const result = await response.json();
                if (result.success) {
                    statusCell.innerHTML = `<span class="inline-block px-2 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700">Closed</span>`;

                    btn.className = 'bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-xs font-semibold transition flex items-center mx-auto';
                    btn.disabled = false;
                    showAlert('success', 'PO Berhasil Ditutup', `PO ${poNumber} telah ditandai sebagai Closed.`);
                } else {
                    showAlert('error', 'Gagal Menutup PO', result.message || 'Terjadi kesalahan, coba lagi.');
                    btn.disabled = false;
                    btn.innerText = 'Closed';
                }
            } catch (err) {
                showAlert('error', 'Terjadi Kesalahan', err.message);
                btn.disabled = false;
                btn.innerText = 'Closed';
            }
        }

        async function simpanOutboundFinal() {
            const orderedByEl = document.getElementById('proc-ordered-by');
            const orderedBy = orderedByEl?.value?.trim() || '';
            const shipTo = document.getElementById('proc-ship')?.value?.trim() || '';
            const shippingDate = document.getElementById('proc-shipping-date')?.value?.trim() || '';
            const tglProses = document.getElementById('proc-tgl-proses')?.value || '';
            const crewPacking = document.getElementById('proc-crew-packing')?.value || '';
            // No PO: prioritaskan dropdown pilihan, fallback ke dataset dari PDF
            const noPOFromSelect = document.getElementById('proc-no-po-select')?.value || '';
            const noPO = noPOFromSelect || orderedByEl?.dataset?.nopo || '';

            // Validasi Crew Packing
            if (!crewPacking) {
                showAlert('warning', 'Crew Packing Belum Dipilih', 'Silakan pilih Crew Packing terlebih dahulu.');
                return;
            }

            // ── Validasi ──
            if (!orderedBy) {
                showAlert('warning', 'Data Belum Lengkap', 'Field ORDERED BY masih kosong. Import PDF terlebih dahulu atau isi manual.');
                return;
            }

            const rows = document.querySelectorAll('#proc-table-body tr');
            // Cek apakah ada baris valid (bukan hanya placeholder)
            const hasRealRows = Array.from(rows).some(row => row.cells.length >= 5 &&
                !row.querySelector('td[colspan]'));
            if (!hasRealRows) {
                showAlert('warning', 'Tabel Kosong', 'Import PDF terlebih dahulu untuk mengisi data item PO.');
                return;
            }

            // ── Kumpulkan data items dari tabel ──
            const items = [];
            rows.forEach(row => {
                if (row.cells.length < 5 || row.querySelector('td[colspan]')) return;
                const qtyOutboundInput = row.querySelector('input[type="number"]');
                const descSelect = row.querySelector('select');
                const namaBarangInput = row.querySelector('.nama-barang-input');
                const namaBarang = namaBarangInput ? namaBarangInput.value.trim() : row.cells[0].innerText.trim();
                const qtyPO = row.cells[1].innerText.trim();
                if (!namaBarang || namaBarang === '-') return; // skip baris kosong
                items.push({
                    namaBarang: namaBarang,
                    qtyPO: qtyPO,
                    qtyOutbound: qtyOutboundInput ? qtyOutboundInput.value : row.cells[2].innerText.trim(),
                    uom: row.cells[3].innerText.trim(),
                    description: descSelect ? descSelect.value : row.cells[4].innerText.trim(),
                });
            });

            if (items.length === 0) {
                showAlert('warning', 'Tidak Ada Item', 'Tabel item kosong atau semua baris tidak valid.');
                return;
            }

            const ok = await showConfirm(
                'Simpan & Proses PO?',
                `${items.length} item akan disimpan ke Outbound_Log${noPO ? ' dan status PO ' + noPO + ' akan diubah menjadi "Ready To Ship"' : ''}.`
            );
            if (!ok) return;

            // ── Tampilkan loading di tombol ──
            const saveBtn = document.querySelector('button[onclick="simpanOutboundFinal()"]');
            const originalBtnHTML = saveBtn ? saveBtn.innerHTML : '';
            if (saveBtn) {
                saveBtn.disabled = true;
                saveBtn.innerHTML = `<span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-2"></span> Menyimpan...`;
            }

            const payload = {
                action: 'simpanOutbound',
                noPO: noPO,
                orderedBy: orderedBy,
                shipTo: shipTo,
                shippingDate: shippingDate,
                tanggalProsesPO: tglProses,
                crewPacking: crewPacking,
                updatePOStatus: noPO ? true : false,   // flag: update status PO_Data
                newPOStatus: 'Ready To Ship',
                items: items
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' }, // GAS butuh text/plain untuk avoid CORS preflight
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.success) {

                    // ── Status PO sudah diupdate oleh GAS Outbound sekaligus ──
                    const statusUpdated = result.statusUpdated === true;

                    if (noPO && statusUpdated) {
                        // ── Update badge di DOM (Report Status) jika halaman sedang terbuka ──
                        const statusCell = document.getElementById(`status-${noPO}`);
                        if (statusCell) {
                            statusCell.innerHTML = `<span class="inline-block px-2 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-700">Ready To Ship</span>`;
                        }
                        const rowEl = document.getElementById(`row-${noPO}`);
                        if (rowEl) {
                            rowEl.classList.remove('hover:bg-amber-50');
                            rowEl.classList.add('bg-blue-50');
                        }
                        // ── Hapus PO ini dari dropdown Open PO ──
                        const optEl = document.querySelector(`#proc-no-po-select option[value="${noPO}"]`);
                        if (optEl) optEl.remove();
                    }

                    // Pesan sukses
                    const statusMsg = noPO
                        ? (statusUpdated
                            ? `\nStatus PO ${noPO} → ✅ Ready To Ship`
                            : `\n⚠️ Status PO ${noPO} tidak ditemukan di PO_Data.`)
                        : '';
                    showAlert('success', '✅ Berhasil Diproses!',
                        `Data outbound (${items.length} item) tersimpan ke Outbound_Log.${statusMsg}`
                    );

                    // ── Reset form setelah berhasil ──
                    setTimeout(() => {
                        document.getElementById('proc-ordered-by').value = '';
                        document.getElementById('proc-ordered-by').dataset.nopo = '';
                        document.getElementById('proc-ship').value = '';
                        document.getElementById('proc-shipping-date').value = '';
                        document.getElementById('proc-tgl-proses').value = new Date().toISOString().split('T')[0];
                        document.getElementById('import-status').textContent = '';
                        const pdfInput = document.getElementById('pdfFile');
                        if (pdfInput) pdfInput.value = '';
                        const crewEl = document.getElementById('proc-crew-packing');
                        if (crewEl) crewEl.value = '';
                        const poSelect = document.getElementById('proc-no-po-select');
                        if (poSelect) poSelect.value = '';
                        document.getElementById('proc-table-body').innerHTML =
                            '<tr><td colspan="5" class="p-6 text-center text-gray-400 italic">Pilih file PDF lalu klik tombol "Import" untuk mengisi data secara otomatis</td></tr>';
                        _clearDraft(DRAFT_KEYS.processPO);
                    }, 1500);

                } else {
                    showAlert('error', 'Gagal Menyimpan', result.message || 'Terjadi kesalahan pada server. Periksa GAS log.');
                }
            } catch (err) {
                showAlert('error', 'Terjadi Kesalahan', 'Tidak dapat terhubung ke server: ' + err.message);
            } finally {
                if (saveBtn) {
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = originalBtnHTML || `<svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Proses`;
                }
            }
        }

                            const link = document.createElement('a');

                            link.click();
                        }
                    });
                });

        // RESTORE SESI SAAT BROWSER DI-REFRESH (F5 / tombol Back)
        // =========================================================================
        // Sebelumnya: refresh browser selalu mereset currentUserRole (in-memory)
        // sehingga user terlempar kembali ke halaman login, walau sebelumnya
        // sudah login dan sedang mengisi form / melihat Route.
        // Sekarang: role & halaman terakhir disimpan di sessionStorage (bertahan
        // selama tab terbuka, otomatis hilang saat tab/browser ditutup —
        // jadi tetap aman secara sesi, tidak permanen seperti localStorage).
        (function restoreSessionOnLoad() {
            const savedRole = sessionStorage.getItem('currentUserRole');
            if (!savedRole) return; // belum pernah login → tampilkan halaman login seperti biasa

            currentUserRole = savedRole;
            startApp();
        })();
    </script>

    <!-- ═══ MODAL KAMERA QR — PERMANEN (tidak ikut innerHTML) ═══ -->
    <div id="qr-camera-modal"
        class="hidden fixed inset-0 z-[9999] flex items-center justify-center bg-black/70 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
            <!-- Header -->
            <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
                <div class="flex items-center gap-2">
                    <svg class="h-5 w-5 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01
                               M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z
                               m12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1z
                               M5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                    </svg>
                    <span class="font-bold text-gray-700 text-sm">Scan QR Code</span>
                </div>
                <div class="flex items-center gap-2">
                    <button id="qr-switch-btn" onclick="switchQRCamera()" title="Ganti kamera"
                        class="hidden text-gray-500 hover:text-amber-600 transition p-1.5 rounded-lg hover:bg-amber-50 border border-gray-200">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581
                                   m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                    <button onclick="stopQRCamera()" title="Tutup"
                        class="text-gray-400 hover:text-red-500 transition p-1 rounded-lg hover:bg-gray-100">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Area video -->
            <div class="relative bg-black" style="aspect-ratio:1/1; max-height:70vh;">
                <div id="qr-reader" style="width:100%;height:100%;"></div>

                <!-- Status -->
                <div id="qr-cam-status" class="absolute bottom-3 inset-x-0 flex justify-center pointer-events-none">
                    <span class="bg-black/60 text-white text-xs px-3 py-1.5 rounded-full">
                        Arahkan kamera ke QR Code...
                    </span>
                </div>
            </div>

            <!-- Footer -->
            <div class="px-5 py-3 bg-gray-50 text-center">
                <p class="text-xs text-gray-400">Posisikan QR Code di dalam bingkai kuning</p>
            </div>
        </div>
    </div>

    <style>
        @keyframes qrScanLine {
            0% {
                top: 4px;
                opacity: 1;
            }

            45% {
                opacity: 1;
            }

            50% {
                top: calc(100% - 4px);
                opacity: 0.5;
            }

            55% {
                opacity: 1;
            }

            100% {
                top: 4px;
                opacity: 1;
            }
        }
    </style>
