            <div class="text-5xl mb-3">⚠️</div>

                    class="flex-1 py-2 rounded-xl font-bold border border-gray-300 text-gray-600 hover:bg-gray-50 transition">

        // =========================================================================
        // LOGIN
        // =========================================================================
        function checkLogin() {
            const pass = document.getElementById('passwordInput').value;
            const error = document.getElementById('loginError');

            if (pass === 'admin123') {
                currentUserRole = 'ADMIN';
                startApp();
            } else if (pass === 'staff123') {
                currentUserRole = 'PO_User';
                startApp();
            } else if (pass === 'warehouse123') {
                currentUserRole = 'WAREHOUSE';
                startApp();
            } else if (pass === 'driver123') {
                currentUserRole = 'DRIVER';
                startApp();
            } else {
                error.classList.remove('hidden');
                return;
            }
            error.classList.add('hidden');
        }

        /** Tampilkan app sesuai role setelah login berhasil */
        function startApp() {
            document.getElementById('login-page').classList.add('hidden');

            const app = document.getElementById('app-container');
            app.classList.remove('hidden');
            app.classList.add('flex');

            // Update label role di sidebar footer dan topbar badge
            const roleLabel = document.getElementById('user-role-label');
            const roleBadge = document.getElementById('user-role-badge');
            if (currentUserRole === 'ADMIN') {
                if (roleLabel) roleLabel.textContent = 'Administrator';
                if (roleBadge) { roleBadge.textContent = 'Admin'; roleBadge.classList.remove('hidden'); }
            } else if (currentUserRole === 'WAREHOUSE') {
                if (roleLabel) roleLabel.textContent = 'Team Warehouse';
                if (roleBadge) { roleBadge.textContent = 'Warehouse'; roleBadge.classList.remove('hidden'); }
            } else if (currentUserRole === 'DRIVER') {
                if (roleLabel) roleLabel.textContent = 'Team Delivery (Driver)';
                if (roleBadge) { roleBadge.textContent = 'Driver'; roleBadge.classList.remove('hidden'); }
            } else {
                if (roleLabel) roleLabel.textContent = 'PO User';
                if (roleBadge) { roleBadge.textContent = 'PO User'; roleBadge.classList.remove('hidden'); }
            }

            // Sidebar di desktop: tampil default terbuka
            if (window.innerWidth >= 768) {
                document.getElementById('sidebar').classList.remove('-translate-x-full');
                sidebarOpen = false; // di desktop tidak pakai overlay
            }

            if (currentUserRole === 'PO_User') {
                // Staff: hanya bisa akses Purchase Order, Process PO TERSEMBUNYI
                document.getElementById('menu-inventory').classList.add('hidden');
                document.getElementById('menu-plan-task').classList.add('hidden');
                document.getElementById('menu-maintenance').classList.add('hidden');
                document.getElementById('menu-process-po').classList.add('hidden');
                document.getElementById('menu-process-inbound').classList.add('hidden');
                document.getElementById('menu-team-delivery').classList.add('hidden');
                // Buka PO submenu otomatis
                document.getElementById('po-sub').classList.remove('hidden');
                document.getElementById('arrow-po').textContent = '▲';
                navTo('Purchase Order');

                // Tampilkan tombol notifikasi & load data Ready To Ship
                const bellBtn = document.getElementById('notif-bell-btn');
                if (bellBtn) bellBtn.classList.remove('hidden');
                loadNotifReadyToShip();
            } else if (currentUserRole === 'WAREHOUSE') {
                // Team Warehouse: hanya tampilkan menu Process PO
                document.getElementById('menu-inventory').classList.add('hidden');
                document.getElementById('menu-plan-task').classList.add('hidden');
                document.getElementById('menu-maintenance').classList.add('hidden');
                document.getElementById('menu-po').classList.add('hidden');
                document.getElementById('menu-process-po').classList.remove('hidden');
                document.getElementById('menu-process-inbound').classList.remove('hidden');
                document.getElementById('menu-team-delivery').classList.add('hidden');
                navTo('Process PO');

                // Tampilkan tombol notifikasi & load data Open
                const bellBtn2 = document.getElementById('notif-bell-btn');
                if (bellBtn2) bellBtn2.classList.remove('hidden');
                loadNotifReadyToShip();
            } else if (currentUserRole === 'DRIVER') {
                // Team Delivery (Driver): hanya tampilkan menu Team Delivery
                document.getElementById('menu-inventory').classList.add('hidden');
                document.getElementById('menu-plan-task').classList.add('hidden');
                document.getElementById('menu-maintenance').classList.add('hidden');
                document.getElementById('menu-po').classList.add('hidden');
                document.getElementById('menu-process-po').classList.add('hidden');
                document.getElementById('menu-process-inbound').classList.add('hidden');
                document.getElementById('menu-team-delivery').classList.remove('hidden');
                // Buka submenu Team Delivery otomatis
                document.getElementById('team-delivery-sub').classList.remove('hidden');
                document.getElementById('arrow-team-delivery').textContent = '▲';
                navTo('Route');
            } else {
                // ADMIN: semua menu tampil termasuk Process PO & Team Delivery
                document.getElementById('menu-process-po').classList.remove('hidden');
                document.getElementById('menu-process-inbound').classList.remove('hidden');
                document.getElementById('menu-team-delivery').classList.remove('hidden');
                navTo('Dashboard');
            }
        }

        /** Logout: reset state dan kembali ke halaman login */
        function logout() {
            if (!confirm('Yakin ingin logout?')) return;

            // Reset role
            currentUserRole = '';

            // Reset form password
            document.getElementById('passwordInput').value = '';
            document.getElementById('loginError').classList.add('hidden');

            // Sembunyikan app, tampilkan login
            const app = document.getElementById('app-container');
            app.classList.add('hidden');
            app.classList.remove('flex');
            document.getElementById('login-page').classList.remove('hidden');

            // Reset visibilitas menu
            document.getElementById('menu-inventory').classList.remove('hidden');
            document.getElementById('menu-plan-task').classList.remove('hidden');
            document.getElementById('menu-maintenance').classList.remove('hidden');
            document.getElementById('menu-po').classList.remove('hidden');
            document.getElementById('menu-process-po').classList.remove('hidden');
            document.getElementById('menu-process-inbound').classList.remove('hidden');
            document.getElementById('menu-team-delivery').classList.remove('hidden');

            // Reset badge dan label role
            const roleBadge = document.getElementById('user-role-badge');
            if (roleBadge) roleBadge.classList.add('hidden');
            document.getElementById('page-title').textContent = 'Dashboard';

            // Sembunyikan notifikasi bell & popup
            const bellBtn = document.getElementById('notif-bell-btn');
            if (bellBtn) bellBtn.classList.add('hidden');
            const notifPopup = document.getElementById('notif-popup');
            if (notifPopup) notifPopup.classList.add('hidden');

            // Reset sidebar ke posisi tertutup (mobile)
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.add('hidden');
            sidebarOpen = false;

            // Reset po-sub
            document.getElementById('po-sub').classList.add('hidden');
            document.getElementById('arrow-po').textContent = '▼';

            // Reset team-delivery-sub
            document.getElementById('team-delivery-sub').classList.add('hidden');
            document.getElementById('arrow-team-delivery').textContent = '▼';

            // Reset konten area
            document.getElementById('content-area').innerHTML =
                '<h1 class="text-3xl font-semibold text-gray-700">Dashboard</h1>';
        }

        /** Tampilkan/sembunyikan popup notifikasi */
        function toggleNotifPopup() {
            const popup = document.getElementById('notif-popup');
            if (!popup) return;
            const willShow = popup.classList.contains('hidden');
            if (willShow) {
                popup.classList.remove('hidden');
                loadNotifReadyToShip();
                // Tutup popup jika klik di luar
                setTimeout(() => {
                    document.addEventListener('click', closeNotifPopupOutside);
                }, 0);
            } else {
                popup.classList.add('hidden');
                document.removeEventListener('click', closeNotifPopupOutside);
            }
        }

        /** Handler untuk menutup popup notifikasi saat klik di luar area */
        function closeNotifPopupOutside(e) {
            const popup = document.getElementById('notif-popup');
            const bellBtn = document.getElementById('notif-bell-btn');
            if (!popup || !bellBtn) return;
            if (!popup.contains(e.target) && !bellBtn.contains(e.target)) {
                popup.classList.add('hidden');
                document.removeEventListener('click', closeNotifPopupOutside);
            }
        }

        /** Ambil data PO sesuai status target role lalu tampilkan di popup notifikasi */
        async function loadNotifReadyToShip() {
            const contentEl = document.getElementById('notif-popup-content');
            const dotEl = document.getElementById('notif-bell-dot');
            const titleEl = document.getElementById('notif-popup-title');
            if (!contentEl) return;

            // Tentukan status target & label sesuai role
            const targetStatus = currentUserRole === 'WAREHOUSE' ? 'Open' : 'Ready To Ship';
            const badgeClass = currentUserRole === 'WAREHOUSE'
                ? 'bg-red-100 text-red-700'
                : 'bg-blue-100 text-blue-700';
            if (titleEl) titleEl.textContent = `PO ${targetStatus}`;

            try {
                let data = [];
                try {
                    const res1 = await fetch(API_URLS.reportStatus + '?action=getPOData');
                    const raw1 = await res1.json();
                    data = Array.isArray(raw1) ? raw1 : [];
                } catch (_) { }

                if (data.length === 0) {
                    const res2 = await fetch(API_URLS.reportStatus);
                    const raw2 = await res2.json();
                    data = Array.isArray(raw2) ? raw2 : [];
                }

                const filteredRows = data.slice(1).filter(row => {
                    const noPO = String(row[1] || '').trim();
                    const statusRaw = row[4] ? row[4].toString().trim() : '';
                    if (noPO === '') return false;
                    if (targetStatus === 'Open') {
                        // Anggap PO "Open" jika status kosong atau bukan Ready To Ship/Done/Closed
                        return statusRaw !== 'Ready To Ship' && statusRaw !== 'Done' && statusRaw !== 'Closed';
                    }
                    return statusRaw === targetStatus;
                });

                if (dotEl) {
                    if (filteredRows.length > 0) dotEl.classList.remove('hidden');
                    else dotEl.classList.add('hidden');
                }

                if (filteredRows.length === 0) {
                    contentEl.innerHTML = `<div class="p-3 text-sm text-gray-400 text-center">Tidak ada PO ${targetStatus}.</div>`;
                    return;
                }

                contentEl.innerHTML = filteredRows.map(row => {
                    const noPO = row[1] || '-';
                    const nama = row[2] || '-';
                    return `
                    <div class="p-3 hover:bg-blue-50 transition">
                        <p class="text-sm font-semibold text-gray-700 font-mono">${noPO}</p>
                        <p class="text-xs text-gray-500">${nama}</p>
                        <span class="inline-block mt-1 px-2 py-0.5 rounded-full text-[10px] font-bold ${badgeClass}">${targetStatus}</span>
                    </div>`;
                }).join('');
            } catch (err) {
                contentEl.innerHTML = `<div class="p-3 text-sm text-red-400 text-center">Gagal memuat notifikasi.</div>`;
            }
        }

        // UTILITAS UI

        function setLoading(message = 'Memuat data...') {
            document.getElementById('content-area').innerHTML = `
            <div class="flex flex-col items-center justify-center h-64 gap-4">
                <div class="w-10 h-10 border-4 border-amber-200 border-t-amber-500 rounded-full animate-spin"></div>
                <p class="text-gray-500 text-sm">${message}</p>
            </div>`;
        }

        function setError(message) {
            document.getElementById('content-area').innerHTML =
                `<div class="flex flex-col items-center justify-center h-64 gap-3">
                <div class="text-4xl">❌</div>
                <p class="text-red-500 font-semibold">Terjadi Kesalahan</p>
                <p class="text-gray-400 text-sm text-center max-w-xs">${message}</p>
            </div>`;
        }

        // =========================================================================
        // MODAL ALERT & CONFIRM (pengganti browser alert/confirm)
        // =========================================================================
        function showAlert(type, title, message) {
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            const colors = {
                success: 'bg-green-500 hover:bg-green-600',
                error: 'bg-red-500 hover:bg-red-600',
                info: 'bg-blue-500 hover:bg-blue-600',
                warning: 'bg-amber-500 hover:bg-amber-600',
            };
            document.getElementById('modal-icon').textContent = icons[type] || icons.info;
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('modal-btn').className =
                `w-full py-2 rounded-xl font-bold text-white transition ${colors[type] || colors.info}`;
            document.getElementById('modal-overlay').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
        }

        // Menutup modal jika klik di luar kotak
        document.getElementById('modal-overlay').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        let confirmResolve = null;
        function showConfirm(title, message) {
            return new Promise(resolve => {
                document.getElementById('confirm-title').textContent = title;
                document.getElementById('confirm-message').textContent = message;
                document.getElementById('confirm-overlay').classList.remove('hidden');
                confirmResolve = (result) => {
                    document.getElementById('confirm-overlay').classList.add('hidden');
                    resolve(result);
                };
            });
        }

        // =========================================================================
        // SIDEBAR TOGGLE
        // =========================================================================
        let sidebarOpen = false;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebarOpen = !sidebarOpen;

            if (sidebarOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        // Tutup sidebar saat resize ke desktop
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768 && sidebarOpen) {
                document.getElementById('sidebar-overlay').classList.add('hidden');
            }
        });

        function toggleSubMenu(menuId, arrowId) {
            const subMenu = document.getElementById(menuId);
            const arrow = document.getElementById(arrowId);
            subMenu.classList.toggle('hidden');
            arrow.textContent = subMenu.classList.contains('hidden') ? '▼' : '▲';
        }

        /** Highlight nav item yang aktif */
        function setActiveNav(pageName) {
            document.querySelectorAll('.nav-item, .sub-item').forEach(el => {
                el.classList.remove('bg-amber-500', 'text-white', 'font-bold');
                el.classList.add('text-gray-700');
            });
            const all = document.querySelectorAll('.nav-item, .sub-item');
            all.forEach(el => {
                if (el.textContent.trim() === pageName ||
                    (pageName === 'Purchase Order' && el.textContent.trim() === 'Form PO') ||
                    (pageName === 'Dashboard' && el.textContent.trim() === 'Dashboard')) {
                    el.classList.add('bg-amber-500', 'text-white', 'font-bold');
                    el.classList.remove('text-gray-700', 'text-gray-500');
                }
            });
        }

        // =========================================================================
        // ROUTER
        // =========================================================================

        /** Wrapper navigasi: update title bar, highlight menu, tutup sidebar di mobile */
        function navTo(pageName) {
            // ── AKSES KONTROL: Process PO hanya untuk ADMIN dan WAREHOUSE ──
            if (pageName === 'Process PO' && currentUserRole === 'PO_User') {
                showAlert('error', 'Akses Ditolak', 'Menu "Process PO" hanya dapat diakses oleh Team Warehouse dan Admin.');
                return;
            }
            if (pageName === 'Process Inbound' && currentUserRole === 'PO_User') {
                showAlert('error', 'Akses Ditolak', 'Menu "Process Inbound" hanya dapat diakses oleh Team Warehouse dan Admin.');
                return;
            }
            // ── AKSES KONTROL: Team Delivery hanya untuk ADMIN dan DRIVER ──
            if ((pageName === 'Route' || pageName === 'Report Finish') &&
                !(currentUserRole === 'ADMIN' || currentUserRole === 'DRIVER')) {
                showAlert('error', 'Akses Ditolak', 'Menu "Team Delivery" hanya dapat diakses oleh Admin dan Driver.');
                return;
            }
            const titles = {
                'Dashboard': 'Dashboard',
                'Stock Master': 'Stock Master',
                'Report Inventory': 'Report Inventory',
                'Plan Task': 'Plan Task',
                'Report KPI': 'Report KPI',
                'Report Maintenance': 'Report Maintenance',
                'Purchase Order': 'Form Purchase Order',
                'Report Status': 'Report Status PO',
                'Process PO': 'Proses PO Masuk',
                'Process Inbound': 'Process Inbound',
                'Route': 'Team Delivery - Route',
                'Report Finish': 'Team Delivery - Report Finish'
            };
            document.getElementById('page-title').textContent = titles[pageName] || pageName;
            setActiveNav(pageName);

            // Tutup sidebar di mobile setelah klik menu
            if (window.innerWidth < 768 && sidebarOpen) toggleSidebar();

            showPage(pageName);
        }

        async function showPage(pageName) {
            // Hentikan kamera QR jika sedang aktif
            if (typeof stopQRCamera === 'function') stopQRCamera();

            switch (pageName) {
                case 'Dashboard': showDashboard(); break;
                case 'Stock Master': await showStockMaster(); break;
                case 'Report Inventory': await showReportInventory(); break;
                case 'Plan Task': await showPlanTask(); break;
                case 'Report KPI': await showReportKPI(); break;
                case 'Report Maintenance': await showReportMaintenance(); break;
                case 'Purchase Order': await showFormPO(); break;
                case 'Report Status': await showReportStatus(); break;
                case 'Process PO': await showProcessPO(); break;
                case 'Process Inbound': await showProcessInbound(); break;
                case 'Route': await showTeamDeliveryRoute(); break;
                case 'Report Finish': await showTeamDeliveryReportFinish(); break;
                default:
                    document.getElementById('content-area').innerHTML = `
                    <h1 class="text-3xl font-semibold text-gray-700">${pageName}</h1>
                    <p class="mt-4 text-gray-600">Halaman ini sedang dalam pengembangan.</p>`;
            }
        }

        // =========================================================================
        // HALAMAN: DASHBOARD
        // =========================================================================
        function showDashboard() {
            document.getElementById('content-area').innerHTML = `
            <h1 class="text-3xl font-semibold text-gray-700 mb-6">Dashboard</h1>
            <img src="https://lh3.googleusercontent.com/d/19epa7IlpjqaS0f7F_WEgDZSwhriLpikp"
                 alt="Dashboard Image"
                 class="rounded-lg shadow-lg max-w-full h-auto border border-gray-300">`;
        }

        // =========================================================================
        // HALAMAN: TEAM DELIVERY → ROUTE
        // Akses: ADMIN & DRIVER
        // =========================================================================
        const DELIVERY_GAS_URL = PO_GAS_URL; // Gunakan GAS yang sama (akan handle action deliveryDone)

        async function showTeamDeliveryRoute() {
            const contentArea = document.getElementById('content-area');

            // ── Skeleton loading ──
            contentArea.innerHTML = `
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 class="text-3xl font-semibold text-gray-700 mb-1">Team Delivery - Route</h1>
                    <p class="text-sm text-gray-500">Daftar pengiriman aktif hari ini. Klik <b>Start</b> untuk memulai, <b>Delivered</b> setelah sampai tujuan.</p>
                </div>
                <button onclick="showTeamDeliveryRoute()"
                    class="flex items-center gap-2 px-4 py-2 bg-amber-50 hover:bg-amber-100 text-amber-700 text-xs font-semibold rounded-lg border border-amber-200 transition">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    Refresh
                </button>
            </div>
            <div id="route-card-area">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    ${[1,2,3].map(() => `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 animate-pulse">
                        <div class="h-4 bg-gray-200 rounded w-3/4 mb-3"></div>
                        <div class="h-3 bg-gray-100 rounded w-1/2 mb-2"></div>
                        <div class="h-3 bg-gray-100 rounded w-2/3 mb-4"></div>
                        <div class="flex gap-2 mt-4">
                            <div class="h-9 bg-gray-200 rounded-lg flex-1"></div>
                            <div class="h-9 bg-gray-200 rounded-lg w-10"></div>
                        </div>
                    </div>`).join('')}
                </div>
            </div>`;

            // ── Ambil data dari sheet Plan Driver via GAS ──
            try {
                const res = await fetch(DELIVERY_GAS_URL + '?action=getPlanDriver');
                const raw = await res.json();

                // raw = array of rows (dengan header di index 0)
                // Kolom yang diharapkan dari sheet "Plan Driver":
                // [0]=No.PO [1]=Customer/Ship To [2]=Alamat [3]=Zona [4]=SLA_Status [5]=Status [6]=Jam Berangkat [7]=Maps URL
                const rows = Array.isArray(raw) ? raw : (raw.data || []);
                const header = rows[0] || [];
                const dataRows = rows.slice(1);

                // Hanya tampilkan yang statusnya "Ready To Ship" atau "On-Delivery"
                const activeRows = dataRows.filter(r => {
                    const st = String(r[5] || '').trim();
                    return st === 'Ready To Ship' || st === 'On-Delivery';
                });

                const cardArea = document.getElementById('route-card-area');

                if (activeRows.length === 0) {
                    cardArea.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-center">
                        <svg class="h-16 w-16 text-gray-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10l2.5 1.5M13 16H4m9 0l2.5 1.5M13 16V9h3l3 3v4h-3"/>
                        </svg>
                        <p class="text-lg font-semibold text-gray-400">Tidak ada pengiriman aktif</p>
                        <p class="text-sm text-gray-400 mt-1">Semua PO sudah selesai atau belum ada yang siap dikirim.</p>
                    </div>`;
                    return;
                }

                // Render cards
                cardArea.innerHTML = `
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="route-cards-grid">
                    ${activeRows.map((r, idx) => _buildRouteCard(r, idx)).join('')}
                </div>`;

            } catch (err) {
                document.getElementById('route-card-area').innerHTML = `
                <div class="bg-red-50 border border-red-200 rounded-2xl p-6 text-center">
                    <p class="text-red-600 font-semibold mb-1">❌ Gagal memuat data Route</p>
                    <p class="text-xs text-red-400">${err.message}</p>
                    <p class="text-xs text-gray-500 mt-2">Pastikan GAS sudah mendukung <code>action=getPlanDriver</code> dan sheet "Plan Driver" tersedia.</p>
                </div>`;
            }
        }

        /**
         * Bangun HTML satu card PO untuk halaman Route.
         * r = array row dari sheet Plan Driver:
         *   [0]=No.PO  [1]=Customer/Ship To  [2]=Alamat  [3]=Zona  [4]=SLA_Status  [5]=Status  [6]=Jam Berangkat  [7]=Maps URL
         */
        function _buildRouteCard(r, idx) {
            const noPO       = String(r[0] || '').trim();
            const customer   = String(r[1] || '').trim();
            const alamat     = String(r[2] || '').trim();
            const zona       = String(r[3] || '').trim();
            const slaStatus  = String(r[4] || '').trim();
            const status     = String(r[5] || '').trim();
            const jamBrgkt   = String(r[6] || '').trim();
            const mapsUrl    = String(r[7] || '').trim();

            const isOnDelivery = status === 'On-Delivery';

            // Warna SLA badge
            const slaBadgeClass = slaStatus.toLowerCase().includes('late') || slaStatus.toLowerCase().includes('overdue')
                ? 'bg-red-100 text-red-700'
                : slaStatus.toLowerCase().includes('warning') || slaStatus.toLowerCase().includes('at risk')
                    ? 'bg-yellow-100 text-yellow-700'
                    : 'bg-green-100 text-green-700';

            // Status badge
            const statusBadgeClass = isOnDelivery ? 'bg-blue-100 text-blue-700' : 'bg-amber-100 text-amber-700';
            const statusLabel      = isOnDelivery ? 'On-Delivery' : 'Ready To Ship';

            // Tombol aksi
            const actionBtn = isOnDelivery
                ? `<button onclick="routeMarkDelivered('${noPO}', ${idx})"
                        id="route-btn-${idx}"
                        class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 bg-green-600 hover:bg-green-700 active:bg-green-800 text-white text-sm font-bold rounded-xl shadow transition">
                        <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                        </svg>
                        Delivered
                   </button>`
                : `<button onclick="routeStartDelivery('${noPO}', ${idx})"
                        id="route-btn-${idx}"
                        class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-white text-sm font-bold rounded-xl shadow transition">
                        <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        Start
                   </button>`;

            // Tombol Google Maps
            const mapsBtn = (mapsUrl || alamat)
                ? `<a href="${mapsUrl || 'https://maps.google.com/?q=' + encodeURIComponent(alamat)}" target="_blank" rel="noopener"
                        class="flex items-center justify-center w-11 h-full min-h-[42px] bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-xl border border-blue-200 transition" title="Buka Google Maps">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                   </a>`
                : '';

            return `
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex flex-col gap-3 hover:shadow-md transition" id="route-card-${idx}">
                <!-- Header: Customer + Status badge -->
                <div class="flex items-start justify-between gap-2">
                    <div class="flex-1 min-w-0">
                        <p class="text-base font-bold text-gray-800 truncate" title="${customer}">${customer || '-'}</p>
                        ${alamat ? `<p class="text-xs text-gray-400 truncate mt-0.5" title="${alamat}">${alamat}</p>` : ''}
                    </div>
                    <span class="flex-shrink-0 inline-block px-2 py-1 rounded-full text-xs font-bold ${statusBadgeClass}">${statusLabel}</span>
                </div>

                <!-- Info: No PO | Zona | SLA -->
                <div class="flex flex-wrap items-center gap-x-3 gap-y-1 text-xs text-gray-500 border-t border-gray-50 pt-2">
                    <span class="font-semibold text-gray-700">${noPO || '-'}</span>
                    ${zona ? `<span class="flex items-center gap-1"><svg class="h-3 w-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>${zona}</span>` : ''}
                    ${slaStatus ? `<span class="inline-block px-2 py-0.5 rounded-full font-semibold ${slaBadgeClass}">${slaStatus}</span>` : ''}
                    ${isOnDelivery && jamBrgkt ? `<span class="text-gray-400">⏱ Berangkat: ${jamBrgkt}</span>` : ''}
                </div>

                <!-- Action buttons -->
                <div class="flex gap-2 items-stretch mt-1">
                    ${actionBtn}
                    ${mapsBtn}
                </div>
            </div>`;
        }

        /**
         * Klik tombol "Start" pada sebuah card → ubah status ke "On-Delivery" + catat jam berangkat
         */
        async function routeStartDelivery(noPO, idx) {
            const btn = document.getElementById(`route-btn-${idx}`);
            if (!btn) return;

            // Loading state
            const origHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-1"></span> Memulai...`;

            const jamBerangkat = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

            try {
                const res = await fetch(DELIVERY_GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        action: 'startDelivery',
                        noPO: noPO,
                        jamBerangkat: jamBerangkat
                    })
                });
                const result = await res.json();

                if (result.success) {
                    // Update card UI tanpa reload penuh
                    const card = document.getElementById(`route-card-${idx}`);
                    if (card) {
                        // Ganti status badge
                        const statusBadge = card.querySelector('.flex-shrink-0.inline-block');
                        if (statusBadge) {
                            statusBadge.className = 'flex-shrink-0 inline-block px-2 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-700';
                            statusBadge.textContent = 'On-Delivery';
                        }
                        // Ganti tombol Start → Delivered
                        btn.id = `route-btn-${idx}`;
                        btn.className = 'flex-1 flex items-center justify-center gap-2 px-4 py-2.5 bg-green-600 hover:bg-green-700 active:bg-green-800 text-white text-sm font-bold rounded-xl shadow transition';
                        btn.disabled = false;
                        btn.innerHTML = `
                            <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                            </svg>
                            Delivered`;
                        btn.setAttribute('onclick', `routeMarkDelivered('${noPO}', ${idx})`);

                        // Tambah info jam berangkat di info row
                        const infoRow = card.querySelector('.flex.flex-wrap');
                        if (infoRow && jamBerangkat) {
                            const jamSpan = document.createElement('span');
                            jamSpan.className = 'text-gray-400';
                            jamSpan.textContent = `⏱ Berangkat: ${jamBerangkat}`;
                            infoRow.appendChild(jamSpan);
                        }
                    }
                    showAlert('success', '🚚 Pengiriman Dimulai!', `PO <b>${noPO}</b> status berubah ke <b>On-Delivery</b>.<br>Jam berangkat: <b>${jamBerangkat}</b>`);
                } else {
                    btn.disabled = false;
                    btn.innerHTML = origHTML;
                    showAlert('error', 'Gagal', result.message || 'Terjadi kesalahan di server.');
                }
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = origHTML;
                showAlert('error', 'Koneksi Error', 'Tidak dapat terhubung ke server: ' + err.message);
            }
        }

        /**
         * Klik tombol "Delivered" pada sebuah card → ubah status ke "Done", sembunyikan card
         */
        async function routeMarkDelivered(noPO, idx) {
            const ok = await showConfirm(
                'Konfirmasi Pengantaran Selesai?',
                `PO <b>${noPO}</b> akan ditandai <b>Done</b>.<br>Status di sheet Plan Driver dan PO Data akan diperbarui.`
            );
            if (!ok) return;

            const btn = document.getElementById(`route-btn-${idx}`);
            const origHTML = btn ? btn.innerHTML : '';
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = `<span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-1"></span> Menyimpan...`;
            }

            const tglKonfirmasi = new Date().toISOString().split('T')[0];

            try {
                const res = await fetch(DELIVERY_GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        action: 'deliveryDone',
                        noPO: noPO,
                        tglKonfirmasi: tglKonfirmasi
                    })
                });
                const result = await res.json();

                if (result.success) {
                    // Animasi keluar → sembunyikan card
                    const card = document.getElementById(`route-card-${idx}`);
                    if (card) {
                        card.style.transition = 'opacity 0.4s, transform 0.4s';
                        card.style.opacity = '0';
                        card.style.transform = 'scale(0.95)';
                        setTimeout(() => card.remove(), 420);
                    }
                    showAlert('success', '✅ Pengantaran Selesai!',
                        `PO <b>${noPO}</b> telah dicatat sebagai <b>Done</b>.`);

                    // Jika tidak ada card lagi, tampilkan empty state
                    setTimeout(() => {
                        const grid = document.getElementById('route-cards-grid');
                        if (grid && grid.children.length === 0) {
                            document.getElementById('route-card-area').innerHTML = `
                            <div class="flex flex-col items-center justify-center py-20 text-center">
                                <svg class="h-16 w-16 text-green-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                                <p class="text-lg font-semibold text-gray-400">Semua pengiriman selesai! 🎉</p>
                            </div>`;
                        }
                    }, 500);
                } else {
                    if (btn) { btn.disabled = false; btn.innerHTML = origHTML; }
                    showAlert('error', 'Gagal Menyimpan', result.message || 'Terjadi kesalahan di server.');
                }
            } catch (err) {
                if (btn) { btn.disabled = false; btn.innerHTML = origHTML; }
                showAlert('error', 'Koneksi Error', 'Tidak dapat terhubung ke server: ' + err.message);
            }
        }

        // =========================================================================
        // SCAN QR VIA KAMERA — unified untuk Route & Inbound
        // =========================================================================
        let _html5QrCode = null;
        let _qrFacingBack = true;
        let _qrCallback = null;   // callback(decodedText) — null = pakai _handleQRResult (Route)

        async function startQRCamera(forceBack, callback) {
            if (typeof forceBack === 'boolean') _qrFacingBack = forceBack;
            _qrCallback = (typeof callback === 'function') ? callback : null;

            const modal = document.getElementById('qr-camera-modal');
            const camStat = document.getElementById('qr-cam-status');
            const switchBtn = document.getElementById('qr-switch-btn');
            if (!modal) { alert('Refresh halaman terlebih dahulu.'); return; }

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            const setStatus = (html) => {
                if (camStat) camStat.innerHTML =
                    `<span style="background:rgba(0,0,0,0.65);color:#fff;font-size:12px;padding:6px 14px;border-radius:999px;">${html}</span>`;
            };

            setStatus('⏳ Membuka kamera...');

            // Hentikan instance sebelumnya jika ada
            if (_html5QrCode) {
                try { await _html5QrCode.stop(); } catch (_) { }
                try { _html5QrCode.clear(); } catch (_) { }
                _html5QrCode = null;
            }

            if (typeof Html5Qrcode === 'undefined') {
                setStatus('❌ Library QR Code gagal dimuat. Periksa koneksi internet.');
                return;
            }

            _html5QrCode = new Html5Qrcode('qr-reader');

            const config = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1 };
            const cameraConfig = { facingMode: _qrFacingBack ? 'environment' : 'user' };

            try {
                await _html5QrCode.start(
                    cameraConfig,
                    config,
                    (decodedText) => {
                        setStatus('✅ QR terbaca!');
                        const decoded = decodedText.trim();
                        const cb = _qrCallback;
                        stopQRCamera();
                        if (cb) {
                            cb(decoded);
                        } else {
                            _handleQRResult(decoded);
                        }
                    },
                    () => { /* abaikan error 'not found' per-frame */ }
                );
                setStatus('📷 Arahkan ke QR Code...');

                // Tombol ganti kamera
                if (switchBtn) {
                    try {
                        const cams = await Html5Qrcode.getCameras();
                        switchBtn.classList.toggle('hidden', !(cams && cams.length > 1));
                    } catch (_) { switchBtn.classList.add('hidden'); }
                }
            } catch (err) {
                setStatus('❌ ' + (err && err.toString ? err.toString() : 'Gagal membuka kamera.'));
            }
        }

        function switchQRCamera() {
            _qrFacingBack = !_qrFacingBack;
            startQRCamera(_qrFacingBack, _qrCallback);
        }

        function stopQRCamera() {
            const modal = document.getElementById('qr-camera-modal');
            if (_html5QrCode) {
                const inst = _html5QrCode;
                _html5QrCode = null;
                inst.stop().then(() => { try { inst.clear(); } catch (_) { } }).catch(() => { });
            }
            if (modal) modal.classList.add('hidden');
            document.body.style.overflow = '';
        }

        /**
         * Proses hasil teks QR Code dari Request Order NOD.
         * Format QR:
         *   === REQUEST ORDER ===
         *   No. PO: OT-15062026-1
         *   Tanggal: 14 Juni 2026
         *   Ordered By: Herfian Juliansyah
         *   Phone: 081212345678
         *   Kategori: Outlet

        /** Bunyi beep sukses via Web Audio API (tidak perlu file audio eksternal) */
        function playScanBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const gain = ctx.createGain();
                gain.connect(ctx.destination);

                // Beep pertama — nada tinggi
                const o1 = ctx.createOscillator();
                o1.type = 'sine';
                o1.frequency.setValueAtTime(1046, ctx.currentTime);          // C6
                o1.frequency.setValueAtTime(1318, ctx.currentTime + 0.08);   // E6
                gain.gain.setValueAtTime(0.35, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
                o1.connect(gain);
                o1.start(ctx.currentTime);
                o1.stop(ctx.currentTime + 0.22);

                // Beep kedua — sedikit lebih tinggi (konfirmasi)
                const gain2 = ctx.createGain();
                gain2.connect(ctx.destination);
                const o2 = ctx.createOscillator();
                o2.type = 'sine';
                o2.frequency.setValueAtTime(1568, ctx.currentTime + 0.15);   // G6
                gain2.gain.setValueAtTime(0.25, ctx.currentTime + 0.15);
                gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.38);
                o2.connect(gain2);
                o2.start(ctx.currentTime + 0.15);
                o2.stop(ctx.currentTime + 0.38);

                setTimeout(() => ctx.close(), 600);
            } catch (_) { /* browser tidak mendukung Web Audio */ }
        }

        function _handleQRResult(raw) {
            const statusEl = document.getElementById('do-scan-status');

            // Parse baris per baris
            const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
            const get = (key) => {
                for (const ln of lines) {
                    const re = new RegExp('^' + key + '\\s*[:\\-]\\s*(.+)$', 'i');
                    const m = ln.match(re);
                    if (m) return m[1].trim();
                }
                return '';
            };

            const noPO = get('No\\.?\\s*PO');
            const orderedBy = get('Ordered By');
            const shipTo = get('Ship To');
            const alamat = get('Alamat');
            const phone = get('Phone').replace(/\s+/g, '');
            const shippingRaw = get('Shipping Date');
            const shippingDate = _parseShippingDateToInput(shippingRaw);

            // Isi form
            const set = (id, val) => { const el = document.getElementById(id); if (el && val) el.value = val; };
            set('do-no-po', noPO);
            set('do-ordered-by', orderedBy);
            set('do-ship-to', shipTo);
            set('do-alamat', alamat);
            set('do-phone', phone);
            set('do-shipping-date', shippingDate);

            const filled = [noPO, orderedBy, shipTo, alamat, shippingDate].filter(Boolean).length;
            if (filled > 0) {
                // ✅ Bunyi + pop-up sukses
                playScanBeep();
                showScanSuccessToast(
                    'QR Code Terbaca!',
                    `No. PO: <strong>${noPO || '-'}</strong><br>${shipTo || orderedBy || ''}`
                );
                if (statusEl) {
                    statusEl.textContent = `✅ QR berhasil — ${filled} field terisi otomatis.`;
                    statusEl.className = 'text-xs text-center text-green-600 mb-4 font-semibold';
                }
            } else {
                if (statusEl) {
                    statusEl.textContent = '⚠️ QR terbaca tapi tidak ada data yang cocok. Isi manual.';
                    statusEl.className = 'text-xs text-center text-orange-500 mb-4 italic';
                }
            }
        }

        /**
         * Konversi "16 Juni 2026" → "2026-06-16" untuk input type=date.
         * Juga menangani format dd/mm/yyyy dan yyyy-mm-dd.
         */
        function _parseShippingDateToInput(raw) {
            if (!raw) return '';
            const BULAN = {
                januari: 1, februari: 2, maret: 3, april: 4, mei: 5, juni: 6, juli: 7, agustus: 8, september: 9, oktober: 10, november: 11, desember: 12,
                january: 1, february: 2, march: 3, may: 5, june: 6, july: 7, august: 8, october: 10, december: 12
            };
            // "16 Juni 2026"
            const m1 = raw.match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/);
            if (m1) {
                const mon = BULAN[m1[2].toLowerCase()];
                if (mon) return `${m1[3]}-${String(mon).padStart(2, '0')}-${m1[1].padStart(2, '0')}`;
            }
            // "2026-06-16"
            if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
            // "16/06/2026" or "16-06-2026"
            const m2 = raw.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
            if (m2) return `${m2[3]}-${m2[2].padStart(2, '0')}-${m2[1].padStart(2, '0')}`;
            return '';
        }

        // ─── SCAN PDF Delivery Order / Request Order (koordinat-aware) ───────────
        async function scanDOPdf() {
            const fileInput = document.getElementById('do-pdf-file');
            const statusEl = document.getElementById('do-scan-status');
            if (!fileInput || !fileInput.files || !fileInput.files[0]) {
                showAlert('warning', 'File Belum Dipilih', 'Pilih file PDF Request Order terlebih dahulu.');
                return;
            }

            statusEl.textContent = '⏳ Membaca PDF...';
            statusEl.className = 'text-xs text-center text-amber-500 mb-4 italic';

            try {
                const file = fileInput.files[0];
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                // Kumpulkan semua token dengan posisi X,Y dari seluruh halaman
                const allTokens = [];   // { str, x, y }
                for (let p = 1; p <= pdf.numPages; p++) {
                    const page = await pdf.getPage(p);
                    const tc = await page.getTextContent();
                    const vp = page.getViewport({ scale: 1 });
                    for (const item of tc.items) {
                        if (!item.str || !item.str.trim()) continue;
                        allTokens.push({
                            str: item.str.trim(),
                            x: Math.round(item.transform[4]),
                            y: Math.round(vp.height - item.transform[5])  // flip Y → top-down
                        });
                    }
                }

                const parsed = parseDOFromTokens(allTokens);

                const setField = (id, val) => {
                    const el = document.getElementById(id);
                    if (el && val) el.value = val;
                };
                setField('do-no-po', parsed.noPO);
                setField('do-ordered-by', parsed.orderedBy);
                setField('do-ship-to', parsed.shipTo);
                setField('do-shipping-date', parsed.shippingDate);
                setField('do-alamat', parsed.alamat);
                setField('do-phone', parsed.phone);

                const filled = Object.values(parsed).filter(Boolean).length;
                statusEl.textContent = filled > 0
                    ? `✅ Berhasil membaca ${filled} field dari PDF.`
                    : '⚠️ Tidak ada data yang terbaca. Coba scan QR Code atau isi manual.';
                statusEl.className = filled > 0
                    ? 'text-xs text-center text-green-600 mb-4 font-semibold'
                    : 'text-xs text-center text-orange-500 mb-4 italic';

            } catch (err) {
                statusEl.textContent = '❌ Gagal membaca PDF: ' + err.message;
                statusEl.className = 'text-xs text-center text-red-500 mb-4';
            }
        }

        /**
         * Parser utama berbasis koordinat X,Y — disesuaikan dengan struktur
         * token PDF Request Order NOD yang SESUNGGUHNYA:
         *
         * Struktur token PDF:
         *   y= 94  x= 40   | 'Tanggal'            y= 94  x=119  | ': 14 Juni 2026'
         *   y=111  x= 40   | 'No. PO'              y=111  x=119  | ': OT-15062026-1'
         *   y=111  x=309   | 'Ship To'             y=111  x=388  | ': NOD Astha'
         *   y=128  x= 40   | 'Ordered By'          y=128  x=119  | ': Herfian Juliansyah'
         *   y=128  x=309   | 'Alamat'              y=128  x=388  | ': Jl. Panjang Arteri...'
         *   y=140  x=397   | 'RT.1/RW.3, ...'     ← lanjutan Alamat (TIDAK ADA label)
         *   y=145  x= 40   | 'Phone'               y=145  x=119  | ': 081212345678'
         *   y=151  x=397   | 'Jeruk, Kota ...'    ← lanjutan Alamat
         *   y=163  x=397   | 'Khusus Ibukota ...' ← lanjutan Alamat
         *   y=196  x=309   | 'Shipping Date'       y=196  x=388  | ': 16 Juni 2026'
         */
        function parseDOFromTokens(tokens) {
            const result = { noPO: '', orderedBy: '', phone: '', shipTo: '', alamat: '', shippingDate: '' };
            if (!tokens.length) return result;

            // ── 1. Kelompokkan per baris — Y bucket KECIL (4px) agar baris berdekatan
            //       tidak bercampur (misal y=140 dan y=145 harus beda bucket) ──
            const rowMap = new Map();
            for (const tk of tokens) {
                const bucket = Math.round(tk.y / 4) * 4;
                if (!rowMap.has(bucket)) rowMap.set(bucket, []);
                rowMap.get(bucket).push(tk);
            }
            const rows = Array.from(rowMap.entries())
                .sort((a, b) => a[0] - b[0])
                .map(([y, tks]) => ({ y, tokens: tks.sort((a, b) => a.x - b.x) }));

            // ── 2. LABEL_MAP: token label → key result ──
            const LABEL_MAP = {
                'No. PO': 'noPO',
                'No.PO': 'noPO',
                'Ordered By': 'orderedBy',
                'Phone': 'phone',
                'Ship To': 'shipTo',
                'Alamat': 'alamat',
                'Shipping Date': 'shippingDate',
                'Tanggal': '_tanggal',
                'Kategori': '_kategori',
            };

            const stripColon = s => s.replace(/^\s*:\s*/, '').trim();

            let alamatRowY = -1;

            // ── 3. Pass pertama: scan setiap baris, pasangkan label → nilai ──
            for (const row of rows) {
                let currentLabel = null;
                for (const tk of row.tokens) {
                    const s = tk.str;

                    // Token adalah label yang dikenal?
                    const key = LABEL_MAP[s];
                    if (key) {
                        currentLabel = key;
                        if (key === 'alamat') alamatRowY = row.y;
                        continue;
                    }

                    // Token adalah nilai (dimulai ':') → pasangkan ke label aktif
                    if (s.startsWith(':') && currentLabel) {
                        const val = stripColon(s);
                        if (val && !result[currentLabel] && !currentLabel.startsWith('_')) {
                            result[currentLabel] = val;
                        }
                        currentLabel = null;
                        continue;
                    }

                    // Nilai tanpa ':' (fallback untuk format berbeda)
                    if (currentLabel && !s.startsWith(':') && !LABEL_MAP[s]) {
                        const looksLikeValue = /\d/.test(s) || /[,.\-\/]/.test(s);
                        if (looksLikeValue && !result[currentLabel] && !currentLabel.startsWith('_')) {
                            result[currentLabel] = s;
                        }
                        currentLabel = null;
                    }
                }
            }

            // ── 4. Kumpulkan baris lanjutan Alamat ──
            // Lanjutan Alamat = baris di BAWAH baris Alamat pertama,
            // token berada di kolom KANAN (x > 280), TIDAK dimulai ':'
            // BERHENTI di baris tabel item (ada token "No" + "Item"/"Qty")
            if (alamatRowY >= 0) {
                // Cari Y tabel item
                let tableY = 9999;
                for (const row of rows) {
                    const texts = row.tokens.map(t => t.str);
                    if (texts.some(t => /^No\.?$/i.test(t)) && texts.some(t => /^(Item|Qty)$/i.test(t))) {
                        tableY = row.y;
                        break;
                    }
                }

                for (const row of rows) {
                    if (row.y <= alamatRowY) continue;   // hanya baris DI BAWAH Alamat
                    if (row.y >= tableY) break;        // stop di tabel item

                    // Ambil token kolom kanan yang BUKAN label dan BUKAN nilai ber-':'
                    const rightTokens = row.tokens.filter(tk =>
                        tk.x > 280 &&
                        !tk.str.startsWith(':') &&
                        !LABEL_MAP[tk.str]
                    );
                    if (rightTokens.length > 0) {
                        const cont = rightTokens.map(t => t.str).join(' ').trim();
                        if (cont.length > 2) {
                            result.alamat = (result.alamat + ' ' + cont).trim();
                        }
                    }
                }
            }

            // ── 5. Fallback No. PO dari header jika belum terisi ──
            if (!result.noPO) {
                // Cari token seperti "No. PO: OT-15062026-1" dalam satu string
                for (const row of rows) {
                    for (const tk of row.tokens) {
                        const m = tk.str.match(/No\.?\s*PO\s*[:\-]\s*([A-Z0-9\-\/]+)/i);
                        if (m) { result.noPO = m[1]; break; }
                    }
                    if (result.noPO) break;
                }
            }
            if (!result.noPO) {
                const allText = rows.flatMap(r => r.tokens.map(t => t.str)).join(' ');
                const m = allText.match(/\b([A-Z]{1,5}-\d{5,}[-\d]*)\b/);
                if (m) result.noPO = m[1];
            }

            // ── 6. Bersihkan ──
            if (result.noPO) result.noPO = result.noPO.split(/\s+/)[0];
            if (result.phone) result.phone = result.phone.replace(/[^\d+]/g, '');
            if (result.shippingDate) result.shippingDate = _parseShippingDateToInput(result.shippingDate);
            if (result.alamat) result.alamat = result.alamat.replace(/\s*(?:Shipping\s*Date|Phone|Telp)\s*:.*/i, '').trim();

            return result;
        }

        /** Cek apakah string kemungkinan adalah nilai (bukan label) */
        function val_looks_like_value(s) {
            return /\d/.test(s) || /[,.\-\/]/.test(s) || s.split(/\s+/).length > 3;
        }

        // ─── Submit Delivery Done ──────────────────────────────────────────────────
        async function submitDeliveryDone() {
            const noPO = document.getElementById('do-no-po')?.value?.trim();
            const orderedBy = document.getElementById('do-ordered-by')?.value?.trim();
            const shipTo = document.getElementById('do-ship-to')?.value?.trim();
            const shippingDate = document.getElementById('do-shipping-date')?.value?.trim();
            const alamat = document.getElementById('do-alamat')?.value?.trim();
            const phone = document.getElementById('do-phone')?.value?.trim();
            const namaDriver = document.getElementById('do-nama-driver')?.value?.trim();
            const tglKonfirmasi = document.getElementById('do-tgl-konfirmasi')?.value || new Date().toISOString().split('T')[0];

            // ── Validasi semua field wajib ──
            const missing = [];
            if (!noPO) missing.push('No. PO');
            if (!orderedBy) missing.push('Ordered By');
            if (!shipTo) missing.push('Ship To');
            if (!shippingDate) missing.push('Shipping Date');
            if (!alamat) missing.push('Alamat');
            if (!phone) missing.push('Phone');
            if (!namaDriver) missing.push('Nama Driver');

            if (missing.length > 0) {
                showAlert('warning', 'Data Belum Lengkap', `Field berikut masih kosong: ${missing.join(', ')}`);
                return;
            }

            const ok = await showConfirm(
                'Konfirmasi Selesai Pengantaran?',
                `PO <b>${noPO}</b> akan ditandai <b>Done</b>.<br>Status di PO_Data dan Report Status juga akan berubah menjadi Done.`
            );
            if (!ok) return;

            // ── Loading di tombol ──
            const btn = document.querySelector('button[onclick="submitDeliveryDone()"]');
            const origHTML = btn ? btn.innerHTML : '';
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = `<span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-2"></span> Menyimpan...`;
            }

            const payload = {
                action: 'deliveryDone',
                noPO,
                orderedBy,
                shipTo,
                shippingDate,
                alamat,
                phone,
                tglKonfirmasi,
                driver: namaDriver
            };

            try {
                const res = await fetch(DELIVERY_GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();

                if (result.success) {
                    // Update badge di DOM Report Status jika sedang terbuka
                    const statusCell = document.getElementById(`status-${noPO}`);
                    if (statusCell) {
                        statusCell.innerHTML = `<span class="inline-block px-2 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700">Done</span>`;
                    }
                    const rowEl = document.getElementById(`row-${noPO}`);

                const taskData = data.slice(1).filter(row =>

                );

                if (taskData.length === 0) {
                    contentArea.innerHTML = `
                    <h1 class="text-3xl font-semibold text-gray-700 mb-6">Plan Task</h1>
                    <div class="flex flex-col items-center justify-center h-64 bg-white rounded-lg border border-gray-300 shadow-sm">
                        <p class="text-4xl mb-4">✅</p>
                        <p class="text-xl font-bold text-gray-600">Task Clear</p>
                        <p class="text-gray-400">Tidak ada tugas yang perlu dikerjakan saat ini.</p>
                    </div>`;
                    return;
                }

                function formatDeadline(cell) {
                    const raw = String(cell).trim();
                    if (!raw.includes('T')) return raw;
                    const date = new Date(raw.split('T')[0]);
                    date.setDate(date.getDate() + 1);
                    const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
                    return `${String(date.getDate()).padStart(2, '0')}-${months[date.getMonth()]}-${date.getFullYear()}`;
                }

                let rows_html = '';
                taskData.forEach(row => {
                    rows_html += '<tr class="hover:bg-gray-50 text-xs">';
                    row.forEach((cell, index) => {
                        let value = String(cell || '-').trim();
                        if (index === 0 || index === 2) {
                            value = value.split('\n').map(t => t.replace(/^- /, '').trim()).filter(t => t !== '').join('<br>');
                        } else if (index === 1) {
                            value = formatDeadline(cell);
                        } else if (index === 4) {
                            const statuses = value.split('\n').map(s => s.replace(/^- /, '').trim()).filter(s => s !== '' && s !== '-');
                            value = [...new Set(statuses)].join('<br>');
                        }
                        const extra = index === 1 ? 'whitespace-nowrap' : '';
                        rows_html += `<td class="p-3 border-r border-gray-200 text-center ${extra}">${value}</td>`;
                    });
                    rows_html += '</tr>';
                });

                contentArea.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-semibold text-gray-700">Task</h1>
                    <button id="shareBtn" onclick="shareToWhatsApp()"

                    <h1 class="text-3xl font-semibold text-gray-700 mb-6">Plan Task</h1>
                    <div class="rounded-lg shadow-sm border border-gray-300 overflow-hidden">

                            </thead>
                            <tbody class="text-gray-600 divide-y divide-gray-200">${rows_html}</tbody>
                        </table>
                    </div>
                </div>`;
            } catch (err) { setError(err.message); }
        }

        function updatePOPreview() {
            const category = document.getElementById('category').value;
            const preview = document.getElementById('po-preview');
            if (!category || !CATEGORY_CODE[category]) {
                preview.textContent = 'Pilih kategori untuk melihat preview No. PO';
                preview.className = 'w-full p-3 border border-gray-200 rounded-lg bg-gray-100 text-gray-500 text-sm font-mono tracking-wide';
                return;
            }
            preview.textContent = `${CATEGORY_CODE[category]}-${formatDateForPO(new Date())}-00?`;
            preview.className = 'w-full p-3 border border-amber-200 rounded-lg bg-amber-50 text-amber-700 text-sm font-mono tracking-wide font-bold';
        }

        /** Auto-trigger No. PO preview when item table gets first row filled */
        function checkAutoTriggerPOPreview() {
            const category = document.getElementById('category');
            const preview = document.getElementById('po-preview');
            if (!category || !preview) return;
            // Only auto-trigger if category already selected but preview not yet shown
            const hasCategory = category.value && CATEGORY_CODE[category.value];
            if (hasCategory) return; // already triggered via onchange
            const tbody = document.getElementById('po-item-table-body');
            if (!tbody) return;
            const hasItem = tbody.querySelectorAll('tr:not([data-placeholder])').length > 0;
            if (hasItem && category.value) {
                updatePOPreview();
            }
        }

        async function submitPO() {
            const namaEl = document.getElementById('nama');
            const categoryEl = document.getElementById('category');
            const allocatedToEl = document.getElementById('allocated-to');
            const fileInput = document.getElementById('pdfFile');
            const btn = document.getElementById('submitBtn');
            const btnLabel = document.getElementById('submitBtnLabel');

            if (!namaEl.value) { showAlert('warning', 'Belum Lengkap', 'Pilih nama pemohon terlebih dahulu.'); return; }
            if (!categoryEl.value) { showAlert('warning', 'Belum Lengkap', 'Pilih kategori terlebih dahulu.'); return; }
            if (!allocatedToEl || !allocatedToEl.value.trim()) { showAlert('warning', 'Belum Lengkap', 'Isi field "Ship To" terlebih dahulu.'); return; }
            const shippingDateVal = document.getElementById('po-shipping-date')?.value || '';
            if (!shippingDateVal) { showAlert('warning', 'Belum Lengkap', 'Isi Shipping Date terlebih dahulu.'); return; }
            const file = fileInput.files[0];
            if (!file) { showAlert('warning', 'Belum Lengkap', 'Pilih file PDF terlebih dahulu.'); return; }

            const setSubmitLoading = (loading) => {
                btn.disabled = loading;
                let spinner = btn.querySelector('.submit-spinner');
                if (loading) {
                    if (!spinner) {
                        spinner = document.createElement('svg');
                        spinner.className = 'submit-spinner animate-spin h-4 w-4 flex-shrink-0';
                        spinner.setAttribute('viewBox', '0 0 24 24');
                        spinner.setAttribute('fill', 'none');
                        spinner.innerHTML = '<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>';
                        btn.insertBefore(spinner, btnLabel);
                    }
                    btnLabel.textContent = 'Mengirim...';
                } else {
                    if (spinner) spinner.remove();
                    btnLabel.textContent = 'Kirim PO';
                }
            };

            setSubmitLoading(true);

            const reader = new FileReader();
            reader.onload = async function (e) {
                const payload = {
                    action: 'submitPO',
                    nama: namaEl.value,
                    allocatedTo: allocatedToEl ? allocatedToEl.value.trim() : '',
                    alamat: document.getElementById('po-alamat')?.value?.trim() || '',
                    phone: document.getElementById('po-phone')?.value?.trim() || '',
                    shippingDate: document.getElementById('po-shipping-date')?.value || '',
                    noteKhusus: document.getElementById('po-note-khusus')?.value?.trim() || '',
                    category: categoryEl.value,
                    categoryCode: CATEGORY_CODE[categoryEl.value],
                    tanggal: formatDateForPO(new Date()),
                    fileData: e.target.result.split(',')[1],
                    fileName: file.name,
                    fileType: file.type,
                };
                try {
                    const response = await fetch(API_URLS.purchaseOrder, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    showAlert('success', 'PO Berhasil Dikirim!', 'No. PO: ' + result.po);
                    resetFormPO();
                } catch (err) {
                    showAlert('error', 'Gagal Mengirim PO', err.message);
                } finally {
                    setSubmitLoading(false);
                }
            };
            reader.readAsDataURL(file);
        }
