        function tambahBarisFormPO() {
            const tbody = document.getElementById('po-item-table-body');
            if (!tbody) return;
            const placeholder = tbody.querySelector('tr[data-placeholder]');
            if (placeholder) placeholder.remove();

            const DESCRIPTION_OPTIONS = ['Supplies', 'Sampling', 'Machine Selling', 'Machine Display', 'Capsule Selling', 'Machine Event'];
            const UOM_OPTIONS = ['Pcs', 'Box', 'Unit', 'Pack', 'Karton', 'Kg', 'Ltr', 'Lusin', 'Set', 'Roll', 'Sheet', 'Btl', 'Dus', 'Meter'];
            const descOpts = DESCRIPTION_OPTIONS.map(o => `<option value="${o}">${o}</option>`).join('');
            const uomOpts = UOM_OPTIONS.map(o => `<option value="${o}">${o}</option>`).join('');

            const bg = tbody.querySelectorAll('tr').length % 2 === 0 ? 'bg-white' : 'bg-gray-50';
            const tr = document.createElement('tr');
            tr.className = `${bg} border-b border-gray-100`;

            tr.innerHTML = `
                <td class="p-2 font-medium relative">
                    <div class="relative">
                        <input type="text"
                            class="po-item-nama w-full p-1 border border-gray-300 rounded text-xs focus:ring-1 focus:ring-amber-400 outline-none"
                            placeholder="Ketik/pilih item..."
                            autocomplete="off">
                        <ul class="autocomplete-list absolute z-50 left-0 top-full mt-0.5 w-64 bg-white border border-gray-200 rounded-lg shadow-lg max-h-48 overflow-y-auto hidden text-xs"></ul>
                    </div>
                </td>
                <td class="p-2 text-center">
                    <input type="number" min="1" value="1" class="po-item-qty w-full p-1 border border-gray-300 rounded text-center text-xs focus:ring-1 focus:ring-amber-400 outline-none">
                </td>
                <td class="p-2 text-center">
                    <select class="po-item-uom w-full text-xs border border-gray-200 rounded p-1 focus:ring-1 focus:ring-amber-400 outline-none bg-white">
                        ${uomOpts}
                    </select>
                </td>
                <td class="p-2">
                    <select class="po-item-desc w-full text-xs border border-gray-200 rounded p-1 focus:ring-1 focus:ring-amber-400 outline-none bg-white">${descOpts}</select>
                </td>
                <td class="p-2">
                    <input type="text" class="po-item-note w-full p-1 border border-gray-300 rounded text-xs focus:ring-1 focus:ring-amber-400 outline-none" placeholder="Catatan...">
                </td>
                <td class="p-2 text-center">
                    <button onclick="hapusBarisFormPO(this)" title="Hapus baris"
                        class="text-red-400 hover:text-red-600 hover:bg-red-50 rounded p-1 transition">
                        <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </td>`;

            tbody.appendChild(tr);

            // Auto-show No. PO preview when first row is added
            checkAutoTriggerPOPreview();

            // Autocomplete logic
            const input = tr.querySelector('.po-item-nama');
            const list = tr.querySelector('.autocomplete-list');

            function renderList(filtered) {
                list.innerHTML = '';
                if (filtered.length === 0) { list.classList.add('hidden'); return; }
                filtered.forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    li.className = 'px-3 py-2 hover:bg-amber-50 hover:text-amber-700 cursor-pointer transition';
                    li.onmousedown = (e) => {
                        e.preventDefault();
                        input.value = item;
                        list.classList.add('hidden');
                    };
                    list.appendChild(li);
                });
                list.classList.remove('hidden');
            }

            input.addEventListener('input', async () => {
                const q = input.value.trim().toLowerCase();
                if (!q) { list.classList.add('hidden'); return; }
                const items = await getSourceItems();
                const filtered = items.filter(i => i.toLowerCase().includes(q)).slice(0, 20);
                renderList(filtered);
            });

            input.addEventListener('focus', async () => {
                const q = input.value.trim().toLowerCase();
                if (q) {
                    const items = await getSourceItems();
                    const filtered = items.filter(i => i.toLowerCase().includes(q)).slice(0, 20);
                    renderList(filtered);
                }
            });

            input.addEventListener('blur', () => {
                setTimeout(() => list.classList.add('hidden'), 150);
            });

            input.addEventListener('keydown', (e) => {
                const lis = list.querySelectorAll('li');
                const active = list.querySelector('li.bg-amber-100');
                const isListVisible = !list.classList.contains('hidden') && lis.length > 0;
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    const next = active ? active.nextElementSibling : lis[0];
                    if (active) active.classList.remove('bg-amber-100');
                    if (next) next.classList.add('bg-amber-100');
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    const prev = active ? active.previousElementSibling : lis[lis.length - 1];
                    if (active) active.classList.remove('bg-amber-100');
                    if (prev) prev.classList.add('bg-amber-100');
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (isListVisible) {
                        const toSelect = active || lis[0];
                        if (toSelect) { input.value = toSelect.textContent; list.classList.add('hidden'); }
                    } else {
                        if (input.value.trim()) { tambahBarisFormPO(); }
                    }
                } else if (e.key === 'Escape') {
                    list.classList.add('hidden');
                }
            });

            input.focus();
        }

        function hapusBarisFormPO(btn) {
            const tr = btn.closest('tr');
            const tbody = document.getElementById('po-item-table-body');
            if (!tbody) return;
            tr.remove();
            if (tbody.querySelectorAll('tr').length === 0) {
                tbody.innerHTML = '<tr data-placeholder><td colspan="6" class="p-6 text-center text-gray-400 italic">Klik "Tambah Baris" untuk menambah item</td></tr>';
            }
        }

        async function downloadRequestOrderPDFInner() {
            const namaEl = document.getElementById('nama');
            const categoryEl = document.getElementById('category');
            const allocatedToEl = document.getElementById('allocated-to');
            const poPreview = document.getElementById('po-preview');

            const orderedBy = namaEl ? namaEl.value : '';
            const allocatedTo = allocatedToEl ? allocatedToEl.value.trim() : '';
            const alamat = document.getElementById('po-alamat')?.value?.trim() || '';
            const phone = document.getElementById('po-phone')?.value?.trim() || '';
            const shippingDateRaw = document.getElementById('po-shipping-date')?.value || '';
            const shippingDate = shippingDateRaw ? formatTanggalIndo(shippingDateRaw) : '-';
            const noPO = poPreview ? poPreview.textContent.trim() : '';
            const noteKhusus = document.getElementById('po-note-khusus')?.value?.trim() || '';

            // Ambil item dari tabel
            const rows = document.querySelectorAll('#po-item-table-body tr:not([data-placeholder])');
            const items = [];
            rows.forEach(row => {
                const nama = row.querySelector('.po-item-nama')?.value?.trim() || '';
                if (!nama) return;
                const qty = row.querySelector('.po-item-qty')?.value || '1';
                const uom = row.querySelector('.po-item-uom')?.value || '-';
                const description = row.querySelector('.po-item-desc')?.value || '-';
                const note = row.querySelector('.po-item-note')?.value?.trim() || '';
                items.push({ nama, qty, uom, description, note });
            });

            if (items.length === 0) {
                showAlert('warning', 'Tabel Kosong', 'Tambahkan minimal satu item sebelum download.');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            const pageWidth = doc.internal.pageSize.getWidth();
            const marginX = 14;
            const today = new Date().toISOString().split('T')[0];

            // ── Hitung No. PO berikutnya dari data yang sudah ada ──
            let resolvedPONumber = null;
            if (categoryEl && categoryEl.value && CATEGORY_CODE[categoryEl.value]) {
                const catCode = CATEGORY_CODE[categoryEl.value];
                const dateStr = formatDateForPO(new Date());
                const prefix = `${catCode}-${dateStr}-`;
                try {
                    let poData = [];
                    try {
                        const r = await fetch(API_URLS.reportStatus + '?action=getPOData');
                        const raw = await r.json();
                        poData = Array.isArray(raw) ? raw : [];
                    } catch (_) { }
                    if (poData.length === 0) {
                        const r2 = await fetch(API_URLS.reportStatus);
                        const raw2 = await r2.json();
                        poData = Array.isArray(raw2) ? raw2 : [];
                    }
                    // Cari sequence tertinggi dengan prefix yang sama
                    let maxSeq = 0;
                    poData.slice(1).forEach(row => {
                        const no = String(row[1] || '').trim();
                        if (no.startsWith(prefix)) {
                            const seq = parseInt(no.replace(prefix, ''), 10);
                            if (!isNaN(seq) && seq > maxSeq) maxSeq = seq;
                        }
                    });
                    resolvedPONumber = `${prefix}${String(maxSeq + 1).padStart(3, '0')}`;
                } catch (_) { }
            }

            // ── Header Background Image ──
            try {
                doc.addImage(HEADER_BG_IMG, 'PNG', 0, 0, pageWidth, 32);
            } catch (_) { /* skip if fails */ }

            // ── Logo NOD ──
            const logoData = await loadImageAsDataURL(NOD_LOGO_URL);
            let logoBottomY = 18;
            if (logoData) {
                try {
                    const dims = getImageFitDims(logoData, 26, 14);
                    doc.addImage(logoData.dataUrl, logoData.format, marginX, 8, dims.w, dims.h);
                    logoBottomY = 8 + dims.h;
                } catch (_) {
                    drawFallbackLogo(doc, marginX);
                    logoBottomY = 22;
                }
            } else {
                drawFallbackLogo(doc, marginX);
                logoBottomY = 22;
            }

            // ── Tagline ──
            doc.setFont('helvetica', 'italic');
            doc.setFontSize(7.5);
            doc.setTextColor(120, 113, 108);
            doc.text('Your All-in-One Drink Maker', marginX, logoBottomY + 4);

            // ── Judul Dokumen: REQUEST ORDER ──
            doc.setTextColor(17, 24, 39);
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(16);
            doc.text('REQUEST ORDER', pageWidth - marginX, 16, { align: 'right' });
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(9);
            doc.setTextColor(107, 114, 128);
            const poLabel = resolvedPONumber || (noPO && noPO !== 'Pilih kategori untuk melihat preview No. PO' ? noPO : '-');
            doc.text('No. PO: ' + poLabel, pageWidth - marginX, 22, { align: 'right' });

            // ── Generate QR Code (berisi seluruh isi Request Order) ──
            const roQR = await generateROQRCodeDataURL({
                poLabel,
                today,
                orderedBy,
                phone,
                category: categoryEl ? categoryEl.value : '',
                allocatedTo,
                alamat,
                shippingDate,
                items
            });

            // Garis pemisah
            doc.setDrawColor(229, 231, 235);
            doc.setLineWidth(0.4);
            doc.line(marginX, 28, pageWidth - marginX, 28);

            // ── Info Box ──
            let y = 36;
            doc.setFontSize(10);
            doc.setTextColor(31, 41, 55);

            const infoLeft = [
                ['Tanggal', formatTanggalIndo(today)],
                ['No. PO', poLabel],
                ['Ordered By', orderedBy || '-'],
                ['Phone', phone || '-'],
            ];
            const infoRight = [
                ['Kategori', categoryEl ? categoryEl.value || '-' : '-'],
                ['Ship To', allocatedTo || '-'],
                ['Alamat', alamat || '-'],
                ['Shipping Date', shippingDate],
            ];

            const colLeftX = marginX;
            const colLeftLabelW = 28;
            const colRightX = pageWidth / 2 + 4;
            const colRightLabelW = 28;
            const lineH = 6;
            const colRightValueX = colRightX + colRightLabelW + 3;
            const colRightMaxW = pageWidth - marginX - colRightValueX;

            // Render left column (no wrapping needed)
            infoLeft.forEach((row, i) => {
                const yy = y + i * lineH;
                doc.setFont('helvetica', 'bold'); doc.text(row[0], colLeftX, yy);
                doc.setFont('helvetica', 'normal'); doc.text(':', colLeftX + colLeftLabelW, yy);
                doc.text(String(row[1] || '-'), colLeftX + colLeftLabelW + 3, yy);
            });

            // Render right column with text wrapping (justify) for multi-line values
            let rightY = y;
            infoRight.forEach((row) => {
                if (!row[0]) return;
                doc.setFont('helvetica', 'bold'); doc.text(row[0], colRightX, rightY);
                doc.setFont('helvetica', 'normal'); doc.text(':', colRightX + colRightLabelW, rightY);
                const wrapped = doc.splitTextToSize(String(row[1] || '-'), colRightMaxW);
                doc.text(wrapped, colRightValueX, rightY);
                rightY += lineH * wrapped.length;
            });

            y += Math.max(infoLeft.length * lineH, rightY - y) + 6;

            // ── Tabel Item ──
            const tableBody = items.map((it, idx) => [
                String(idx + 1),
                it.nama,
                it.qty || '-',
                it.uom || '-',
                it.description || '-',
                it.note || '-'
            ]);

            doc.autoTable({
                startY: y,
                head: [['No', 'Item', 'Qty', 'UOM', 'Description', 'Note']],
                body: tableBody,
                theme: 'grid',
                styles: { font: 'helvetica', fontSize: 8.5, cellPadding: 2.2, valign: 'middle' },
                headStyles: { fillColor: [31, 41, 55], textColor: 255, fontStyle: 'bold', halign: 'center' },
                columnStyles: {
                    0: { halign: 'center', cellWidth: 9 },
                    2: { halign: 'center', cellWidth: 16 },
                    3: { halign: 'center', cellWidth: 18 },
                    5: { cellWidth: 35 },
                },
                margin: { left: marginX, right: marginX },
            });

            // ── Note Khusus ──
            let finalY = doc.lastAutoTable.finalY + 6;
            if (noteKhusus) {
                if (finalY > doc.internal.pageSize.getHeight() - 60) { doc.addPage(); finalY = 30; }
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(9);
                doc.setTextColor(31, 41, 55);
                doc.text('Note Khusus:', marginX, finalY);
                finalY += 5;
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(8.5);
                doc.setTextColor(55, 65, 81);
                const wrappedNote = doc.splitTextToSize(noteKhusus, pageWidth - marginX * 2);
                doc.text(wrappedNote, marginX, finalY);
                finalY += wrappedNote.length * 5 + 8;
            } else {
                finalY += 12;
            }

            // ── Tanda Tangan ──
            const pageHeight = doc.internal.pageSize.getHeight();
            if (finalY > pageHeight - 90) { doc.addPage(); finalY = 30; }

            const sigColW = (pageWidth - marginX * 2) / 3;
            const sigLabels = ['Diminta oleh,', 'Disetujui oleh,', 'Diterima oleh,'];
            const sigNames = [orderedBy || '', '', ''];

            sigLabels.forEach((label, i) => {
                const x = marginX + i * sigColW;
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);
                doc.setTextColor(31, 41, 55);
                doc.text(label, x, finalY);
                doc.line(x, finalY + 18, x + sigColW - 10, finalY + 18);
                doc.setFont('helvetica', 'bold');
                doc.text(sigNames[i] || '( ___________ )', x, finalY + 24);
            });

            // ── QR Code (kanan bawah halaman) — berisi seluruh isi Request Order ──
            if (roQR && roQR.dataUrl) {
                const qrSize = 22;
                const qrX = pageWidth - marginX - qrSize;
                const qrY = pageHeight - 30 - 4 - qrSize; // 4mm di atas footer
                try {
                    doc.addImage(roQR.dataUrl, 'PNG', qrX, qrY, qrSize, qrSize);
                    doc.setFont('helvetica', 'normal');
                    doc.setFontSize(6.5);
                    doc.setTextColor(107, 114, 128);
                    doc.text('Scan untuk lihat detail lengkap', qrX + qrSize / 2, qrY - 2, { align: 'center' });
                    if (roQR.truncated) {
                        doc.setFontSize(5.5);
                        doc.text('(ringkasan)', qrX + qrSize / 2, qrY + qrSize + 3, { align: 'center' });
                    }
                } catch (errQr) {
                    console.error('[RO QR] Gagal menambahkan QR Code ke PDF:', errQr);
                }
            } else {
                console.warn('[RO QR] QR Code tidak dibuat (roQR kosong/null).');
            }

            // ── Footer (background pola gelombang + teks vektor tajam) ──
            const footerY = drawFooterBlock(doc, marginX, pageWidth, pageHeight);

            doc.setFont('helvetica', 'normal');
            doc.setFontSize(7);
            doc.setTextColor(180, 180, 180);
            doc.text('Generated by NOD Warehouse System — ' + new Date().toLocaleString('id-ID'), marginX, footerY - 2);

            const fileName = `Request_Order_${poLabel !== '-' ? poLabel : 'PO'}_${today}.pdf`;

            // ── Simpan PDF ke perangkat ──
            doc.save(fileName);

            // ── Otomatis lampirkan PDF ke kotak "Upload File PDF" ──
            try {
                const pdfBlob = doc.output('blob');
                const pdfFile = new File([pdfBlob], fileName, { type: 'application/pdf' });
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(pdfFile);
                const fileInput = document.getElementById('pdfFile');
                if (fileInput) {
                    fileInput.files = dataTransfer.files;
                    // Trigger change event in case any listener depends on it
                    fileInput.dispatchEvent(new Event('change', { bubbles: true }));
                }
                showAlert('success', 'PDF Siap', 'Request Order berhasil dibuat dan otomatis dilampirkan ke kotak Upload File PDF.');
            } catch (err) {
                showAlert('warning', 'Lampiran Gagal', 'PDF berhasil diunduh, tetapi gagal dilampirkan otomatis. Silakan unggah manual.');
            }
        }

        async function loadOpenPOList() {

            if (!sel) return;

            if (statusEl) { statusEl.textContent = 'Memuat daftar PO...'; statusEl.className = 'text-xs text-blue-500 mt-1'; }

            // ── Spinner pada tombol refresh ──
            const refreshBtn = document.getElementById('btn-refresh-po');
            const refreshIcon = document.getElementById('btn-refresh-po-icon');
            if (refreshBtn) {
                refreshBtn.disabled = true;
                if (refreshIcon) refreshIcon.classList.add('hidden');
                let rSpinner = refreshBtn.querySelector('.refresh-spinner');
                if (!rSpinner) {
                    rSpinner = document.createElement('span');
                    rSpinner.className = 'refresh-spinner inline-block w-4 h-4 border-2 border-gray-500 border-t-transparent rounded-full animate-spin';
                    refreshBtn.appendChild(rSpinner);
                }
            }
            const resetRefreshBtn = () => {
                if (!refreshBtn) return;
                refreshBtn.disabled = false;
                const sp = refreshBtn.querySelector('.refresh-spinner');
                if (sp) sp.remove();
                if (refreshIcon) refreshIcon.classList.remove('hidden');
            };

            try {
                let data = [];
                try {
                    const res = await fetch(API_URLS.reportStatus + '?action=getPOData');
                    const raw = await res.json();
                    data = Array.isArray(raw) ? raw : [];
                } catch (_) { }

                if (data.length === 0) {
                    const res2 = await fetch(API_URLS.reportStatus);
                    const raw2 = await res2.json();
                    data = Array.isArray(raw2) ? raw2 : [];
                }

                // Filter hanya yang status = Open (bukan Closed, bukan kosong)
                const openPOs = data.slice(1).filter(row => {
                    const noPO = String(row[1] || '').trim();
                    const status = String(row[4] || '').trim().toLowerCase();
                    return noPO !== '' && status !== 'closed' && status !== 'ready to ship' && status !== 'done';
                });

                const currentVal = sel.value;
                sel.innerHTML = '<option value="">— Pilih No. PO (opsional) —</option>';
                openPOs.forEach(row => {
                    const noPO = String(row[1] || '').trim();
                    const nama = String(row[6] || '').trim();
                    const opt = document.createElement('option');
                    opt.value = noPO;
                    opt.textContent = noPO + (nama ? ' — ' + nama : '');
                    if (noPO === currentVal) opt.selected = true;
                    sel.appendChild(opt);
                });

                if (statusEl) {
                    if (openPOs.length > 0) {
                        statusEl.textContent = `✅ ${openPOs.length} PO Open tersedia.`;
                        statusEl.className = 'text-xs text-green-600 mt-1';
                    } else {
                        statusEl.textContent = 'Tidak ada PO Open saat ini.';
                        statusEl.className = 'text-xs text-gray-400 mt-1';
                    }
                }
                resetRefreshBtn();
            } catch (err) {
                if (statusEl) { statusEl.textContent = '❌ Gagal memuat: ' + err.message; statusEl.className = 'text-xs text-red-500 mt-1'; }
                resetRefreshBtn();
            }
        }

        // =========================================================================
        // IMPORT PDF → EKSTRAK TEKS via pdf.js  (PURE CLIENT-SIDE)
        // Menggunakan koordinat X/Y aktual untuk akurasi tinggi.
        // =========================================================================

        /**
         * Ekstrak teks dari semua halaman PDF.
         * Setiap token disimpan dengan posisi x,y asli (y = top-down).
         * Return: { text: string, pageData: [ rows[] ] }
         * rows[] = [ { y, tokens: [{str, x}] } ]
         */
        async function extractTextFromPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = '';
            const pageData = [];

            for (let p = 1; p <= pdf.numPages; p++) {
                const page = await pdf.getPage(p);
                const tc = await page.getTextContent();
                const vp = page.getViewport({ scale: 1 });
                const rowMap = new Map();

                for (const item of tc.items) {
                    if (!item.str || !item.str.trim()) continue;
                    const x = Math.round(item.transform[4]);
                    // Flip Y: PDF bottom=0 → top-down; bucket 4pt untuk stabilitas
                    const y = Math.round((vp.height - item.transform[5]) / 4) * 4;
                    if (!rowMap.has(y)) rowMap.set(y, { y, tokens: [] });
                    rowMap.get(y).tokens.push({ str: item.str.trim(), x });
                }

                const rows = Array.from(rowMap.values()).sort((a, b) => a.y - b.y);
                rows.forEach(r => r.tokens.sort((a, b) => a.x - b.x));
                pageData.push(rows);

                for (const row of rows) {
                    fullText += row.tokens.map(t => t.str).join(' ') + '\n';
                }
                fullText += '\n';
            }
            return { text: fullText.trim(), pageData };
        }

        /**
         * VALID UOM list (case-insensitive match)
         */
        const VALID_UOM = ['box', 'pcs', 'unit', 'karton', 'pack', 'kg', 'ltr', 'l', 'lusin', 'set',
            'roll', 'sheet', 'btl', 'dus', 'pak', 'ctn', 'ea', 'bh', 'buah', 'lembar',
            'm', 'meter', 'can', 'tin', 'bag', 'sck', 'pouch', 'ktn', 'botol', 'sachet'];

        /**
         * VALID DESCRIPTION list
         */
        const VALID_DESC = ['Capsule Selling', 'Sampling', 'Machine Selling', 'Machine Display', 'Machine Event', 'Supplies'];

        function isUOM(s) {
            return VALID_UOM.some(u => u.toLowerCase() === s.trim().toLowerCase());
        }

        function isDescription(s) {
            return VALID_DESC.some(d => d.toLowerCase() === s.trim().toLowerCase());
        }

        /**
         * Klasifikasi description sebagai fallback jika kolom DESC tidak ditemukan di PDF
         */
        function classifyDescription(namaBarang) {
            const n = namaBarang.toUpperCase();
            if (/CAPSUL/.test(n)) return 'Capsule Selling';
            if (/DISPLAY|DEMO|SHOWROOM/.test(n)) return 'Machine Display';
            if (/MACHINE|MESIN|COFFEE MAKER|BREWER|ESPRESSO/.test(n)) return 'Machine Selling';
            if (/SAMPL|TESTER|TRIAL/.test(n)) return 'Sampling';
            return 'Supplies';
        }

        /**
         * PARSER UTAMA — Strategi berbasis koordinat kolom.
         *
         * PDF format NOD:
         *  Header "Ordered by | Ship to" → dua blok kiri/kanan
         *  Metadata: Name, Phone, Order Date (kiri) | Name, Phone, Address, Shipping Date (kanan)
         *  Tabel: NO | NAME | Qty | UOM | DESCRIPTION
         *
         * Pendekatan:
         *  1. Temukan baris header "Ordered by" dan "Ship to" → pisahkan kiri/kanan by X midpoint
         *  2. Dari blok kiri ambil "Name :" → orderedBy
         *     Dari blok kanan ambil "Name :" → shipTo, "Shipping Date :" → shippingDate
         *  3. Temukan baris header tabel → rekam posisi X tiap kolom
         *  4. Baca baris data → distribusikan token ke kolom terdekat
         *  5. Jika description kosong → gunakan classifyDescription
         */
        function parsePOData(pageData, rawText) {
            const lines = rawText.split('\n').map(l => l.trim()).filter(Boolean);

            // ─────────────────────────────────────────────────────────────────
            // HELPER: cari nilai setelah keyword pada teks mentah
            // ─────────────────────────────────────────────────────────────────
            function findAfterKeyword(keywords, maxLook = 4) {
                for (let i = 0; i < lines.length; i++) {
                    const up = lines[i].toUpperCase();
                    for (const kw of keywords) {
                        if (up.includes(kw.toUpperCase())) {
                            // Nilai di baris yang sama setelah ':'
                            const colonIdx = lines[i].indexOf(':');
                            if (colonIdx !== -1) {
                                const after = lines[i].slice(colonIdx + 1).trim();
                                if (after.length > 1) return after;
                            }
                            // Baris-baris berikutnya
                            for (let j = 1; j <= maxLook; j++) {
                                const nx = lines[i + j];
                                if (!nx) continue;
                                if (nx.includes(':')) {
                                    // ada label lain, ambil setelah ':'
                                    const v = nx.slice(nx.indexOf(':') + 1).trim();
                                    if (v.length > 1) return v;
                                } else if (nx.length > 1 && !/^[A-Z\s]{3,}$/.test(nx)) {
                                    return nx;
                                }
                            }
                        }
                    }
                }
                return '';
            }

            // ─────────────────────────────────────────────────────────────────
            // HELPER: ekstrak metadata dari pageData menggunakan X midpoint
            // Mendukung dua format:
            //   FORMAT A (Request Order NOD): field label di kiri seperti
            //     "Ordered By : Nama", "Ship To : Nama", "Shipping Date : ..."
            //   FORMAT B (PO eksternal lama): blok "Ordered by | Ship to"
            //     dengan sub-field "Name :", "Shipping Date :"
            // ─────────────────────────────────────────────────────────────────
            function extractMetaFromLayout() {
                let result = { orderedBy: '', shipTo: '', shippingDate: '' };

                for (const rows of pageData) {

                    // ── FORMAT A: Request Order NOD ──
                    // Ciri khas: ada baris yang token-tokennya membentuk "Ordered By : <nilai>"
                    // dan baris lain "Ship To : <nilai>". Setiap baris bisa mengandung
                    // dua kolom (kiri & kanan) yang dipisahkan posisi X.
                    let foundFormatA = false;
                    for (let ri = 0; ri < rows.length; ri++) {
                        const rowText = rows[ri].tokens.map(t => t.str).join(' ');
                        const rowUp = rowText.toUpperCase();

                        // Deteksi baris "Ordered By : ..." (kiri) dan "Ship To : ..." (kanan)
                        // Bisa ada di baris yang SAMA (dua kolom) atau baris berbeda
                        if (/ORDERED\s*BY\s*:/i.test(rowText)) {
                            foundFormatA = true;
                            // Pisahkan berdasarkan posisi X: cari titik split (Ship To jika ada di baris sama)
                            let splitX = Infinity;
                            for (const tk of rows[ri].tokens) {
                                if (/^SHIP$/i.test(tk.str)) { splitX = tk.x - 5; break; }
                                if (/^KATEGORI$/i.test(tk.str)) { splitX = tk.x - 5; break; }
                            }
                            // Kumpulkan token kiri (Ordered By block)
                            const leftTokens = rows[ri].tokens.filter(t => t.x < splitX);
                            const leftText = leftTokens.map(t => t.str).join(' ');
                            if (!result.orderedBy && /ORDERED\s*BY\s*:/i.test(leftText)) {
                                // Ambil nilai setelah ":"  — hanya sampai kata pertama yang bukan nama
                                const afterColon = leftText.replace(/.*ORDERED\s*BY\s*:\s*/i, '').trim();
                                // Ambil hanya nama: stop sebelum keyword "Alamat", "Phone", "No.", dll.
                                const nameOnly = afterColon.split(/\s+(?=ALAMAT\s*:|PHONE\s*:|NO\.\s*TELP|TELP\s*:|SHIPPING)/i)[0].trim();
                                if (nameOnly.length > 1) result.orderedBy = nameOnly;
                            }
                            // Cek juga apakah Ship To ada di baris yang sama (kolom kanan)
                            const rightTokens = rows[ri].tokens.filter(t => t.x >= splitX);
                            const rightText = rightTokens.map(t => t.str).join(' ');
                            if (!result.shipTo && /SHIP\s*TO\s*:/i.test(rightText)) {
                                const v = rightText.replace(/.*SHIP\s*TO\s*:\s*/i, '').trim();
                                // Ambil hanya nama (satu "segment" sebelum Alamat/Phone/dll)
                                const nameOnly = v.split(/\s+(?=ALAMAT\s*:|PHONE\s*:|SHIPPING)/i)[0].trim();
                                if (nameOnly.length > 1) result.shipTo = nameOnly;
                            }
                        }

                        // Baris tersendiri "Ship To : ..." (jika berbeda baris dari Ordered By)
                        if (!result.shipTo && /SHIP\s*TO\s*:/i.test(rowText)) {
                            foundFormatA = true;
                            const v = rowText.replace(/.*SHIP\s*TO\s*:\s*/i, '').trim();
                            // Buang teks setelah keyword lain yang mungkin ikut terbaca
                            const nameOnly = v.split(/\s+(?=ALAMAT\s*:|PHONE\s*:|SHIPPING\s*DATE\s*:)/i)[0].trim();
                            if (nameOnly.length > 1) result.shipTo = nameOnly;
                        }

                        // Baris "Shipping Date : ..."
                        if (!result.shippingDate && /SHIPPING\s*DATE\s*:/i.test(rowText)) {
                            foundFormatA = true;
                            // Ambil token SETELAH ":" yang ada di baris ini
                            // Temukan posisi X token ":"
                            let colonX = -1;
                            for (const tk of rows[ri].tokens) {
                                if (tk.str === ':' && colonX === -1) {
                                    // Cek apakah ada token SHIPPING sebelumnya di baris ini
                                    const before = rows[ri].tokens.filter(t => t.x < tk.x).map(t => t.str).join(' ');
                                    if (/SHIPPING/i.test(before)) { colonX = tk.x; break; }
                                }
                            }
                            if (colonX !== -1) {
                                const afterColon = rows[ri].tokens
                                    .filter(t => t.x > colonX)
                                    .map(t => t.str).join(' ').trim();
                                if (afterColon.length > 1) result.shippingDate = afterColon;
                            } else {
                                const v = rowText.replace(/.*SHIPPING\s*DATE\s*:\s*/i, '').trim();
                                if (v.length > 1) result.shippingDate = v;
                            }
                        }
                    }

                    if (foundFormatA && (result.orderedBy || result.shipTo)) break;

                    // ── FORMAT B: PO Eksternal (format lama dengan blok "Ordered by | Ship to") ──
                    let splitX = -1;
                    let headerRowIdx = -1;

                    for (let ri = 0; ri < rows.length; ri++) {
                        const rowText = rows[ri].tokens.map(t => t.str).join(' ').toUpperCase();
                        // Format B: baris HEADER yang isinya hanya "Ordered by" dan "Ship to"
                        // (bukan baris data seperti "Ordered By : Nama")
                        if ((rowText.includes('ORDERED BY') || rowText.includes('ORDERED  BY')) &&
                            !/:/.test(rowText)) {
                            for (const tk of rows[ri].tokens) {
                                if (tk.str.toUpperCase().includes('SHIP')) {
                                    splitX = tk.x - 10;
                                    break;
                                }
                            }
                            if (splitX === -1) {
                                const xs = rows[ri].tokens.map(t => t.x);
                                splitX = (Math.min(...xs) + Math.max(...xs)) / 2;
                            }
                            headerRowIdx = ri;
                            break;
                        }
                    }

                    if (headerRowIdx === -1 || splitX === -1) continue;

                    for (let ri = headerRowIdx + 1; ri < rows.length; ri++) {
                        const rowText = rows[ri].tokens.map(t => t.str).join(' ').toUpperCase();
                        if (/^\s*NO\b/.test(rowText) || rowText.includes('DEAR TEAM') ||
                            rowText.includes('HEREBY')) break;

                        const leftTokens = rows[ri].tokens.filter(t => t.x < splitX);
                        const rightTokens = rows[ri].tokens.filter(t => t.x >= splitX);
                        const leftText = leftTokens.map(t => t.str).join(' ');
                        const rightText = rightTokens.map(t => t.str).join(' ');

                        if (!result.orderedBy && /NAME\s*:/i.test(leftText)) {
                            const v = leftText.replace(/.*NAME\s*:\s*/i, '').trim();
                            if (v.length > 1) result.orderedBy = v;
                        }
                        if (!result.shipTo && /NAME\s*:/i.test(rightText)) {
                            const v = rightText.replace(/.*NAME\s*:\s*/i, '').trim();
                            if (v.length > 1) result.shipTo = v;
                        }
                        if (!result.shippingDate && /SHIPPING\s*DATE\s*:/i.test(rightText)) {
                            const v = rightText.replace(/.*SHIPPING\s*DATE\s*:\s*/i, '').trim();
                            if (v.length > 1) result.shippingDate = v;
                        }
                    }

                    if (result.orderedBy || result.shipTo) break;
                }
                return result;
            }

            // ─────────────────────────────────────────────────────────────────
            // METADATA
            // ─────────────────────────────────────────────────────────────────
            const meta = extractMetaFromLayout();

            // Fallback ke teks mentah jika layout parsing gagal
            const _orderedByRaw = meta.orderedBy ||
                findAfterKeyword(['ORDERED BY', 'ORDER BY', 'DIPESAN OLEH', 'BUYER', 'NAMA PEMESAN']);
            // Buang bagian alamat/phone yang ikut terbaca setelah nama
            const orderedBy = _orderedByRaw
                .split(/\s+(?=Alamat\s*:|Phone\s*:|No\.\s*Telp|Telp\s*:|Shipping)/i)[0].trim();
            const _shipToRaw = meta.shipTo ||
                findAfterKeyword(['SHIP TO', 'DELIVER TO', 'KIRIM KE', 'ALAMAT PENGIRIMAN']);
            // Untuk Ship To: ambil hanya nama lokasi, buang "Ship To :" jika ikut terbaca
            const shipTo = _shipToRaw
                .replace(/^(SHIP\s*TO\s*:?\s*)/i, '')
                .split(/\s+(?=Alamat\s*:|Phone\s*:|Shipping\s*Date)/i)[0].trim();
            let shippingDate = meta.shippingDate ||
                findAfterKeyword(['SHIPPING DATE', 'DELIVERY DATE', 'TANGGAL PENGIRIMAN', 'SHIP DATE', 'TGL KIRIM']);
            if (!shippingDate) {
                const m = rawText.match(/\b(\d{1,2}\s+(?:Jan|Feb|Mar|Apr|Mei|May|Jun|Jul|Agt|Aug|Sep|Okt|Oct|Nov|Des|Dec)\w*\s+\d{4}|\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})\b/i);
                if (m) shippingDate = m[0];
            }

            // No PO
            const noPO = findAfterKeyword(['IPO NUMBER', 'PURCHASE ORDER NO', 'PO NUMBER', 'NO. PO', 'NO PO', 'NOMOR PO', 'PO#', 'ORDER#'])
                || (() => {
                    const m = rawText.match(/\b([A-Z]{1,4}[\/\-]\d{2}[\/\-]\d{2}[\/\-]\d+|[A-Z]{1,5}[-\/]\d{4,}[-\/\d]*\d)\b/);
                    return m ? m[0] : '';
                })();

            // ─────────────────────────────────────────────────────────────────
            // TABEL ITEMS — berbasis koordinat kolom
            // ─────────────────────────────────────────────────────────────────
            const items = [];
            const STOP_KW = ['NOTES', 'NOTE', 'CATATAN', 'TOTAL', 'SUBTOTAL', 'GRAND TOTAL',
                'TANDA TANGAN', 'APPROVED', 'AUTHORIZED', 'SIGNATURE',
                'PROPOSED BY', 'PROCESSED BY'];

            for (const rows of pageData) {
                let hdrIdx = -1;
                let cols = null; // { no, name, qty, uom, desc } → x position of each header

                for (let ri = 0; ri < rows.length; ri++) {
                    const rowText = rows[ri].tokens.map(t => t.str).join(' ').toUpperCase();

                    // ── Deteksi header tabel ──
                    // Harus mengandung setidaknya NAME/ITEM + QTY/Qty
                    const hasName = /\bNAME\b|\bITEM\b|\bNAMA BARANG\b|\bPRODUCT\b/.test(rowText);
                    const hasQty = /\bQTY\b|\bQUANTITY\b|\bJUMLAH\b/.test(rowText);

                    if (hasName && hasQty && hdrIdx === -1) {
                        hdrIdx = ri;
                        cols = {};
                        for (const tk of rows[ri].tokens) {
                            const up = tk.str.toUpperCase().trim();
                            if (up === 'NO' || up === 'NO.') cols.no = tk.x;
                            else if (/^(NAME|ITEM|NAMA|PRODUCT|KETERANGAN)$/.test(up)) cols.name = tk.x;
                            else if (/^(QTY|QUANTITY|JUMLAH)$/.test(up)) cols.qty = tk.x;
                            else if (/^(UOM|UNIT|SATUAN)$/.test(up)) cols.uom = tk.x;
                            else if (/^(DESCRIPTION|DESC|KETERANGAN|DESKRIPSI)$/.test(up)) cols.desc = tk.x;
                        }
                        // Jika NAME tidak terdeteksi exact, ambil kolom terlebar (kemungkinan nama barang)
                        if (cols.name === undefined && cols.qty !== undefined) {
                            // Kolom paling kiri setelah NO adalah NAME
                            const noX = cols.no !== undefined ? cols.no : 0;
                            const leftmost = rows[ri].tokens
                                .filter(t => t.x > noX + 10 && t.x < cols.qty - 10)
                                .sort((a, b) => a.x - b.x)[0];
                            if (leftmost) cols.name = leftmost.x;
                        }
                        continue;
                    }

                    // ── Baris data setelah header ──
                    if (hdrIdx === -1) continue;

                    // Stop conditions
                    if (STOP_KW.some(k => rowText.trimStart().startsWith(k))) break;
                    if (rows[ri].tokens.length === 0) continue;

                    // Abaikan baris yang hanya berisi nomor urut (baris kosong di template)
                    const allTokensText = rows[ri].tokens.map(t => t.str.trim()).join('');
                    if (/^\d+$/.test(allTokensText)) continue; // hanya nomor, skip

                    if (!cols) continue;

                    // ── Distribusikan token ke kolom ──
                    // Setiap token → kolom dengan X terdekat
                    const colKeys = Object.keys(cols); // ['no','name','qty','uom','desc']
                    const buckets = {};
                    colKeys.forEach(k => buckets[k] = []);

                    for (const tk of rows[ri].tokens) {
                        let bestCol = null, bestDist = Infinity;
                        for (const k of colKeys) {
                            const d = Math.abs(tk.x - cols[k]);
                            if (d < bestDist) { bestDist = d; bestCol = k; }
                        }
                        if (bestCol) buckets[bestCol].push(tk.str.trim());
                    }

                    const namaArr = (buckets.name || []).filter(s => !/^\d+\.?$/.test(s));
                    const namaStr = namaArr.join(' ').trim();
                    const qtyRaw = (buckets.qty || []).join(' ').trim();
                    const uomRaw = (buckets.uom || []).join(' ').trim();
                    const descRaw = (buckets.desc || []).join(' ').trim();

                    // Validasi: nama barang tidak boleh kosong atau hanya angka
                    if (!namaStr || /^\d+$/.test(namaStr)) continue;
                    // Skip baris stop
                    if (STOP_KW.some(k => namaStr.toUpperCase().includes(k))) continue;

                    // Qty: ambil angka dari qtyRaw (bisa ada noise)
                    const qtyMatch = qtyRaw.match(/\d+(?:[.,]\d+)?/);
                    if (!qtyMatch) continue; // tidak ada angka qty → skip
                    const qty = qtyMatch[0].replace(',', '.');
                    if (parseFloat(qty) <= 0) continue;

                    // UOM: validasi, fallback ke 'Pcs'
                    let uom = uomRaw;
                    if (!isUOM(uom)) {
                        // coba cari token UOM dari semua bucket
                        const allTk = rows[ri].tokens.map(t => t.str.trim());
                        uom = allTk.find(t => isUOM(t)) || 'Pcs';
                    }
                    // Kapitalisasi UOM
                    uom = uom.charAt(0).toUpperCase() + uom.slice(1).toLowerCase();
                    if (uom.toLowerCase() === 'box') uom = 'Box';
                    if (uom.toLowerCase() === 'pcs') uom = 'Pcs';
                    if (uom.toLowerCase() === 'unit') uom = 'Unit';
                    if (uom.toLowerCase() === 'karton') uom = 'Karton';
                    if (uom.toLowerCase() === 'pack') uom = 'Pack';

                    // Description: validasi
                    let desc = descRaw;
                    if (!isDescription(desc)) {
                        // Coba cari dari semua bucket
                        const allTk = rows[ri].tokens.map(t => t.str.trim());
                        const joined = allTk.join(' ');
                        const found = VALID_DESC.find(d => joined.toLowerCase().includes(d.toLowerCase()));
                        desc = found || classifyDescription(namaStr);
                    }

                    items.push({ nama_barang: namaStr, qty_po: qty, uom, description: desc });
                }
            }

            // ─────────────────────────────────────────────────────────────────
            // FALLBACK AKHIR: regex pada teks mentah
            // Hanya dipakai jika tabel tidak terdeteksi sama sekali
            // ─────────────────────────────────────────────────────────────────
            if (items.length === 0) {
                const descPat = VALID_DESC.map(d => d.replace(' ', '\\s+')).join('|');
                // Format: [No.] Nama Barang  Qty  UOM  Description
                const lineRe = new RegExp(
                    '^(?:\\d+\\.?\\s+)?(.+?)\\s+(\\d+(?:[.,]\\d+)?)\\s+(' +
                    VALID_UOM.join('|') + ')\\s+(' + descPat + ')?',
                    'i'
                );
                for (const ln of lines) {
                    const m = ln.match(lineRe);
                    if (!m) continue;
                    const nama = m[1].replace(/^\d+\.?\s*/, '').trim();
                    if (STOP_KW.some(k => nama.toUpperCase().startsWith(k))) continue;
                    if (!nama || nama.length < 2) continue;
                    const uomRaw = m[3] || 'Pcs';
                    const descRaw = m[4] || classifyDescription(nama);
                    items.push({
                        nama_barang: nama,
                        qty_po: m[2].replace(',', '.'),
                        uom: uomRaw.charAt(0).toUpperCase() + uomRaw.slice(1).toLowerCase(),
                        description: isDescription(descRaw) ? descRaw : classifyDescription(nama)
                    });
                }
            }

            return { ordered_by: orderedBy, ship_to: shipTo, shipping_date: shippingDate, no_po: noPO, items };
        }

        /**
         * Handler utama Import PDF
         */
        async function handlePDFImport() {
            const fileInput = document.getElementById('pdfFile');
            const statusEl = document.getElementById('import-status');
            const btnImport = document.getElementById('btn-import');
            const file = fileInput.files[0];

            if (!file) {
                showAlert('warning', 'Pilih File', 'Silakan pilih file PDF terlebih dahulu.');
                return;
            }

            btnImport.disabled = true;
            btnImport.innerHTML = `<span class="inline-block w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin mr-1"></span> Memproses...`;
            statusEl.textContent = 'Mengekstrak teks dari PDF...';
            statusEl.className = 'text-xs text-blue-500 mt-1';

            try {
                // 1. Ekstrak teks + koordinat dari PDF (semua halaman)
                const { text: rawText, pageData } = await extractTextFromPDF(file);

                if (!rawText || rawText.length < 10) {
                    throw new Error('PDF tidak dapat dibaca atau tidak mengandung teks (kemungkinan PDF scan/gambar).');
                }

                statusEl.textContent = 'Menganalisis struktur dokumen PO...';

                // 2. Parse menggunakan koordinat kolom → akurasi tinggi
                const parsed = parsePOData(pageData, rawText);

                // ── Isi field form ──
                document.getElementById('proc-ordered-by').value = parsed.ordered_by || '';
                document.getElementById('proc-ship').value = parsed.ship_to || '';
                document.getElementById('proc-shipping-date').value = parsed.shipping_date || '';
                document.getElementById('proc-ordered-by').dataset.nopo = parsed.no_po || '';

                // ── Isi tabel items ──
                const tbody = document.getElementById('proc-table-body');
                const DESCRIPTION_OPTIONS = ['Supplies', 'Sampling', 'Machine Selling', 'Machine Display', 'Capsule Selling'];
                if (parsed.items && parsed.items.length > 0) {
                    tbody.innerHTML = parsed.items.map((item, idx) => {
                        const descOpts = DESCRIPTION_OPTIONS.map(o =>
                            `<option value="${o}" ${item.description && item.description.toLowerCase() === o.toLowerCase() ? 'selected' : ''}>${o}</option>`
                        ).join('');
                        return `
                        <tr class="${idx % 2 === 0 ? 'bg-white' : 'bg-gray-50'} border-b border-gray-100">
                            <td class="p-2 font-medium" contenteditable="true">${item.nama_barang || ''}</td>
                            <td class="p-2 text-center font-semibold text-gray-700">${item.qty_po || ''}</td>
                            <td class="p-2 text-center">
                                <input type="number" min="0" value="${item.qty_po || ''}"
                                    class="w-20 p-1 border border-gray-300 rounded text-center text-xs focus:ring-1 focus:ring-amber-400 outline-none">
                            </td>
                            <td class="p-2 text-center" contenteditable="true">${item.uom || ''}</td>
                            <td class="p-2">
                                <select class="w-full text-xs border border-gray-200 rounded p-1 focus:ring-1 focus:ring-amber-400 outline-none bg-white">
                                    ${descOpts}
                                </select>
                            </td>
                            <td class="p-2 text-center"><button onclick="hapusBaris(this)" title="Hapus baris" class="text-red-400 hover:text-red-600 hover:bg-red-50 rounded p-1 transition"><svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></td>
                        </tr>`;
                    }).join('');
                } else {
                    tbody.innerHTML = `
                        <tr class="bg-yellow-50 border-b border-yellow-200">
                            <td colspan="5" class="p-3 text-center text-xs text-yellow-700">
                                ⚠️ Item tidak terdeteksi otomatis. Silakan isi manual atau periksa format PDF.<br>
                                <span class="text-gray-400 text-[10px]">Ekstrak: ${rawText.substring(0, 200).replace(/[\r\n]+/g, ' ')}...</span>
                            </td>
                        </tr>
                        <tr class="bg-white border-b border-gray-100">
                            <td class="p-2 font-medium" contenteditable="true">-</td>
                            <td class="p-2 text-center" contenteditable="true">0</td>
                            <td class="p-2 text-center">
                                <input type="number" min="0" value="0"
                                    class="w-20 p-1 border border-gray-300 rounded text-center text-xs focus:ring-1 focus:ring-amber-400 outline-none">
                            </td>
                            <td class="p-2 text-center" contenteditable="true">pcs</td>
                            <td class="p-2">
                                <select class="w-full text-xs border border-gray-200 rounded p-1 bg-white">
                                    <option>Supplies</option><option>Sampling</option><option>Machine Selling</option>
                                    <option>Machine Display</option><option>Capsule Selling</option>
                                </select>
                            </td>
                        </tr>`;
                }

                const itemCount = parsed.items ? parsed.items.length : 0;
                statusEl.textContent = `✅ Berhasil — ${itemCount} item ditemukan${parsed.no_po ? ' — No. PO: ' + parsed.no_po : ''}. Data dapat diedit langsung.`;
                statusEl.className = 'text-xs text-green-600 mt-1 font-semibold';

            } catch (err) {
                statusEl.textContent = '❌ Gagal: ' + err.message;
                statusEl.className = 'text-xs text-red-500 mt-1';
                showAlert('error', 'Gagal Import', 'Terjadi kesalahan saat memproses PDF: ' + err.message);
            } finally {
                btnImport.disabled = false;
                btnImport.innerHTML = `<svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg> Import`;
            }
        }

            row.style.transition = 'opacity 0.2s, transform 0.2s';
            row.style.opacity = '0'; row.style.transform = 'translateX(10px)';

                }

        }

        // =========================================================================
        // DELIVERY ORDER → GENERATE PDF (client-side, jsPDF + autotable)
        // =========================================================================
        async function generateDeliveryOrderPDF() {
            const tglProses = document.getElementById('proc-tgl-proses')?.value || '';
            const noPOFromSelect = document.getElementById('proc-no-po-select')?.value || '';
            const orderedByEl = document.getElementById('proc-ordered-by');
            const noPO = noPOFromSelect || orderedByEl?.dataset?.nopo || '';
            const crewPacking = document.getElementById('proc-crew-packing')?.value || '';
            const orderedBy = orderedByEl?.value?.trim() || '';
            const shipTo = document.getElementById('proc-ship')?.value?.trim() || '';
            const shippingDate = document.getElementById('proc-shipping-date')?.value?.trim() || '';

            // Validasi
            if (!tglProses) { showAlert('warning', 'Data Belum Lengkap', 'Tanggal Proses PO belum diisi.'); return; }
            if (!noPO) { showAlert('warning', 'Data Belum Lengkap', 'No. PO belum dipilih/terisi.'); return; }
            if (!crewPacking) { showAlert('warning', 'Data Belum Lengkap', 'Crew Packing belum dipilih.'); return; }

            // Ambil isi tabel
            const rows = document.querySelectorAll('#proc-table-body tr');
            const items = [];
            rows.forEach(row => {
                if (row.hasAttribute('data-placeholder')) return;
                const tds = row.querySelectorAll('td');
                if (tds.length < 5) return;

                const namaInput = row.querySelector('.nama-barang-input');
                const nama = namaInput ? namaInput.value.trim() : tds[0].textContent.trim();
                if (!nama || nama === '-') return;

                const qtyOutInput = tds[2] ? tds[2].querySelector('input') : null;
                const qty = qtyOutInput ? qtyOutInput.value : (tds[2] ? tds[2].textContent.trim() : '');
                const uom = tds[3] ? tds[3].textContent.trim() : '';
                const descSel = tds[4] ? tds[4].querySelector('select') : null;
                const description = descSel ? descSel.value : (tds[4] ? tds[4].textContent.trim() : '');
                // Kolom Remark hanya ada pada baris manual (tds[5] sebelum kolom Aksi)

        /**
         * Susun teks ringkasan SELURUH ISI Delivery Order (header + daftar item)
         * untuk disimpan ke dalam QR Code. Saat QR ini di-scan, seluruh isi
         * dokumen akan tampil sebagai teks.
         */
        function buildDeliveryOrderQRText({ noPO, tglProses, crewPacking, orderedBy, shipTo, shippingDate, items }) {
            const lines = [];
            lines.push('=== DELIVERY ORDER ===');
            lines.push('No. PO: ' + (noPO || '-'));
            lines.push('Tanggal Proses PO: ' + formatTanggalIndo(tglProses));
            lines.push('Crew Packing: ' + (crewPacking || '-'));
            lines.push('Ordered By: ' + (orderedBy || '-'));
            lines.push('Ship To: ' + (shipTo || '-'));
            lines.push('Shipping Date: ' + (shippingDate || '-'));
            lines.push('');
            lines.push('=== DAFTAR ITEM ===');
            items.forEach((it, idx) => {
                lines.push(
                    `${idx + 1}. ${it.nama} | Qty: ${it.qty || '-'} | UOM: ${it.uom || '-'} | Desc: ${it.description || '-'}` +
                    (it.remark ? ` | Remark: ${it.remark}` : '')
                );
            });
            return lines.join('\n');
        }

        /**
         * Generate QR Code (PNG data URL) dari sebuah teks menggunakan library
         * `qrcode`. Jika teks terlalu panjang untuk ditampung QR Code (kapasitas
         * maksimum Model 2 Versi 40), fungsi ini akan otomatis memotong daftar
         * item secara bertahap sampai berhasil. Mengembalikan { dataUrl, truncated }
         * atau null jika library tidak tersedia / gagal total.
         */
        async function generateDOQRCodeDataURL(doData) {
            if (typeof QRCode === 'undefined') {
                console.warn('[DO QR] Library QRCode tidak termuat — QR Code dilewati.');
                return null;
            }

            const qrOptions = {
                errorCorrectionLevel: 'L',
                margin: 1,
                color: { dark: '#111827', light: '#FFFFFF' }
            };

            let items = doData.items;
            let truncated = false;

            // Coba dengan seluruh item, lalu kurangi bertahap jika kapasitas tidak cukup
            while (true) {
                const text = buildDeliveryOrderQRText({ ...doData, items });
                try {
                    const dataUrl = await QRCode.toDataURL(text, qrOptions);
                    return { dataUrl, truncated };
                } catch (err) {
                    // Kapasitas tidak cukup → potong item paling bawah
                    if (items.length <= 1) {
                        // Bahkan 1 item pun tidak cukup → kirim ringkasan header saja
                        try {
                            const headerOnlyText = buildDeliveryOrderQRText({ ...doData, items: [] }) +
                                '\n(Daftar item terlalu banyak untuk QR Code,\nlihat dokumen PDF untuk detail lengkap)';
                            const dataUrl = await QRCode.toDataURL(headerOnlyText, qrOptions);
                            return { dataUrl, truncated: true };
                        } catch (err2) {
                            console.error('[DO QR] Gagal generate QR Code:', err2);
                            return null;
                        }
                    }
                    items = items.slice(0, items.length - 1);
                    truncated = true;
                }
            }
        }

        /** Format tanggal YYYY-MM-DD → DD Bulan YYYY (Indonesia) */
        function formatTanggalIndo(dateStr) {
            if (!dateStr) return '-';
            const bulan = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            const [yy, mm, dd] = dateStr.split('-');
            if (!yy || !mm || !dd) return dateStr;
            return `${parseInt(dd, 10)} ${bulan[parseInt(mm, 10) - 1]} ${yy}`;
        }

        /**
         * Load gambar dari URL eksternal, convert ke data URL (base64) via canvas,
         * agar bisa dipakai jsPDF addImage(). Return null jika gagal (CORS/network).
         */
        let _nodLogoCache = null;
        function loadImageAsDataURL(url) {
            if (_nodLogoCache) return Promise.resolve(_nodLogoCache);
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                const timeout = setTimeout(() => resolve(null), 6000);
                img.onload = () => {
                    clearTimeout(timeout);
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.naturalWidth;
                        canvas.height = img.naturalHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        const dataUrl = canvas.toDataURL('image/png');
                        const result = { dataUrl, format: 'PNG', width: img.naturalWidth, height: img.naturalHeight };
                        _nodLogoCache = result;
                        resolve(result);
                    } catch (_) {
                        resolve(null);
                    }
                };
                img.onerror = () => { clearTimeout(timeout); resolve(null); };
                img.src = url;
            });
        }

        /** Hitung dimensi gambar (mm) agar fit dalam box maxW x maxH, menjaga aspect ratio */
        function getImageFitDims(logoData, maxW, maxH) {
            const ratio = logoData.width / logoData.height;
            let w = maxW, h = maxW / ratio;
            if (h > maxH) { h = maxH; w = maxH * ratio; }
            return { w, h };
        }

        /** Tambah baris kosong ke tabel Detail Inbound, dengan autocomplete Nama Barang */

            const tbody = document.getElementById('inb-table-body');
            if (!tbody) return;
            const placeholder = tbody.querySelector('tr[data-placeholder]');
            if (placeholder) placeholder.remove();

            const bg = tbody.querySelectorAll('tr').length % 2 === 0 ? 'bg-white' : 'bg-gray-50';
            const tr = document.createElement('tr');
            tr.className = `${bg} border-b border-gray-100`;
            tr.innerHTML = `

                        <ul class="autocomplete-list absolute z-50 left-0 top-full mt-0.5 w-64 bg-white border border-gray-200 rounded-lg shadow-lg max-h-48 overflow-y-auto hidden text-xs"></ul>
                    </div>
                </td>
                <td class="p-2 text-center"><input type="number" min="0" value="1" class="qty-input w-20 p-1 border border-gray-300 rounded text-center text-xs focus:ring-1 focus:ring-amber-400 outline-none"></td>
                <td class="p-2"><input type="text" class="serial-input w-full p-1 border border-gray-300 rounded text-xs focus:ring-1 focus:ring-amber-400 outline-none" placeholder="Serial Number"></td>
                <td class="p-2"><input type="text" class="remark-input w-full p-1 border border-gray-300 rounded text-xs focus:ring-1 focus:ring-amber-400 outline-none" placeholder="Remark"></td>
                <td class="p-2 text-center"><button onclick="hapusBarisInbound(this)" title="Hapus baris" class="text-red-400 hover:text-red-600 hover:bg-red-50 rounded p-1 transition"><svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></td>`;

            tbody.appendChild(tr);

            const input = tr.querySelector('.nama-barang-input');
            const list = tr.querySelector('.autocomplete-list');

            function renderList(filtered) {
                list.innerHTML = '';
                if (filtered.length === 0) { list.classList.add('hidden'); return; }
                filtered.forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    li.className = 'px-3 py-2 hover:bg-amber-50 hover:text-amber-700 cursor-pointer transition';
                    li.onmousedown = (e) => { e.preventDefault(); input.value = item; list.classList.add('hidden'); };
                    list.appendChild(li);
                });
                list.classList.remove('hidden');
            }

            input.addEventListener('input', async () => {
                const q = input.value.trim().toLowerCase();
                if (!q) { list.classList.add('hidden'); return; }
                const items = await getSourceItems();
                renderList(items.filter(i => i.toLowerCase().includes(q)).slice(0, 20));
            });
            input.addEventListener('focus', async () => {
                const q = input.value.trim().toLowerCase();
                if (!q) return;
                const items = await getSourceItems();
                renderList(items.filter(i => i.toLowerCase().includes(q)).slice(0, 20));
            });
            input.addEventListener('blur', () => setTimeout(() => list.classList.add('hidden'), 150));

            if (!prefillName) input.focus();
            return tr;
        }

        // =========================================================================

        // =========================================================================
        let _inboundHtml5QrCode = null;
        let _inboundScannerActive = false;
        let _inboundLastScan = '';
        let _inboundCooldown = false;

        function _inboundQrCallback(decodedText) {
            onInboundQrScanSuccess(decodedText).then(() => {
                // Setelah 1.8 detik cooldown, buka kamera lagi untuk item berikutnya
                setTimeout(() => {
                    if (_inboundScannerActive && document.getElementById('inb-scan-status')) {
                        _inboundLastScan = '';
                        _inboundCooldown = false;
                        startQRCamera(undefined, _inboundQrCallback);
                    }
                }, 1800);
            });
        }

        async function toggleInboundScanner() {
            const statusEl = document.getElementById('inb-scan-status');
            const btn = document.getElementById('inb-scan-btn');

            if (_inboundScannerActive) {
                _inboundScannerActive = false;
                stopQRCamera();
                if (statusEl) { statusEl.textContent = ''; statusEl.className = 'text-xs text-gray-400'; }
                if (btn) btn.innerHTML = `<svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4h4V2H2v6h2V4zm16 0v4h2V2h-6v2h4zM4 16H2v6h6v-2H4v-4zm16 4h-4v2h6v-6h-2v4zM7 7h2v2H7V7zm0 8h2v2H7v-2zm8-8h2v2h-2V7zm0 8h2v2h-2v-2zm-4-4h2v2h-2v-2z"/></svg> Scan QR Code`;
                return;
            }

            _inboundScannerActive = true;
            _inboundLastScan = '';
            _inboundCooldown = false;

            if (btn) btn.innerHTML = `<svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg> Tutup Scanner`;
            if (statusEl) { statusEl.textContent = 'Membuka kamera...'; statusEl.className = 'text-xs text-blue-500'; }

            await startQRCamera(undefined, _inboundQrCallback);
