<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Warehouse Pulogadung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body class="flex flex-col md:flex-row h-screen font-sans text-gray-800 bg-gray-50">

    <!-- =====================================================================
         HEADER (Mobile Only)
    ====================================================================== -->
    <header class="md:hidden bg-white p-4 flex items-center justify-between border-b border-gray-200 z-50">
        <span class="font-bold text-gray-700">Dashboard</span>
        <button id="menu-btn" class="p-2 bg-amber-500 text-white rounded">☰ Menu</button>
    </header>

    <!-- =====================================================================
         SIDEBAR NAVIGASI
         Untuk menambah menu baru: duplikat salah satu blok <div class="space-y-1">
         dan sesuaikan id, label, serta nama fungsi showPage() yang dipanggil.
    ====================================================================== -->
    <aside id="sidebar"
        class="hidden md:block w-full md:w-64 bg-white border-r border-gray-200 p-6 flex-col fixed md:relative h-full z-40 overflow-y-auto">

        <!-- Logo & Nama Warehouse -->
        <div class="mb-6">
            <img src="https://lh3.googleusercontent.com/d/1sy4WhFoKJnGlgFw9j_tnMcNWCxWSA48N" alt="Logo"
                class="h-20 w-auto">
            <p class="text-gray-700 font-medium">Warehouse Pulogadung</p>
        </div>

        <nav class="space-y-6">
            <div class="border-b border-gray-500 px-1"></div>

            <!-- Tombol Dashboard -->
            <button onclick="showPage('Dashboard')"
                class="flex items-center gap-3 text-gray-700 hover:text-amber-500 font-bold">
                Dashboard
            </button>

            <!-- Menu: Inventory Machine -->
            <div class="space-y-1">
                <button onclick="toggleSubMenu('inventory-sub', 'arrow-inventory')"
                    class="flex w-full items-center justify-between p-2 text-gray-700 hover:bg-amber-50 hover:text-amber-600 rounded font-semibold">
                    <span>Inventory Machine</span>
                    <span id="arrow-inventory" class="text-xs">▼</span>
                </button>
                <div id="inventory-sub" class="hidden pl-6 space-y-1 border-l-2 border-amber-200 ml-3">
                    <button onclick="showPage('Stock Master')"
                        class="block w-full text-left p-1 text-sm text-gray-600 hover:text-amber-600">Stock Master</button>
                    <button onclick="showPage('Report Inventory')"
                        class="block w-full text-left p-1 text-sm text-gray-600 hover:text-amber-600">Report</button>
                </div>
            </div>

            <!-- Menu: Plan Task -->
            <div class="space-y-1">
                <button onclick="toggleSubMenu('plan-task-sub', 'arrow-plan')"
                    class="flex w-full items-center justify-between p-2 text-gray-700 hover:bg-amber-50 hover:text-amber-600 rounded font-semibold">
                    <span>Plan Task</span>
                    <span id="arrow-plan" class="text-xs">▼</span>
                </button>
                <div id="plan-task-sub" class="hidden pl-6 space-y-1 border-l-2 border-amber-200 ml-3">
                    <button onclick="showPage('Plan Task')"
                        class="block w-full text-left p-1 text-sm text-gray-600 hover:text-amber-600">Plan Task</button>
                    <button onclick="showPage('Report KPI')"
                        class="block w-full text-left p-1 text-sm text-gray-600 hover:text-amber-600">Report KPI</button>
                </div>
            </div>

            <!-- Menu: Maintenance -->
            <div class="space-y-1">
                <button onclick="toggleSubMenu('maintenance-sub', 'arrow-maintenance')"
                    class="flex w-full items-center justify-between p-2 text-gray-700 hover:bg-amber-50 hover:text-amber-600 rounded font-semibold">
                    <span>Maintenance</span>
                    <span id="arrow-maintenance" class="text-xs">▼</span>
                </button>
                <div id="maintenance-sub" class="hidden pl-6 space-y-1 border-l-2 border-amber-200 ml-3">
                    <button onclick="showPage('Report Maintenance')"
                        class="block w-full text-left p-1 text-sm text-gray-600 hover:text-amber-600">Report Maintenance</button>
                </div>
            </div>

            <!-- Menu: Purchase Order -->
            <div class="space-y-1">
                <button onclick="toggleSubMenu('po-sub', 'arrow-po')"
                    class="flex w-full items-center justify-between p-2 text-gray-700 hover:bg-amber-50 hover:text-amber-600 rounded font-semibold">
                    <span>Purchase Order</span>
                    <span id="arrow-po" class="text-xs">▼</span>
                </button>
                <div id="po-sub" class="hidden pl-6 space-y-1 border-l-2 border-amber-200 ml-3">
                    <button onclick="showPage('Purchase Order')"
                        class="block w-full text-left p-1 text-sm text-gray-600 hover:text-amber-600">Form PO</button>
                    <button onclick="showPage('Report Status')"
                        class="block w-full text-left p-1 text-sm text-gray-600 hover:text-amber-600">Report Status</button>
                </div>
            </div>

            <!-- [TAMBAH MENU BARU DI SINI] -->

        </nav>
    </aside>

    <!-- =====================================================================
         AREA KONTEN UTAMA
    ====================================================================== -->
    <main id="content-area" class="flex-1 p-4 md:p-8 overflow-y-auto">
        <!-- Konten default: Dashboard -->
        <h1 class="text-3xl font-semibold text-gray-700">Dashboard</h1>
        <div class="mt-8">
            <img src="https://lh3.googleusercontent.com/d/19epa7IlpjqaS0f7F_WEgDZSwhriLpikp" alt="Dashboard Image"
                class="rounded-lg shadow-lg max-w-full h-auto border border-gray-300">
        </div>
    </main>

    <script>
    // =========================================================================
    // KONFIGURASI URL API (Google Apps Script)
    // Ganti URL di sini jika endpoint berubah, tanpa perlu mencari ke dalam fungsi.
    // =========================================================================
    // =========================================================================
    // KONFIGURASI URL API
    // purchaseOrder & reportStatus menggunakan 1 GAS yang sama.
    // Ganti GANTI_URL_GAS_PO_ANDA dengan URL deployment GAS terbaru Anda.
    // =========================================================================
    const PO_GAS_URL = 'https://script.google.com/macros/s/AKfycbyQHyCGhXLOHGGVJbWh_boZrijju4WYR3MflQQTTlaVVRl_Q0qIVaeh7Fao3JVcRD_n/exec'; // ← paste URL GAS baru di sini

    const API_URLS = {
        stockMaster:      'https://script.google.com/macros/s/AKfycbw_dT47dMFwtwM0qTmyOQemxzmrUYccmCwglqhFI8haRTGRmNJc98b_t1fBXxaylrUn/exec',
        reportInventory:  'https://script.google.com/macros/s/AKfycbyrXKkSEcXq01x5RVnS0Ys9d5pIYELsfM8VbUOOCj1qPO4WpqIpHuowq0xZOZ2lUOkyrQ/exec',
        planTask:         'https://script.google.com/macros/s/AKfycbzbCPzwQoMmnp0uKlVIYRdozphCJC7Yrb01SJNebZoOZmKkCvofBw8D3vndo9T1iB3rOg/exec',
        reportKPI:        'https://script.google.com/macros/s/AKfycbwrKz5dFywZ1WzfWyA6JmF_dh1GfKiZQWT6p1aUQDGAftrkNrTCMwV0hpZQczYHpeD1DA/exec',
        reportMaintenance:'https://script.google.com/macros/s/AKfycbzlEFCiljPTTBlnpzhu26s9WK03JLScJKcLaJkMWYqSGhVeW0GBI9WeW0-t1Wov46WT/exec',
        purchaseOrder:    PO_GAS_URL, // getNames (GET) + submitPO (POST)
        reportStatus:     'https://script.google.com/macros/s/AKfycby4VxU3vN27tvm3iVjBjf0MC7BkqFSF2wXPaTdCnpDImXIuxb6gXl0Dsb2EYjdtTJSH/exec', // getPOData (GET) + closePO (POST)
    };

    // =========================================================================
    // UTILITAS UI
    // =========================================================================

    /** Menampilkan pesan loading di content area */
    function setLoading(message = 'Memuat data...') {
        document.getElementById('content-area').innerHTML =
            `<p class="text-gray-500">${message}</p>`;
    }

    /** Menampilkan pesan error di content area */
    function setError(message) {
        document.getElementById('content-area').innerHTML =
            `<p class="text-red-500 p-4">Error: ${message}</p>`;
    }

    /** Toggle sidebar di mobile */
    document.getElementById('menu-btn').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('hidden');
    });

    /** Toggle submenu sidebar dengan animasi panah */
    function toggleSubMenu(menuId, arrowId) {
        const subMenu = document.getElementById(menuId);
        const arrow   = document.getElementById(arrowId);
        subMenu.classList.toggle('hidden');
        arrow.textContent = subMenu.classList.contains('hidden') ? '▼' : '▲';
    }

    // =========================================================================
    // ROUTER HALAMAN
    // Tambahkan case baru di sini untuk menu baru yang ingin ditambahkan.
    // =========================================================================
    async function showPage(pageName) {
        const contentArea = document.getElementById('content-area');

        // Tutup sidebar di mobile setelah memilih menu
        if (window.innerWidth < 768) {
            document.getElementById('sidebar').classList.add('hidden');
        }

        switch (pageName) {
            case 'Dashboard':        showDashboard();           break;
            case 'Stock Master':     await showStockMaster();   break;
            case 'Report Inventory': await showReportInventory(); break;
            case 'Plan Task':        await showPlanTask();       break;
            case 'Report KPI':       await showReportKPI();      break;
            case 'Report Maintenance': await showReportMaintenance(); break;
            case 'Purchase Order':   await showFormPO();         break;
            case 'Report Status':    await showReportStatus();  break;
            // [TAMBAH CASE BARU DI SINI]
            default:
                contentArea.innerHTML = `
                    <h1 class="text-3xl font-semibold text-gray-700">${pageName}</h1>
                    <p class="mt-4 text-gray-600">Halaman ini sedang dalam pengembangan.</p>`;
        }
    }

    // =========================================================================
    // HALAMAN: DASHBOARD
    // =========================================================================
    function showDashboard() {
        document.getElementById('content-area').innerHTML = `
            <h1 class="text-3xl font-semibold text-gray-700">Dashboard</h1>
            <div class="mt-8">
                <img src="https://lh3.googleusercontent.com/d/19epa7IlpjqaS0f7F_WEgDZSwhriLpikp"
                     alt="Dashboard Image"
                     class="rounded-lg shadow-lg max-w-full h-auto border border-gray-300">
            </div>`;
    }

    // =========================================================================
    // HALAMAN: STOCK MASTER
    // =========================================================================
    async function showStockMaster() {
        setLoading();
        const contentArea = document.getElementById('content-area');

        try {
            const response = await fetch(API_URLS.stockMaster);
            const data     = await response.json();
            const rows     = data.slice(3);

            const HIDDEN_KEYWORDS = ["Descaling Kit", "Sleeve Box"];

            let rows_html = '';
            for (const row of rows) {
                const machineName = String(row[1] || '');
                const stock       = String(row[2] || '');

                if (machineName === '' || HIDDEN_KEYWORDS.some(k => machineName.includes(k))) continue;

                rows_html += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-2 font-medium text-center">${machineName}</td>
                        <td class="p-2 font-medium text-center">${stock}</td>
                    </tr>`;
            }

            contentArea.innerHTML = `
                <h1 class="text-3xl font-semibold text-gray-700 mb-4">Stock Master</h1>
                <div class="overflow-x-auto w-full bg-white rounded-lg shadow-sm border border-gray-300 max-w-2xl">
                    <table class="w-full border-collapse text-[10px]">
                        <thead>
                            <tr class="bg-gray-100 border-b border-gray-300 text-gray-700">
                                <th class="p-2 text-center w-1/2">Machine Detail</th>
                                <th class="p-2 text-center w-1/2">Stock Available</th>
                            </tr>
                        </thead>
                        <tbody class="text-gray-600 divide-y divide-gray-200">
                            ${rows_html}
                        </tbody>
                    </table>
                </div>`;
        } catch (err) {
            setError(err.message);
        }
    }

    // =========================================================================
    // HALAMAN: REPORT INVENTORY
    // =========================================================================
    async function showReportInventory() {
        setLoading();
        const contentArea = document.getElementById('content-area');

        try {
            const response = await fetch(API_URLS.reportInventory);
            const data     = await response.json();

            // -- Tabel 1: Report per-Minggu (baris 6-15) --
            let tableMingguan = `
                <h2 class="text-lg font-bold text-gray-800 mb-2">Report per-Minggu</h2>
                <div class="overflow-x-auto border border-gray-400 mb-8">
                    <table class="w-full text-[10px] text-center border-collapse">
                        <thead>
                            <tr class="bg-gray-200 border-b border-gray-400">
                                <th class="p-2 border-r" rowspan="2">Machine Detail</th>
                                <th class="p-1 border-b border-r" colspan="2">W1</th>
                                <th class="p-1 border-b border-r" colspan="2">W2</th>
                                <th class="p-1 border-b border-r" colspan="2">W3</th>
                                <th class="p-1 border-b border-r" colspan="2">W4</th>
                                <th class="p-2" rowspan="2">Total Outbound</th>
                            </tr>
                            <tr class="bg-gray-100 border-b border-gray-400">
                                ${"<th>Res</th><th>Out</th>".repeat(4)}
                            </tr>
                        </thead>
                        <tbody class="text-gray-900 font-bold">`;

            for (let i = 6; i <= 15; i++) {
                const row = data[i];
                if (!row) continue;
                const validRow   = row.slice(0, 10);
                const isRowEmpty = validRow.every(c => c === '' || c === '-' || c == null);
                if (isRowEmpty) continue;

                const isTotal = String(validRow[0]).trim().toLowerCase() === 'total';
                tableMingguan += `<tr class="border-b border-gray-300 ${isTotal ? 'bg-gray-200' : 'hover:bg-blue-50'}">`;
                validRow.forEach(cell => {
                    tableMingguan += `<td class="p-2 border-r border-gray-300">${cell || '-'}</td>`;
                });
                tableMingguan += '</tr>';
            }
            tableMingguan += '</tbody></table></div>';

            // -- Tabel 2: Report Outbound per-Bulan (baris 22+) --
            const MONTHS = ["Machine Detail","Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agt","Sep","Okt","Nov","Des","Total"];

            // Kumpulkan dulu semua baris data yang valid
            const bulananRows = [];
            for (let i = 22; i < data.length; i++) {
                const row  = data[i];
                if (!row) continue;
                const name = String(row[0] || '').trim().toLowerCase();
                if (name === '') continue;
                bulananRows.push(row);
                if (name.includes('stainless steel cup')) break;
            }

            // Tentukan kolom mana yang punya setidaknya satu nilai (bukan '-' dan bukan kosong),
            // selain kolom pertama (Machine Detail) yang selalu ditampilkan.
            const activeCols = MONTHS.reduce((acc, _, colIdx) => {
                if (colIdx === 0) { acc.push(colIdx); return acc; } // kolom nama selalu tampil
                const hasValue = bulananRows.some(row => {
                    const cell = row[colIdx];
                    return cell !== '' && cell !== '-' && cell != null;
                });
                if (hasValue) acc.push(colIdx);
                return acc;
            }, []);

            let tableBulanan = `
                <h2 class="text-lg font-bold text-gray-800 mb-2">Report Outbound per-Bulan</h2>
                <div class="overflow-x-auto border border-gray-400">
                    <table class="w-full text-[10px] text-center border-collapse">
                        <thead>
                            <tr class="bg-gray-200 border-b border-gray-400">
                                ${activeCols.map(i => `<th class="p-2 border-r">${MONTHS[i]}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody class="text-gray-900 font-bold">`;

            bulananRows.forEach(row => {
                tableBulanan += '<tr class="border-b border-gray-300">';
                activeCols.forEach(colIdx => {
                    const cell = row[colIdx];
                    tableBulanan += `<td class="p-2 border-r border-gray-300">${(cell !== '' && cell != null) ? cell : '-'}</td>`;
                });
                tableBulanan += '</tr>';
            });
            tableBulanan += '</tbody></table></div>';

            contentArea.innerHTML = tableMingguan + tableBulanan;
        } catch (err) {
            setError(err.message);
        }
    }

    // =========================================================================
    // HALAMAN: PLAN TASK
    // =========================================================================
    async function showPlanTask() {
        setLoading();
        const contentArea = document.getElementById('content-area');

        try {
            const response = await fetch(API_URLS.planTask);
            const data     = await response.json();

            const taskData = data.slice(1).filter(row =>
                row[0] &&
                !row[0].toString().includes('Tidak ada tugas aktif') &&
                row[0] !== ''
            );

            if (taskData.length === 0) {
                contentArea.innerHTML = `
                    <h1 class="text-3xl font-semibold text-gray-700 mb-6">Plan Task</h1>
                    <div class="flex flex-col items-center justify-center h-64 bg-white rounded-lg border border-gray-300 shadow-sm">
                        <p class="text-4xl mb-4">✅</p>
                        <p class="text-xl font-bold text-gray-600">Task Clear</p>
                        <p class="text-gray-400">Tidak ada tugas yang perlu dikerjakan saat ini.</p>
                    </div>`;
                return;
            }

            /** Format tanggal dari ISO string ke "DD-Mon-YYYY" */
            function formatDeadline(cell) {
                const raw = String(cell).trim();
                if (!raw.includes('T')) return raw;

                const datePart = raw.split('T')[0];
                const date     = new Date(datePart);
                date.setDate(date.getDate() + 1);

                const months = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agt","Sep","Okt","Nov","Des"];
                return `${String(date.getDate()).padStart(2,'0')}-${months[date.getMonth()]}-${date.getFullYear()}`;
            }

            let rows_html = '';
            taskData.forEach(row => {
                rows_html += '<tr class="hover:bg-gray-50 text-xs">';
                row.forEach((cell, index) => {
                    let value = String(cell || '-').trim();

                    if (index === 0 || index === 2) {
                        // Kolom Task & Schedule Time: pecah per baris
                        value = value.split('\n')
                            .map(t => t.replace(/^- /, '').trim())
                            .filter(t => t !== '')
                            .join('<br>');
                    } else if (index === 1) {
                        // Kolom Deadline: format tanggal
                        value = formatDeadline(cell);
                    } else if (index === 4) {
                        // Kolom Status: deduplikasi
                        const statuses = value.split('\n')
                            .map(s => s.replace(/^- /, '').trim())
                            .filter(s => s !== '' && s !== '-');
                        value = [...new Set(statuses)].join('<br>');
                    }

                    const extra = index === 1 ? 'whitespace-nowrap' : '';
                    rows_html += `<td class="p-3 border-r border-gray-200 text-center ${extra}">${value}</td>`;
                });
                rows_html += '</tr>';
            });

            contentArea.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-semibold text-gray-700">Task</h1>
                    <button id="shareBtn" onclick="shareToWhatsApp()"
                        class="bg-gray-700 text-white px-4 py-2 rounded-lg font-bold hover:bg-gray-800 shadow-md text-sm">
                        Share to WhatsApp
                    </button>
                </div>
                <div id="captureArea" class="bg-white p-8 border border-gray-200">
                    <h1 class="text-3xl font-semibold text-gray-700 mb-6">Plan Task</h1>
                    <div class="rounded-lg shadow-sm border border-gray-300 overflow-hidden">
                        <table class="w-full border-collapse">
                            <thead>
                                <tr class="bg-gray-100 border-b border-gray-300 text-gray-700 text-xs">
                                    ${data[0].map(h => `<th class="p-3 text-center border-r">${h}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody class="text-gray-600 divide-y divide-gray-200">
                                ${rows_html}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        } catch (err) {
            setError(err.message);
        }
    }

    // =========================================================================
    // HALAMAN: REPORT KPI
    // =========================================================================
    async function showReportKPI() {
        setLoading('Memuat data KPI...');
        const contentArea = document.getElementById('content-area');

        try {
            const response = await fetch(API_URLS.reportKPI);
            const data     = await response.json();

            /**
             * Membuat HTML tabel dari rentang baris & kolom yang ditentukan.
             * Baris/kolom yang sepenuhnya kosong otomatis disembunyikan.
             */
            function renderTable(title, startRow, endRow, colStart, colEnd) {
                // Tentukan kolom aktif (ada datanya)
                const activeCols = [];
                for (let j = colStart; j <= colEnd; j++) {
                    const hasData = Array.from({ length: endRow - startRow }, (_, k) => startRow + 1 + k)
                        .some(i => {
                            const cell = data[i]?.[j];
                            return cell !== '' && cell !== '-' && cell != null;
                        });
                    if (hasData || j === colStart) activeCols.push(j);
                }

                let html = `
                    <h2 class="text-sm font-bold text-gray-700 mt-8 mb-3">${title}</h2>
                    <div class="overflow-x-auto bg-white shadow-sm border border-gray-200 rounded-lg">
                        <table class="w-full text-xs border-collapse">
                            <thead>
                                <tr class="bg-gray-800 text-white">
                                    ${activeCols.map(j => `<th class="p-3 border-r border-gray-600 text-center">${data[startRow][j] || ''}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;

                for (let i = startRow + 1; i <= endRow; i++) {
                    if (!data[i]) continue;
                    const rowData    = activeCols.map(j => data[i][j]);
                    const isRowEmpty = rowData.slice(1).every(c => !c || c === '-' || c === '');
                    if (isRowEmpty) continue;

                    const isTotal = String(data[i][colStart]).toLowerCase().includes('total');
                    html += `<tr class="${isTotal ? 'bg-amber-100 font-bold' : 'hover:bg-gray-50'}">`;
                    activeCols.forEach(j => {
                        const cell = data[i][j];
                        html += `<td class="p-3 border-r text-center">${(cell === '' || cell == null) ? '-' : cell}</td>`;
                    });
                    html += '</tr>';
                }
                html += '</tbody></table></div>';
                return html;
            }

            /**
             * Membuat tabel Productivity khusus (nama orang sebagai baris).
             */
            function renderProductivityTable(title, startRow, endRow) {
                const VALID_NAMES = ["Rizal", "Adam", "Helmi", "Raka"];

                let html = `
                    <h2 class="text-sm font-bold text-gray-700 mt-8 mb-3">${title}</h2>
                    <div class="overflow-x-auto bg-white shadow-sm border border-gray-200 rounded-lg">
                        <table class="w-full text-xs border-collapse">
                            <thead>
                                <tr class="bg-gray-800 text-white">
                                    <th class="p-3 border-r border-gray-600 text-center">Nama</th>
                                    <th class="p-3 border-r border-gray-600 text-center">Loading</th>
                                    <th class="p-3 border-r border-gray-600 text-center">Prepare</th>
                                    <th class="p-3 border-r border-gray-600 text-center">Support</th>
                                    <th class="p-3 border-r border-gray-600 text-center">Perapihan</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;

                for (let i = startRow; i <= endRow; i++) {
                    if (!data[i]) continue;
                    const rowData = data[i];
                    const nama    = rowData.find(c => VALID_NAMES.includes(c));
                    if (!nama) continue;

                    const angka = rowData.filter(c => !isNaN(c) && c !== '' && c != null && !VALID_NAMES.includes(c));
                    html += `
                        <tr class="hover:bg-gray-50">
                            <td class="p-3 border-r font-bold text-center bg-gray-50">${nama}</td>
                            <td class="p-3 border-r text-center">${angka[0] || '0'}</td>
                            <td class="p-3 border-r text-center">${angka[1] || '0'}</td>
                            <td class="p-3 border-r text-center">${angka[2] || '0'}</td>
                            <td class="p-3 border-r text-center">${angka[3] || '0'}</td>
                        </tr>`;
                }
                html += '</tbody></table></div>';
                return html;
            }

            let content = '<h1 class="text-xl font-bold mb-4">Report KPI</h1>';
            content += renderTable("Report KPI Mingguan",   1,  6,  7, 11);
            content += renderTable("Report KPI Bulanan",    1,  6,  0,  5);
            content += renderTable("Tren Activity/Bulan",  16, 20,  6,  9);
            content += renderProductivityTable("Productivity/Bulan", 22, 27);

            contentArea.innerHTML = content;
        } catch (err) {
            contentArea.innerHTML = '<p class="text-red-500 p-4">Error memuat data. Periksa koneksi.</p>';
        }
    }

    // =========================================================================
    // HALAMAN: REPORT MAINTENANCE
    // =========================================================================
    async function showReportMaintenance() {
        setLoading();
        const contentArea = document.getElementById('content-area');

        try {
            const response = await fetch(API_URLS.reportMaintenance);
            const data     = await response.json();

            /**
             * Membuat tabel dengan hanya menampilkan kolom yang memiliki data.
             * @param {string} title      - Judul tabel
             * @param {Array}  headerRow  - Array header kolom
             * @param {Array}  bodyRows   - Array baris data
             */
            function createTable(title, headerRow, bodyRows) {
                // Cari indeks kolom yang tidak kosong
                const validCols = headerRow.reduce((acc, _, colIndex) => {
                    const hasData = bodyRows.some(row => row[colIndex] !== '' && row[colIndex] !== '-' && row[colIndex] != null);
                    if (hasData) acc.push(colIndex);
                    return acc;
                }, []);

                let html = `
                    <h2 class="text-lg font-bold text-gray-700 mb-2 mt-6">${title}</h2>
                    <div class="overflow-x-auto shadow-sm border border-gray-200 rounded-lg mb-4">
                        <table class="w-full text-xs text-center border-collapse">
                            <thead class="bg-gray-800 text-white">
                                <tr>${validCols.map(i => `<th class="p-3 border-r">${headerRow[i]}</th>`).join('')}</tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200 bg-white">`;

                bodyRows.forEach(row => {
                    const isTotal = row[0] && row[0].toString().toLowerCase() === 'total';
                    html += `<tr class="${isTotal ? 'bg-gray-200 font-bold' : 'hover:bg-gray-50'}">`;
                    validCols.forEach(i => {
                        html += `<td class="p-3 border-r">${row[i] || '-'}</td>`;
                    });
                    html += '</tr>';
                });
                html += '</tbody></table></div>';
                return html;
            }

            const tableRepair    = createTable("Report Progress Repair",                    data[0],  data.slice(2, 11));
            const tableExRepair  = createTable("Report Ex Repair Vs Reused Vs Service",     data[14], data.slice(16, 24));
            const tableSparepart = createTable("Report Type Unit yang sering di-Repair",    data[27], data.slice(29, 40));
            const tableTypeUnit  = createTable("Report Type Unit yang sering di-Repair",    data[43], data.slice(44, 51));

            contentArea.innerHTML =
                '<h1 class="text-2xl font-bold text-gray-700 mb-4">Report Maintenance</h1>' +
                tableRepair + tableExRepair + tableSparepart + tableTypeUnit;
        } catch (err) {
            setError(err.message);
        }
    }

    // =========================================================================
    // HALAMAN: FORM PURCHASE ORDER
    // =========================================================================

    /**
     * Peta kategori → kode prefix No. PO
     * Tambahkan entri baru di sini jika ada kategori baru.
     */
    const CATEGORY_CODE = {
        'Outlet':      'OT',
        'Event':       'EV',
        'KOL':         'KOL',
        'B2C':         'B2C',
        'B2B':         'B2B',
        'Selling':     'SEL',
        'Switch Unit': 'SU',
    };

    /** Memformat Date ke string "DDMMYYYY" untuk No. PO */
    function formatDateForPO(date) {
        const dd   = String(date.getDate()).padStart(2, '0');
        const mm   = String(date.getMonth() + 1).padStart(2, '0');
        const yyyy = date.getFullYear();
        return `${dd}${mm}${yyyy}`;
    }

    async function showFormPO() {
        setLoading('Memuat form...');
        const contentArea = document.getElementById('content-area');

        // Ambil daftar nama dari sheet Source (kolom B2 ke bawah) via API
        let namaOptions = '<option value="">-- Pilih Nama --</option>';
        try {
            const res   = await fetch(API_URLS.purchaseOrder + '?action=getNames');
            const names = await res.json();
            // API mengembalikan array nama (string), filter yang kosong
            names.filter(n => n && String(n).trim() !== '').forEach(name => {
                namaOptions += `<option value="${name}">${name}</option>`;
            });
        } catch (e) {
            // Jika gagal fetch, biarkan dropdown kosong dengan pesan
            namaOptions += '<option disabled>Gagal memuat nama</option>';
        }

        // Buat opsi kategori dari CATEGORY_CODE
        const categoryOptions = Object.keys(CATEGORY_CODE)
            .map(k => `<option value="${k}">${k}</option>`)
            .join('');

        contentArea.innerHTML = `
            <div class="max-w-xl mx-auto bg-white p-8 rounded-lg shadow-lg border border-gray-200">
                <h1 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">Form Purchase Order</h1>
                <div class="space-y-4">

                    <!-- No. PO (preview otomatis) -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">No. PO (otomatis)</label>
                        <div id="po-preview"
                            class="w-full p-3 border border-gray-200 rounded-lg bg-gray-100 text-gray-500 text-sm font-mono tracking-wide">
                            Pilih kategori untuk melihat preview No. PO
                        </div>
                    </div>

                    <!-- Nama Pemohon (dropdown dari sheet Source) -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Pemohon</label>
                        <select id="nama"
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none">
                            ${namaOptions}
                        </select>
                    </div>

                    <!-- Kategori -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Kategori</label>
                        <select id="category" onchange="updatePOPreview()"
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none">
                            <option value="">-- Pilih Kategori --</option>
                            ${categoryOptions}
                        </select>
                    </div>

                    <!-- Upload PDF -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Upload File PDF</label>
                        <input type="file" id="pdfFile" accept="application/pdf"
                            class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 text-sm">
                    </div>

                    <button id="submitBtn" onclick="submitPO()"
                        class="w-full bg-amber-500 text-white py-3 rounded-lg font-bold hover:bg-amber-600 transition duration-200 shadow-md mt-4">
                        Kirim PO
                    </button>
                </div>
            </div>`;
    }

    /**
     * Memperbarui preview No. PO setiap kali kategori dipilih.
     * Format: {KODE}-{DDMMYYYY}-{urutan}
     * Urutan dihitung dari sisi Google Apps Script saat submit;
     * di preview kita tampilkan "?" sebagai placeholder urutan.
     */
    function updatePOPreview() {
        const category = document.getElementById('category').value;
        const preview  = document.getElementById('po-preview');
        if (!category || !CATEGORY_CODE[category]) {
            preview.textContent = 'Pilih kategori untuk melihat preview No. PO';
            preview.classList.add('text-gray-500');
            preview.classList.remove('text-amber-700', 'font-bold');
            return;
        }
        const code    = CATEGORY_CODE[category];
        const dateStr = formatDateForPO(new Date());
        preview.textContent = `${code}-${dateStr}-?`;
        preview.classList.remove('text-gray-500');
        preview.classList.add('text-amber-700', 'font-bold');
    }

    /** Mengirim data Form PO ke Google Apps Script */
    async function submitPO() {
        const namaEl     = document.getElementById('nama');
        const categoryEl = document.getElementById('category');
        const fileInput  = document.getElementById('pdfFile');
        const btn        = document.getElementById('submitBtn');

        // Validasi input
        if (!namaEl.value)     { alert('Pilih nama pemohon terlebih dahulu.'); return; }
        if (!categoryEl.value) { alert('Pilih kategori terlebih dahulu.'); return; }
        const file = fileInput.files[0];
        if (!file)             { alert('Pilih file PDF terlebih dahulu.'); return; }

        btn.innerText = 'Mengirim...';
        btn.disabled  = true;

        const reader = new FileReader();
        reader.onload = async function (e) {
            const payload = {
                action:       'submitPO',                        // aksi di GAS
                nama:         namaEl.value,
                category:     categoryEl.value,
                categoryCode: CATEGORY_CODE[categoryEl.value],  // kode prefix No. PO
                tanggal:      formatDateForPO(new Date()),       // DDMMYYYY untuk No. PO
                fileData:     e.target.result.split(',')[1],
                fileName:     file.name,
                fileType:     file.type,
            };

            try {
                const response = await fetch(API_URLS.purchaseOrder, {
                    method: 'POST',
                    body:   JSON.stringify(payload),
                });
                const result = await response.json();
                alert('Berhasil! No. PO: ' + result.po);

                // Reset form
                namaEl.selectedIndex     = 0;
                categoryEl.selectedIndex = 0;
                fileInput.value          = '';
                updatePOPreview(); // reset preview No. PO
            } catch (err) {
                alert('Gagal kirim: ' + err.message);
            } finally {
                btn.innerText = 'Kirim PO';
                btn.disabled  = false;
            }
        };
        reader.readAsDataURL(file);
    }

    // =========================================================================
    // HALAMAN: REPORT STATUS PO
    // =========================================================================
    async function showReportStatus() {
        setLoading('Memuat status PO...');
        const contentArea = document.getElementById('content-area');

        try {
            const response = await fetch(API_URLS.reportStatus + '?action=getPOData');
            const raw      = await response.json();

            // GAS kadang return object {error:...} jika action tidak dikenal — tangani di sini
            const data = Array.isArray(raw) ? raw : [];

            // Filter di sisi JS: buang header, baris kosong, dan yang sudah Closed
            const activeData = data.slice(1).filter(row =>
                row[1] !== '' && row[1] != null && String(row[1]).trim() !== '' && row[4] !== 'Closed'
            );

            if (activeData.length === 0) {
                contentArea.innerHTML = `
                    <h1 class="text-2xl font-bold mb-4">Report Status PO</h1>
                    <div class="p-8 text-center bg-white border border-gray-200 rounded-lg shadow-sm">
                        <p class="text-gray-500">✅ Tidak ada PO yang berlangsung.</p>
                    </div>`;
                return;
            }

            let rows_html = '';
            activeData.forEach(row => {
                const noPO    = row[1] || '-';
                const nama    = row[2] || '-';
                const kat     = row[3] || '-';
                const status  = row[4];              // kosong = Open, "Closed" = Closed
                const link    = row[5];

                // Kolom Status: kosong → badge "Open" hijau
                const statusBadge = (!status || status.toString().trim() === '')
                    ? `<span class="inline-block px-2 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700">Open</span>`
                    : `<span class="inline-block px-2 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700">Closed</span>`;

                // Tampilkan URL lengkap jika pendek, atau teks "Buka" jika terlalu panjang
                const linkCell = (link && link !== '')
                    ? `<a href="${link}" target="_blank"
                          class="inline-block max-w-[160px] truncate align-middle text-blue-600 underline hover:text-blue-800"
                          title="${link}">
                          ${link}
                       </a>`
                    : '-';

                rows_html += `
                    <tr id="row-${noPO}">
                        <td class="p-3 border-b">${noPO}</td>
                        <td class="p-3 border-b">${nama}</td>
                        <td class="p-3 border-b">${kat}</td>
                        <td class="p-3 border-b" id="status-${noPO}">${statusBadge}</td>
                        <td class="p-3 border-b">${linkCell}</td>
                        <td class="p-3 border-b">
                            <button
                                id="btn-${noPO}"
                                onclick="closePO('${noPO}')"
                                class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-xs font-semibold transition">
                                Closed
                            </button>
                        </td>
                    </tr>`;
            });

            contentArea.innerHTML = `
                <h1 class="text-2xl font-bold mb-4">Report Status PO</h1>
                <div class="overflow-x-auto bg-white shadow-sm border border-gray-200 rounded-lg">
                    <table class="w-full text-xs text-center border-collapse">
                        <thead>
                            <tr class="bg-gray-800 text-white">
                                <th class="p-3">No. PO</th>
                                <th class="p-3">Nama</th>
                                <th class="p-3">Kategori</th>
                                <th class="p-3">Status</th>
                                <th class="p-3">Link</th>
                                <th class="p-3">Aksi</th>
                            </tr>
                        </thead>
                        <tbody>${rows_html}</tbody>
                    </table>
                </div>`;
        } catch (err) {
            setError(err.message);
        }
    }

    /**
     * Menutup PO: kirim POST ke GAS untuk update kolom E → "Closed",
     * lalu update tampilan baris secara langsung tanpa reload halaman.
     */
    async function closePO(poNumber) {
        if (!confirm(`Tutup PO ${poNumber}?`)) return;

        const btn        = document.getElementById(`btn-${poNumber}`);
        const statusCell = document.getElementById(`status-${poNumber}`);

        btn.disabled  = true;
        btn.innerText = 'Menyimpan...';

        try {
            const response = await fetch(API_URLS.reportStatus, {
                method: 'POST',
                body:   JSON.stringify({ action: 'closePO', poNumber }),
            });
            const result = await response.json();

            if (result.success) {
                // Update badge status → Closed (merah) tanpa reload halaman
                statusCell.innerHTML = `<span class="inline-block px-2 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700">Closed</span>`;
                btn.disabled         = true;
                btn.innerText        = '✓ Closed';
                btn.className        = 'bg-gray-300 text-gray-500 px-3 py-1 rounded text-xs font-semibold cursor-not-allowed';
            } else {
                alert('Gagal menutup PO: ' + (result.message || 'Terjadi kesalahan.'));
                btn.disabled  = false;
                btn.innerText = 'Closed';
            }
        } catch (err) {
            alert('Error: ' + err.message);
            btn.disabled  = false;
            btn.innerText = 'Closed';
        }
    }

    // =========================================================================
    // FITUR: SHARE TO WHATSAPP (Screenshot via html2canvas)
    // =========================================================================
    function shareToWhatsApp() {
        const captureArea = document.getElementById('captureArea');
        const btn         = document.getElementById('shareBtn');

        btn.style.display = 'none';

        html2canvas(captureArea, { scale: 2, useCORS: true, backgroundColor: '#ffffff' })
            .then(canvas => {
                canvas.toBlob(blob => {
                    btn.style.display = 'inline-block';

                    const file = new File([blob], 'PlanTask.png', { type: 'image/png' });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        navigator.share({ files: [file] });
                    } else {
                        // Fallback: download langsung
                        const link    = document.createElement('a');
                        link.download = 'PlanTask.png';
                        link.href     = canvas.toDataURL('image/png');
                        link.click();
                    }
                });
            });
    }
    </script>
