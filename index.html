    <!-- =====================================================================

    ====================================================================== -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/40 z-[99999] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center transform transition-all">

            <h3 id="modal-title" class="text-lg font-bold text-gray-800 mb-1"></h3>
            <p id="modal-message" class="text-sm text-gray-500 mb-5"></p>
            <button onclick="closeModal()" class="w-full py-2 rounded-xl font-bold text-white transition"
                id="modal-btn">OK</button>
        </div>
    </div>

    ====================================================================== -->
    <div id="confirm-overlay" class="hidden fixed inset-0 bg-black/40 z-[99999] flex items-center justify-center p-4">

            <div class="text-5xl mb-3">⚠️</div>
            <h3 id="confirm-title" class="text-lg font-bold text-gray-800 mb-1"></h3>
            <p id="confirm-message" class="text-sm text-gray-500 mb-5"></p>
            <div class="flex gap-3">
                <button onclick="confirmResolve(false)"
                    class="flex-1 py-2 rounded-xl font-bold border border-gray-300 text-gray-600 hover:bg-gray-50 transition">
                    Batal
                </button>
                <button onclick="confirmResolve(true)"
                    class="flex-1 py-2 rounded-xl font-bold text-white bg-red-500 hover:bg-red-600 transition">
                    Ya, Lanjutkan
                </button>

        </div>
    </div>

    <script>
        // =========================================================================
        // STATE GLOBAL
        // =========================================================================
        let currentUserRole = '';

        // =========================================================================
        // DRAFT AUTOSAVE (Form PO, Process PO, Process Inbound)
        // =========================================================================
        // Tujuan: kalau user belum sempat klik submit lalu tidak sengaja
        // refresh browser / tekan tombol back / pindah menu, isian yang sudah
        // diketik tidak hilang. Draft baru dibersihkan setelah submit berhasil.
        const DRAFT_KEYS = {
            formPO: 'draft_formPO',
            processPO: 'draft_processPO',
            processInbound: 'draft_processInbound'
        };

        function _saveDraft(key, data) {
            try { sessionStorage.setItem(key, JSON.stringify(data)); } catch (e) { /* storage penuh/disabled, abaikan */ }
        }

        function _loadDraft(key) {
            try {
                const raw = sessionStorage.getItem(key);
                return raw ? JSON.parse(raw) : null;
            } catch (e) { return null; }
        }

        function _clearDraft(key) {
            sessionStorage.removeItem(key);
        }

        function _clearAllDraftForms() {
            Object.values(DRAFT_KEYS).forEach(k => sessionStorage.removeItem(k));
        }

        // =========================================================================
        // KEAMANAN: Escape HTML untuk semua data dinamis (anti-XSS)
        // =========================================================================
        // Data dari sheet (Ship To, Alamat, Nama, dll) diisi manusia lewat form,
        // jadi WAJIB di-escape sebelum dimasukkan ke innerHTML. Tanpa ini, orang
        // bisa menyuntik <script> atau <img onerror=...> lewat Form PO biasa,
        // dan kode itu akan ikut tereksekusi di browser siapa pun yang membuka
        // halaman Route/Report. Selalu bungkus data dinamis dengan escapeHtml()
        // setiap kali ditaruh di dalam innerHTML template string.
        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // =========================================================================
        // LOGIN
        // =========================================================================
        // KEAMANAN: Password TIDAK LAGI dicek di browser (sebelumnya 'admin123' dkk
        // ada tertulis langsung di kode ini — siapa pun bisa baca lewat View Source
        // atau ketik currentUserRole='ADMIN' di Console dan langsung dapat akses
        // penuh tanpa password). Sekarang password dikirim ke Apps Script, yang
        // memvalidasi di server dan membalas sessionToken + role. Token inilah
        // yang dikirim di setiap request berikutnya, dan backend WAJIB memeriksa
        // token tsb sebelum mengizinkan aksi tulis (lihat checkAccess() di GAS).
        let sessionToken = null;

        async function checkLogin() {
            const passInput = document.getElementById('passwordInput');
            const pass = passInput.value;
            const error = document.getElementById('loginError');
            const loginBtn = document.getElementById('loginBtn');

            if (!pass) return;

            if (loginBtn) { loginBtn.disabled = true; loginBtn.textContent = 'Memeriksa...'; }
            error.classList.add('hidden');

            try {
                const res = await fetch(PO_GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'login', password: pass })
                });
                const data = await res.json();

                if (data && data.success && data.token && data.role) {
                    currentUserRole = data.role;
                    sessionToken = data.token;
                    // Token & role disimpan per-tab (sessionStorage), hilang otomatis
                    // saat tab/browser ditutup — tidak permanen seperti localStorage.
                    sessionStorage.setItem('currentUserRole', currentUserRole);
                    sessionStorage.setItem('sessionToken', sessionToken);
                    passInput.value = '';
                    startApp();
                } else {
                    error.textContent = (data && data.message) ? data.message : 'Password Salah!';
                    error.classList.remove('hidden');
                }
            } catch (e) {
                error.textContent = 'Gagal terhubung ke server. Cek koneksi internet Anda.';
                error.classList.remove('hidden');
            } finally {
                if (loginBtn) { loginBtn.disabled = false; loginBtn.textContent = 'Masuk'; }
            }
        }

        /** Tampilkan app sesuai role setelah login berhasil */
        function startApp() {
            document.getElementById('login-page').classList.add('hidden');

            const app = document.getElementById('app-container');
            app.classList.remove('hidden');
            app.classList.add('flex');

            // Update label role di sidebar footer dan topbar badge
            const roleLabel = document.getElementById('user-role-label');
            const roleBadge = document.getElementById('user-role-badge');
            if (currentUserRole === 'ADMIN') {
                if (roleLabel) roleLabel.textContent = 'Administrator';
                if (roleBadge) { roleBadge.textContent = 'Admin'; roleBadge.classList.remove('hidden'); }
            } else if (currentUserRole === 'WAREHOUSE') {
                if (roleLabel) roleLabel.textContent = 'Team Warehouse';
                if (roleBadge) { roleBadge.textContent = 'Warehouse'; roleBadge.classList.remove('hidden'); }
            } else if (currentUserRole === 'DRIVER') {
                if (roleLabel) roleLabel.textContent = 'Team Delivery (Driver)';
                if (roleBadge) { roleBadge.textContent = 'Driver'; roleBadge.classList.remove('hidden'); }
            } else {
                if (roleLabel) roleLabel.textContent = 'PO User';
                if (roleBadge) { roleBadge.textContent = 'PO User'; roleBadge.classList.remove('hidden'); }
            }

            // Sidebar di desktop: tampil default terbuka
            if (window.innerWidth >= 768) {
                document.getElementById('sidebar').classList.remove('-translate-x-full');
                sidebarOpen = false; // di desktop tidak pakai overlay
            }

            if (currentUserRole === 'PO_User') {
                // Staff: hanya bisa akses Purchase Order, Process PO TERSEMBUNYI
                document.getElementById('menu-inventory').classList.add('hidden');
                document.getElementById('menu-plan-task').classList.add('hidden');
                document.getElementById('menu-maintenance').classList.add('hidden');
                document.getElementById('menu-process-po').classList.add('hidden');
                document.getElementById('menu-process-inbound').classList.add('hidden');
                document.getElementById('menu-team-delivery').classList.add('hidden');
                // Buka PO submenu otomatis
                document.getElementById('po-sub').classList.remove('hidden');
                document.getElementById('arrow-po').textContent = '▲';
                navTo(_getRestorePage('Purchase Order'));

                // Tampilkan tombol notifikasi & load data Ready To Ship
                const bellBtn = document.getElementById('notif-bell-btn');
                if (bellBtn) bellBtn.classList.remove('hidden');
                loadNotifReadyToShip();
            } else if (currentUserRole === 'WAREHOUSE') {
                // Team Warehouse: hanya tampilkan menu Process PO
                document.getElementById('menu-inventory').classList.add('hidden');
                document.getElementById('menu-plan-task').classList.add('hidden');
                document.getElementById('menu-maintenance').classList.add('hidden');
                document.getElementById('menu-po').classList.add('hidden');
                document.getElementById('menu-process-po').classList.remove('hidden');
                document.getElementById('menu-process-inbound').classList.remove('hidden');
                document.getElementById('menu-team-delivery').classList.add('hidden');
                navTo(_getRestorePage('Process PO'));

                // Tampilkan tombol notifikasi & load data Open
                const bellBtn2 = document.getElementById('notif-bell-btn');
                if (bellBtn2) bellBtn2.classList.remove('hidden');
                loadNotifReadyToShip();
            } else if (currentUserRole === 'DRIVER') {
                // Team Delivery (Driver): hanya tampilkan menu Team Delivery
                document.getElementById('menu-inventory').classList.add('hidden');
                document.getElementById('menu-plan-task').classList.add('hidden');
                document.getElementById('menu-maintenance').classList.add('hidden');
                document.getElementById('menu-po').classList.add('hidden');
                document.getElementById('menu-process-po').classList.add('hidden');
                document.getElementById('menu-process-inbound').classList.add('hidden');
                document.getElementById('menu-team-delivery').classList.remove('hidden');
                // Buka submenu Team Delivery otomatis
                document.getElementById('team-delivery-sub').classList.remove('hidden');
                document.getElementById('arrow-team-delivery').textContent = '▲';
                navTo(_getRestorePage('Route'));
            } else {
                // ADMIN: semua menu tampil termasuk Process PO & Team Delivery
                document.getElementById('menu-process-po').classList.remove('hidden');
                document.getElementById('menu-process-inbound').classList.remove('hidden');
                document.getElementById('menu-team-delivery').classList.remove('hidden');
                navTo(_getRestorePage('Dashboard'));
            }
        }

        /**
         * Tentukan halaman mana yang harus dibuka saat startApp() dipanggil:
         * - Jika ada halaman tersimpan dari sesi sebelumnya (refresh) DAN halaman itu
         *   valid untuk role saat ini → pakai halaman tersimpan.
         * - Jika tidak ada → pakai halaman default sesuai role.
         */
        function _getRestorePage(defaultPage) {
            const saved = sessionStorage.getItem('currentPage');
            if (!saved) return defaultPage;

            // Validasi: halaman tersimpan harus sesuai hak akses role saat ini,
            // supaya tidak nyasar ke menu yang sebenarnya terkunci untuk role ini.
            if ((saved === 'Process PO' || saved === 'Process Inbound') && currentUserRole === 'PO_User') {
                return defaultPage;
            }
            if ((saved === 'Route' || saved === 'Report Finish') &&
                !(currentUserRole === 'ADMIN' || currentUserRole === 'DRIVER')) {
                return defaultPage;
            }
            return saved;
        }

        /** Logout: reset state dan kembali ke halaman login */
        function logout() {
            if (!confirm('Yakin ingin logout?')) return;

            // Reset role & token
            currentUserRole = '';
            sessionToken = null;

            // Hapus sesi tersimpan (role, token, halaman aktif, draft form) agar
            // logout benar-benar membersihkan dan kembali ke login.
            sessionStorage.removeItem('currentUserRole');
            sessionStorage.removeItem('sessionToken');
            sessionStorage.removeItem('currentPage');
            _clearAllDraftForms();

            // Reset form password
            document.getElementById('passwordInput').value = '';
            document.getElementById('loginError').classList.add('hidden');

            // Sembunyikan app, tampilkan login
            const app = document.getElementById('app-container');
            app.classList.add('hidden');
            app.classList.remove('flex');
            document.getElementById('login-page').classList.remove('hidden');

            // Reset visibilitas menu
            document.getElementById('menu-inventory').classList.remove('hidden');
            document.getElementById('menu-plan-task').classList.remove('hidden');
            document.getElementById('menu-maintenance').classList.remove('hidden');
            document.getElementById('menu-po').classList.remove('hidden');
            document.getElementById('menu-process-po').classList.remove('hidden');
            document.getElementById('menu-process-inbound').classList.remove('hidden');
            document.getElementById('menu-team-delivery').classList.remove('hidden');

            // Reset badge dan label role
            const roleBadge = document.getElementById('user-role-badge');
            if (roleBadge) roleBadge.classList.add('hidden');
            document.getElementById('page-title').textContent = 'Dashboard';

            // Sembunyikan notifikasi bell & popup
            const bellBtn = document.getElementById('notif-bell-btn');

            document.getElementById('content-area').innerHTML =

        }

        // =========================================================================

        /** Tampilkan/sembunyikan popup notifikasi */
        function toggleNotifPopup() {
            const popup = document.getElementById('notif-popup');
            if (!popup) return;
            const willShow = popup.classList.contains('hidden');
            if (willShow) {
                popup.classList.remove('hidden');
                loadNotifReadyToShip();
                // Tutup popup jika klik di luar
                setTimeout(() => {
                    document.addEventListener('click', closeNotifPopupOutside);
                }, 0);
            } else {
                popup.classList.add('hidden');
                document.removeEventListener('click', closeNotifPopupOutside);
            }
        }

        /** Handler untuk menutup popup notifikasi saat klik di luar area */
        function closeNotifPopupOutside(e) {
            const popup = document.getElementById('notif-popup');
            const bellBtn = document.getElementById('notif-bell-btn');
            if (!popup || !bellBtn) return;
            if (!popup.contains(e.target) && !bellBtn.contains(e.target)) {
                popup.classList.add('hidden');
                document.removeEventListener('click', closeNotifPopupOutside);
            }
        }

        /** Ambil data PO sesuai status target role lalu tampilkan di popup notifikasi */
        async function loadNotifReadyToShip() {
            const contentEl = document.getElementById('notif-popup-content');
            const dotEl = document.getElementById('notif-bell-dot');
            const titleEl = document.getElementById('notif-popup-title');
            if (!contentEl) return;

            // Tentukan status target & label sesuai role
            const targetStatus = currentUserRole === 'WAREHOUSE' ? 'Open' : 'Ready To Ship';
            const badgeClass = currentUserRole === 'WAREHOUSE'
                ? 'bg-red-100 text-red-700'
                : 'bg-blue-100 text-blue-700';
            if (titleEl) titleEl.textContent = `PO ${targetStatus}`;

            try {
                let data = [];
                try {
                    const res1 = await fetch(API_URLS.reportStatus + '?action=getPOData');
                    const raw1 = await res1.json();
                    data = Array.isArray(raw1) ? raw1 : [];
                } catch (_) { }

                if (data.length === 0) {
                    const res2 = await fetch(API_URLS.reportStatus);
                    const raw2 = await res2.json();
                    data = Array.isArray(raw2) ? raw2 : [];
                }

                const filteredRows = data.slice(1).filter(row => {
                    const noPO = String(row[1] || '').trim();
                    const statusRaw = row[4] ? row[4].toString().trim() : '';
                    if (noPO === '') return false;
                    if (targetStatus === 'Open') {
                        // Anggap PO "Open" jika status kosong atau bukan Ready To Ship/Done/Closed
                        return statusRaw !== 'Ready To Ship' && statusRaw !== 'Done' && statusRaw !== 'Closed';
                    }
                    return statusRaw === targetStatus;
                });

                if (dotEl) {
                    if (filteredRows.length > 0) dotEl.classList.remove('hidden');
                    else dotEl.classList.add('hidden');
                }

                if (filteredRows.length === 0) {
                    contentEl.innerHTML = `<div class="p-3 text-sm text-gray-400 text-center">Tidak ada PO ${targetStatus}.</div>`;
                    return;
                }

                contentEl.innerHTML = filteredRows.map(row => {
                    const noPO = row[1] || '-';
                    const nama = row[2] || '-';
                    return `
                    <div class="p-3 hover:bg-blue-50 transition">
                        <p class="text-sm font-semibold text-gray-700 font-mono">${noPO}</p>
                        <p class="text-xs text-gray-500">${nama}</p>
                        <span class="inline-block mt-1 px-2 py-0.5 rounded-full text-[10px] font-bold ${badgeClass}">${targetStatus}</span>
                    </div>`;
                }).join('');
            } catch (err) {
                contentEl.innerHTML = `<div class="p-3 text-sm text-red-400 text-center">Gagal memuat notifikasi.</div>`;
            }
        }

        /**
         * Mengembalikan jam WIB format "HH:MM" yang aman lintas browser/environment.
         * Menghindari bug toLocaleTimeString yang kadang return tanggal di beberapa engine.
         */
        function getJamWIB() {
            const now = new Date();
            // Offset WIB = UTC+7
            const wibMs  = now.getTime() + (7 * 60 * 60 * 1000);
            const wibDate = new Date(wibMs);
            const hh = String(wibDate.getUTCHours()).padStart(2, '0');
            const mm = String(wibDate.getUTCMinutes()).padStart(2, '0');
            return `${hh}:${mm}`;
        }

        /**
         * Mengembalikan tanggal hari ini format "DD/MM/YYYY" (WIB).
         */
        function getTanggalWIB() {
            const now     = new Date();
            const wibMs   = now.getTime() + (7 * 60 * 60 * 1000);
            const wibDate = new Date(wibMs);
            const dd   = String(wibDate.getUTCDate()).padStart(2, '0');
            const mm   = String(wibDate.getUTCMonth() + 1).padStart(2, '0');
            const yyyy = wibDate.getUTCFullYear();
            return `${dd}/${mm}/${yyyy}`;
        }

                    class="flex items-center gap-2 px-4 py-2 bg-amber-50 hover:bg-amber-100 text-amber-700 text-xs font-semibold rounded-lg border border-amber-200 transition">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    Refresh
                </button>
            </div>
            <div id="route-card-area">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    ${[1,2,3].map(() => `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 animate-pulse">
                        <div class="h-4 bg-gray-200 rounded w-3/4 mb-3"></div>
                        <div class="h-3 bg-gray-100 rounded w-1/2 mb-2"></div>
                        <div class="h-3 bg-gray-100 rounded w-2/3 mb-4"></div>
                        <div class="flex gap-2 mt-4">
                            <div class="h-9 bg-gray-200 rounded-lg flex-1"></div>
                            <div class="h-9 bg-gray-200 rounded-lg w-10"></div>
                        </div>
                    </div>`).join('')}
                </div>
            </div>`;

            // ── Ambil data dari sheet "Plan Driver" via GAS ──
            // Backend sudah mengelompokkan & mengurutkan rute per Driver
            // (Gold = rute pertama, lalu Zona_Area terdekat / nearest-neighbor).
            try {
                const res = await fetch(DELIVERY_GAS_URL + '?action=getPlanDriver');
                const raw = await res.json();

                // raw = array of rows (dengan header di index 0)
                // Kolom yang dikembalikan GAS dari sheet "Plan Driver":
                // [0]=No.PO  [1]=Ship To  [2]=Alamat  [3]=Zona  [4]=SLA_Status  [5]=Status
                // [6]=OrderedBy  [7]=Phone  [8]=ShippingDate  [9]=Driver/PIC  [10]=Maps URL
                // [11]=Zona_Area  [12]=Skor_Prioritas  [13]=RouteOrder (urutan rute dalam driver itu)
                const rows = Array.isArray(raw) ? raw : (raw.data || []);
                if (raw && raw.error) throw new Error(raw.error);
                const header = rows[0] || [];
                const dataRows = rows.slice(1);

                // Hanya tampilkan yang statusnya "Ready To Ship" atau "On-Delivery"
                const activeRows = dataRows.filter(r => {
                    const st = String(r[5] || '').trim();
                    return st === 'Ready To Ship' || st === 'On-Delivery';
                });

                const cardArea = document.getElementById('route-card-area');

                if (activeRows.length === 0) {
                    cardArea.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-center">
                        <svg class="h-16 w-16 text-gray-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10l2.5 1.5M13 16H4m9 0l2.5 1.5M13 16V9h3l3 3v4h-3"/>
                        </svg>
                        <p class="text-lg font-semibold text-gray-400">Tidak ada pengiriman aktif</p>
                        <p class="text-sm text-gray-400 mt-1">Semua PO sudah selesai atau belum ada yang siap dikirim.</p>
                    </div>`;
                    return;
                }

                // ── Kelompokkan baris per Driver (kolom [9]) sambil menjaga urutan
                //    rute yang sudah dihitung backend (RouteOrder di kolom [13]). ──
                const groups = {};       // { driverName: [row, row, ...] }
                const groupOrder = [];   // urutan driver pertama kali muncul
                const noDriverRows = [];

                activeRows.forEach(r => {
                    const driverName = String(r[9] || '').trim();
                    if (!driverName) { noDriverRows.push(r); return; }
                    if (!groups[driverName]) { groups[driverName] = []; groupOrder.push(driverName); }
                    groups[driverName].push(r);
                });

                // Pastikan tiap grup terurut sesuai RouteOrder (index [13]) — backend
                // sudah mengurutkan, ini hanya jaga-jaga kalau urutan berubah saat fetch.
                groupOrder.forEach(name => {
                    groups[name].sort((a, b) => (Number(a[13]) || 0) - (Number(b[13]) || 0));
                });

                // Render: 1 section per Driver (judul + urutan rute bernomor),
                // lalu section terakhir untuk PO yang belum di-assign driver.
                let globalIdx = 0;
                let html = '';

                groupOrder.forEach(driverName => {
                    const rowsForDriver = groups[driverName];
                    html += `
                    <div class="mb-6">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="flex items-center justify-center w-8 h-8 rounded-full bg-amber-100 text-amber-700 font-bold text-sm">
                                ${escapeHtml(driverName.charAt(0).toUpperCase())}
                            </span>
                            <h2 class="text-base font-bold text-gray-700">${escapeHtml(driverName)}</h2>
                            <span class="text-xs text-gray-400">(${rowsForDriver.length} rute, urut terdekat)</span>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                            ${rowsForDriver.map(r => {
                                const card = _buildRouteCard(r, globalIdx);
                                globalIdx++;
                                return card;
                            }).join('')}
                        </div>
                    </div>`;
                });

                if (noDriverRows.length > 0) {
                    html += `
                    <div class="mb-6">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-100 text-gray-500 font-bold text-sm">?</span>
                            <h2 class="text-base font-bold text-gray-500">Belum Ada Driver</h2>
                            <span class="text-xs text-gray-400">(${noDriverRows.length} PO)</span>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                            ${noDriverRows.map(r => {
                                const card = _buildRouteCard(r, globalIdx);
                                globalIdx++;
                                return card;
                            }).join('')}
                        </div>
                    </div>`;
                }

                cardArea.innerHTML = `<div id="route-cards-grid">${html}</div>`;

            } catch (err) {
                document.getElementById('route-card-area').innerHTML = `
                <div class="bg-red-50 border border-red-200 rounded-2xl p-6 text-center">
                    <p class="text-red-600 font-semibold mb-1">❌ Gagal memuat data Route</p>
                    <p class="text-xs text-red-400">${err.message}</p>
                    <p class="text-xs text-gray-500 mt-2">Pastikan GAS sudah mendukung <code>action=getPlanDriver</code> dan sheet "Plan Driver" tersedia.</p>
                </div>`;
            }
        }

        /**
         * Bangun HTML satu card PO untuk halaman Route.
         * r = array row dari GAS (baca PO_Data):
         *   [0]=No.PO   [1]=Ship To    [2]=Alamat      [3]=Zona       [4]=SLA_Status
         *   [5]=Status  [6]=OrderedBy  [7]=Phone       [8]=ShippingDate  [9]=Driver/PIC  [10]=Maps URL
         */
        /**
         * Normalisasi nomor telepon Indonesia ke format internasional tanpa
         * simbol (mis. 081234567890 → 6281234567890) agar valid dipakai
         * di link wa.me / api.whatsapp.com.
         */
        function _normalizePhoneForWA(phone) {
            let digits = String(phone || '').replace(/[^\d]/g, '');
            if (!digits) return '';
            if (digits.startsWith('0')) digits = '62' + digits.slice(1);
            else if (digits.startsWith('62')) { /* sudah benar */ }
            else if (digits.startsWith('8')) digits = '62' + digits;
            return digits;
        }

        /**
         * Bangun tombol kecil "Message" (WhatsApp chat) & "Call" (WhatsApp call)
         * yang tampil di samping nomor telepon pada card Route.
         * - Message → buka wa.me dengan teks template siap kirim.
         * - Call    → buka api.whatsapp.com dengan parameter call=true,
         *             yang otomatis mengarahkan WhatsApp untuk memulai panggilan.
         */
        function _buildWhatsAppButtons(phone, customerName) {
            const waNumber = _normalizePhoneForWA(phone);
            if (!waNumber) return '';

            const templateMsg = encodeURIComponent(
                `Halo${customerName ? ' ' + customerName : ''}, saya driver dari NOD Warehouse terkait pengiriman pesanan Anda.`
            );
            const waMessageUrl = `https://wa.me/${waNumber}?text=${templateMsg}`;
            const waCallUrl    = `https://api.whatsapp.com/send?phone=${waNumber}&call=true`;

            return `
                <a href="${waMessageUrl}" target="_blank" rel="noopener" title="Chat via WhatsApp"
                    class="flex-shrink-0 flex items-center justify-center w-7 h-7 bg-green-50 hover:bg-green-100 text-green-600 rounded-lg border border-green-200 transition">
                    <svg class="h-3.5 w-3.5" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.74.46 3.43 1.32 4.93L2.05 22l5.32-1.39a9.87 9.87 0 004.67 1.19h.01c5.46 0 9.9-4.45 9.9-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0012.04 2zm0 1.67c2.2 0 4.27.86 5.82 2.42a8.18 8.18 0 012.41 5.82c0 4.54-3.7 8.23-8.24 8.23a8.2 8.2 0 01-4.19-1.15l-.3-.18-3.16.83.84-3.08-.2-.32a8.18 8.18 0 01-1.26-4.37c0-4.54 3.7-8.2 8.28-8.2zm-4.5 4.66c-.16 0-.43.06-.65.31-.22.25-.86.84-.86 2.04 0 1.2.88 2.37 1 2.53.13.17 1.73 2.78 4.28 3.78 2.12.84 2.55.67 3.01.63.46-.04 1.49-.6 1.7-1.19.21-.58.21-1.08.15-1.19-.06-.1-.23-.17-.48-.29-.25-.13-1.49-.74-1.72-.82-.23-.08-.4-.13-.57.13-.17.25-.65.82-.8.99-.15.17-.29.19-.55.06-.25-.13-1.07-.4-2.03-1.26-.75-.67-1.26-1.5-1.4-1.76-.15-.25-.02-.39.11-.51.11-.11.25-.29.37-.43.12-.15.16-.25.25-.42.08-.17.04-.31-.02-.44-.06-.13-.57-1.41-.79-1.93-.2-.5-.42-.43-.57-.44-.15-.01-.32-.01-.48-.01z"/>
                    </svg>
                </a>
                <a href="${waCallUrl}" target="_blank" rel="noopener" title="Call via WhatsApp"
                    class="flex-shrink-0 flex items-center justify-center w-7 h-7 bg-emerald-50 hover:bg-emerald-100 text-emerald-600 rounded-lg border border-emerald-200 transition">
                    <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                    </svg>
                </a>`;
        }

        // ── State: track apakah ada card yang sedang On-Delivery di session ini ──
        // Key: driverName, Value: idx yang sedang On-Delivery (-1 = belum ada)
        const _routeActiveDelivery = {}; // { driverName: idx | null }

        function _lockOtherStartButtons(driverName, activeIdx) {
            // Kunci semua tombol Start milik driver yang sama (kecuali card yang baru di-Start)
            document.querySelectorAll('[data-driver-group]').forEach(btn => {
                if (btn.dataset.driverGroup === driverName && btn.dataset.cardIdx !== String(activeIdx)) {
                    btn.disabled = true;
                    btn.title = 'Selesaikan pengiriman aktif dulu sebelum Start rute lain';
                    btn.classList.add('opacity-40', 'cursor-not-allowed');
                    btn.classList.remove('hover:bg-amber-600', 'active:bg-amber-700');
                }
            });
        }

        function _unlockAllStartButtons(driverName) {
            document.querySelectorAll('[data-driver-group]').forEach(btn => {
                if (btn.dataset.driverGroup === driverName) {
                    btn.disabled = false;
                    btn.title = '';
                    btn.classList.remove('opacity-40', 'cursor-not-allowed');
                    btn.classList.add('hover:bg-amber-600', 'active:bg-amber-700');
                }
            });
        }

        function _buildRouteCard(r, idx) {
            const noPO         = String(r[0]  || '').trim();
            const customer     = String(r[1]  || '').trim();
            const alamat       = String(r[2]  || '').trim();
            // r[3]=Zona & r[4]=SLA_Status — tidak ditampilkan di card
            const status       = String(r[5]  || '').trim();
            const orderedBy    = String(r[6]  || '').trim();
            const phone        = String(r[7]  || '').trim();
            const shippingDate = String(r[8]  || '').trim();
            const driver       = String(r[9]  || '').trim();
            const mapsUrl      = String(r[10] || '').trim();
            const skorPrioritas = String(r[12] || '').trim();
            const routeOrder    = Number(r[13]) || 0;

            // KEAMANAN: versi ter-escape khusus untuk ditampilkan sebagai teks/HTML.
            // customer & alamat diisi manusia lewat Form PO, jadi rawan disusupi
            // tag <script>/<img onerror> kalau langsung ditaruh di innerHTML.
            const customerSafe = escapeHtml(customer);
            const alamatSafe   = escapeHtml(alamat);
            const driverSafe   = escapeHtml(driver);

            const isOnDelivery = status === 'On-Delivery';

            // Jika card ini On-Delivery, tandai sebagai aktif untuk drivernya
            if (isOnDelivery && driver) {
                _routeActiveDelivery[driver] = idx;
            }

            // Badge nomor urut rute
            const routeOrderBadge = routeOrder > 0
                ? `<span class="flex-shrink-0 inline-flex items-center justify-center w-7 h-7 rounded-full bg-gray-800 text-white text-sm font-bold shadow-sm" title="Urutan rute ke-${routeOrder}">${routeOrder}</span>`
                : '';

            // Badge Skor_Prioritas (Gold / Silver)
            const prioritasLower = skorPrioritas.toLowerCase();
            const prioritasBadgeClass = prioritasLower === 'gold'
                ? 'bg-yellow-100 text-yellow-700 border border-yellow-300'
                : prioritasLower === 'silver'
                    ? 'bg-gray-100 text-gray-600 border border-gray-300'
                    : '';
            const prioritasBadge = skorPrioritas
                ? `<span class="flex-shrink-0 inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-bold ${prioritasBadgeClass}">${skorPrioritas === 'Gold' ? '🥇' : skorPrioritas === 'Silver' ? '🥈' : ''} ${skorPrioritas}</span>`
                : '';

            // Status badge
            const statusBadgeClass = isOnDelivery ? 'bg-blue-100 text-blue-700' : 'bg-amber-100 text-amber-700';
            const statusLabel      = isOnDelivery ? '🚚 On-Delivery' : 'Ready To Ship';

            // Encode data lengkap ke atribut data-*
            const dataAttrs = `
                data-no-po="${noPO}"
                data-ordered-by="${orderedBy.replace(/"/g,'&quot;')}"
                data-ship-to="${customer.replace(/"/g,'&quot;')}"
                data-alamat="${alamat.replace(/"/g,'&quot;')}"
                data-phone="${phone}"
                data-shipping-date="${shippingDate}"
                data-driver="${driver.replace(/"/g,'&quot;')}"`;

            // Cek apakah driver ini sudah ada yang On-Delivery (di-load dari data)
            const driverHasActive = isOnDelivery ? false : (driver && _routeActiveDelivery[driver] != null);
            const startBtnLocked  = driverHasActive;

            // Tombol Cancel
            // Tombol Google Maps — ikon kotak kecil di pojok kanan bawah
            const mapsBtnHtml = (mapsUrl || alamat)
                ? `<a href="${mapsUrl || 'https://maps.google.com/?q=' + encodeURIComponent(alamat)}" target="_blank" rel="noopener"
                        class="flex-shrink-0 flex items-center justify-center w-10 h-10 bg-blue-50 hover:bg-blue-100 active:bg-blue-200 text-blue-600 rounded-xl border border-blue-200 transition" title="Buka Google Maps">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                   </a>`
                : '';

            // Baris tombol aksi: [Start/Delivered flex-1] [Cancel flex-1] [Maps 40px]
            // Semua tombol tinggi seragam h-10 (40px), teks+ikon pas untuk mobile
            const actionBtn = isOnDelivery
                ? `
                <button onclick="routeMarkDelivered('${noPO}', ${idx})"
                    id="route-btn-${idx}"
                    class="flex-1 min-w-0 flex items-center justify-center gap-1.5 h-10 px-3 bg-green-600 hover:bg-green-700 active:bg-green-800 text-white text-sm font-bold rounded-xl shadow-sm transition">
                    <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                    </svg>
                    <span>Delivered</span>
                </button>
                <button onclick="routeCancelDelivery('${noPO}', ${idx})"
                    id="route-cancel-btn-${idx}"
                    class="flex-1 min-w-0 flex items-center justify-center gap-1.5 h-10 px-3 bg-red-50 hover:bg-red-100 active:bg-red-200 text-red-600 text-sm font-semibold rounded-xl border border-red-200 transition">
                    <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                    <span>Cancel</span>
                </button>
                ${mapsBtnHtml}`
                : `
                <button onclick="routeStartDelivery('${noPO}', ${idx})"
                    id="route-btn-${idx}"
                    data-driver-group="${driver}"
                    data-card-idx="${idx}"
                    ${startBtnLocked ? 'disabled title="Selesaikan pengiriman aktif dulu sebelum Start rute lain"' : ''}
                    class="flex-1 min-w-0 flex items-center justify-center gap-1.5 h-10 px-3 bg-amber-500 text-white text-sm font-bold rounded-xl shadow-sm transition
                        ${startBtnLocked ? 'opacity-40 cursor-not-allowed' : 'hover:bg-amber-600 active:bg-amber-700'}">
                    <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span>Start</span>
                </button>
                <button onclick="routeCancelDelivery('${noPO}', ${idx})"
                    id="route-cancel-btn-${idx}"
                    class="flex-1 min-w-0 flex items-center justify-center gap-1.5 h-10 px-3 bg-red-50 hover:bg-red-100 active:bg-red-200 text-red-600 text-sm font-semibold rounded-xl border border-red-200 transition">
                    <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                    <span>Cancel</span>
                </button>
                ${mapsBtnHtml}`;

            // Warna border card berdasarkan status
            const cardBorder = isOnDelivery
                ? 'border-blue-200 bg-blue-50/30'
                : 'border-gray-100 bg-white';

            return `
            <div class="rounded-2xl shadow-sm border ${cardBorder} p-4 flex flex-col gap-3 hover:shadow-md transition-shadow" id="route-card-${idx}" ${dataAttrs}>

                <!-- Header: nomor urut + nama customer + badge status & prioritas -->
                <div class="flex items-start gap-3">
                    ${routeOrderBadge}
                    <div class="flex-1 min-w-0">
                        <div class="flex items-start justify-between gap-2">
                            <p class="text-[15px] font-bold text-gray-800 leading-tight break-words" title="${customerSafe}">${customerSafe || '-'}</p>
                            <div class="flex flex-col items-end gap-1 flex-shrink-0 ml-1">
                                <span class="inline-block px-2 py-0.5 rounded-full text-[11px] font-bold whitespace-nowrap ${statusBadgeClass}" id="route-status-badge-${idx}">${statusLabel}</span>
                                ${prioritasBadge}
                            </div>
                        </div>
                        <p class="text-xs text-gray-400 mt-1 leading-relaxed break-words line-clamp-2" title="${alamatSafe}">${alamatSafe || '-'}</p>
                    </div>
                </div>

                <!-- Divider -->
                <div class="border-t border-gray-100"></div>

                <!-- Info PO -->
                <div class="flex flex-col gap-2 text-xs">
                    <!-- No. PO -->
                    <div class="flex items-center justify-between gap-2">
                        <span class="text-gray-400 font-medium flex-shrink-0">No. PO</span>
                        <span class="text-gray-800 font-bold font-mono text-right break-all">${noPO || '-'}</span>
                    </div>
                    <!-- Shipping Date -->
                    <div class="flex items-center gap-1.5">
                        <svg class="h-3.5 w-3.5 text-gray-300 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        <span class="text-gray-600">${shippingDate || '-'}</span>
                    </div>
                    <!-- Phone + WA buttons -->
                    <div class="flex items-center justify-between gap-2">
                        <div class="flex items-center gap-1.5 min-w-0">
                            <svg class="h-3.5 w-3.5 text-gray-300 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                            </svg>
                            <span class="text-gray-600">${phone || '-'}</span>
                        </div>
                        <div class="flex items-center gap-1.5 flex-shrink-0">
                            ${_buildWhatsAppButtons(phone, customer)}
                        </div>
                    </div>
                    <!-- Driver / PIC -->
                    ${driver ? `<div class="flex items-center gap-1.5">
                        <svg class="h-3.5 w-3.5 text-gray-300 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">

        // =========================================================================
        // SCAN QR VIA KAMERA — unified untuk Route & Inbound
        // =========================================================================
        let _html5QrCode = null;
        let _qrFacingBack = true;
        let _qrCallback = null;   // callback(decodedText) — null = pakai _handleQRResult (Route)
        let _qrCameraList = [];   // daftar kamera yang tersedia
        let _qrCameraIndex = -1; // indeks kamera yang sedang aktif (-1 = belum tahu)

        /** Deteksi apakah device adalah iOS (iPhone / iPad) */
        function _isIOS() {
            return /iphone|ipad|ipod/i.test(navigator.userAgent) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        }

        async function startQRCamera(forceBack, callback) {
            if (typeof forceBack === 'boolean') _qrFacingBack = forceBack;
            _qrCallback = (typeof callback === 'function') ? callback : null;

            const modal = document.getElementById('qr-camera-modal');
            const camStat = document.getElementById('qr-cam-status');
            const switchBtn = document.getElementById('qr-switch-btn');
            if (!modal) { alert('Refresh halaman terlebih dahulu.'); return; }

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            const setStatus = (html) => {
                if (camStat) camStat.innerHTML =
                    `<span style="background:rgba(0,0,0,0.65);color:#fff;font-size:12px;padding:6px 14px;border-radius:999px;">${html}</span>`;
            };

            setStatus('⏳ Membuka kamera...');

            // Hentikan instance sebelumnya jika ada
            if (_html5QrCode) {
                try { await _html5QrCode.stop(); } catch (_) { }
                try { _html5QrCode.clear(); } catch (_) { }
                _html5QrCode = null;
            }

            if (typeof Html5Qrcode === 'undefined') {
                setStatus('❌ Library QR Code gagal dimuat. Periksa koneksi internet.');
                return;
            }

            _html5QrCode = new Html5Qrcode('qr-reader');

            const config = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1 };

            const onScanSuccess = (decodedText) => {
                setStatus('✅ QR terbaca!');
                const decoded = decodedText.trim();
                const cb = _qrCallback;
                stopQRCamera();
                if (cb) {
                    cb(decoded);
                } else {
                    _handleQRResult(decoded);
                }
            };
            const onScanError = () => { /* abaikan error 'not found' per-frame */ };

            /**
             * Strategi buka kamera:
             * 1. Ambil daftar kamera dengan getCameras().
             * 2. Di iOS, gunakan deviceId kamera belakang (label mengandung "back" / "rear" /
             *    posisi terakhir dalam daftar), karena facingMode: 'environment' sering gagal.
             * 3. Di Android / Desktop, gunakan facingMode seperti biasa sebagai fallback jika
             *    tidak ada deviceId yang cocok.
             */
            try {
                // Dapatkan daftar kamera
                let cams = [];
                try { cams = await Html5Qrcode.getCameras(); } catch (_) { }
                _qrCameraList = cams || [];

                // Tampilkan/sembunyikan tombol switch
                if (switchBtn) {
                    switchBtn.classList.toggle('hidden', _qrCameraList.length <= 1);
                }

                let cameraArg;

                if (_qrCameraList.length > 0) {
                    // Tentukan indeks kamera yang akan dipakai
                    if (_qrCameraIndex < 0 || _qrCameraIndex >= _qrCameraList.length) {
                        // Pertama kali: cari kamera belakang berdasarkan label
                        const backIdx = _qrCameraList.findIndex(c =>
                            /back|rear|environment|belakang/i.test(c.label || '')
                        );
                        if (backIdx >= 0 && _qrFacingBack) {
                            _qrCameraIndex = backIdx;
                        } else if (!_qrFacingBack) {
                            // Cari kamera depan
                            const frontIdx = _qrCameraList.findIndex(c =>
                                /front|face|user|depan/i.test(c.label || '')
                            );
                            _qrCameraIndex = frontIdx >= 0 ? frontIdx : 0;
                        } else {
                            // Tidak ada label yang cocok — di iOS kamera belakang biasanya
                            // ada di indeks terakhir; di Android biasanya indeks 0
                            _qrCameraIndex = _isIOS()
                                ? _qrCameraList.length - 1  // iOS: kamera belakang = terakhir
                                : 0;
                        }
                    }
                    cameraArg = { deviceId: { exact: _qrCameraList[_qrCameraIndex].id } };
                } else {
                    // Tidak berhasil mendapatkan daftar kamera — fallback ke facingMode
                    // (bekerja di sebagian besar Android; di iOS mungkin hanya kamera depan)
                    cameraArg = { facingMode: _qrFacingBack ? 'environment' : 'user' };
                }

                await _html5QrCode.start(cameraArg, config, onScanSuccess, onScanError);
                setStatus('📷 Arahkan ke QR Code...');

            } catch (err) {
                // ── Fallback 1: coba facingMode ──
                try {
                    const fallbackConfig = { facingMode: _qrFacingBack ? 'environment' : 'user' };
                    await _html5QrCode.start(fallbackConfig, config, onScanSuccess, onScanError);
                    setStatus('📷 Arahkan ke QR Code...');
                } catch (err2) {
                    // ── Fallback 2 (iOS khusus): coba kamera pertama yang tersedia ──
                    if (_qrCameraList.length > 0) {
                        try {
                            const firstCam = { deviceId: { exact: _qrCameraList[0].id } };
                            await _html5QrCode.start(firstCam, config, onScanSuccess, onScanError);
                            setStatus('📷 Arahkan ke QR Code...');
                        } catch (err3) {
                            setStatus('❌ ' + (err3 && err3.toString ? err3.toString() : 'Gagal membuka kamera.'));
                        }
                    } else {
                        setStatus('❌ ' + (err2 && err2.toString ? err2.toString() : 'Gagal membuka kamera.'));
                    }
                }
            }
        }

        function switchQRCamera() {
            // Geser ke kamera berikutnya dalam daftar (cycling)
            if (_qrCameraList.length > 1) {
                _qrCameraIndex = (_qrCameraIndex + 1) % _qrCameraList.length;
                // Tentukan apakah kamera baru ini adalah kamera belakang
                const label = (_qrCameraList[_qrCameraIndex].label || '').toLowerCase();
                _qrFacingBack = /back|rear|environment|belakang/i.test(label) ||
                    (!(/front|face|user|depan/i.test(label)) && _qrCameraIndex > 0);
            } else {
                _qrFacingBack = !_qrFacingBack;
                _qrCameraIndex = -1; // reset agar dipilih ulang oleh startQRCamera
            }
            startQRCamera(_qrFacingBack, _qrCallback);
        }

        function stopQRCamera() {
            const modal = document.getElementById('qr-camera-modal');
            if (_html5QrCode) {
                const inst = _html5QrCode;
                _html5QrCode = null;
                inst.stop().then(() => { try { inst.clear(); } catch (_) { } }).catch(() => { });
            }
            if (modal) modal.classList.add('hidden');
            document.body.style.overflow = '';
        }

        /**
         * Proses hasil teks QR Code dari Request Order NOD.
         * Format QR:
         *   === REQUEST ORDER ===
         *   No. PO: OT-15062026-1
         *   Tanggal: 14 Juni 2026
         *   Ordered By: Herfian Juliansyah
         *   Phone: 081212345678
         *   Kategori: Outlet
         *   Ship To: NOD Astha
         *   Alamat: Jl. Panjang Arteri ...
         *   Shipping Date: 16 Juni 2026
         */
        // =========================================================================
        // SCAN SUCCESS — Bunyi beep + pop-up toast
        // =========================================================================

        /** Bunyi beep sukses via Web Audio API (tidak perlu file audio eksternal) */
        function playScanBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const gain = ctx.createGain();
                gain.connect(ctx.destination);

                // Beep pertama — nada tinggi
                const o1 = ctx.createOscillator();
                o1.type = 'sine';
                o1.frequency.setValueAtTime(1046, ctx.currentTime);          // C6
                o1.frequency.setValueAtTime(1318, ctx.currentTime + 0.08);   // E6
                gain.gain.setValueAtTime(0.35, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
                o1.connect(gain);
                o1.start(ctx.currentTime);
                o1.stop(ctx.currentTime + 0.22);

                // Beep kedua — sedikit lebih tinggi (konfirmasi)
                const gain2 = ctx.createGain();
                gain2.connect(ctx.destination);
                const o2 = ctx.createOscillator();
                o2.type = 'sine';
                o2.frequency.setValueAtTime(1568, ctx.currentTime + 0.15);   // G6
                gain2.gain.setValueAtTime(0.25, ctx.currentTime + 0.15);
                gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.38);
                o2.connect(gain2);
                o2.start(ctx.currentTime + 0.15);
                o2.stop(ctx.currentTime + 0.38);

                setTimeout(() => ctx.close(), 600);
            } catch (_) { /* browser tidak mendukung Web Audio */ }
        }

        /**

        function _handleQRResult(raw) {
            const statusEl = document.getElementById('do-scan-status');

            // Parse baris per baris
            const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
            const get = (key) => {
                for (const ln of lines) {
                    const re = new RegExp('^' + key + '\\s*[:\\-]\\s*(.+)$', 'i');
                    const m = ln.match(re);
                    if (m) return m[1].trim();
                }
                return '';
            };

            const noPO = get('No\\.?\\s*PO');
            const orderedBy = get('Ordered By');
            const shipTo = get('Ship To');
            const alamat = get('Alamat');
            const phone = get('Phone').replace(/\s+/g, '');
            const shippingRaw = get('Shipping Date');
            const shippingDate = _parseShippingDateToInput(shippingRaw);

            // Isi form
            const set = (id, val) => { const el = document.getElementById(id); if (el && val) el.value = val; };
            set('do-no-po', noPO);
            set('do-ordered-by', orderedBy);
            set('do-ship-to', shipTo);
            set('do-alamat', alamat);
            set('do-phone', phone);
            set('do-shipping-date', shippingDate);

            const filled = [noPO, orderedBy, shipTo, alamat, shippingDate].filter(Boolean).length;
            if (filled > 0) {
                // ✅ Bunyi + pop-up sukses
                playScanBeep();
                showScanSuccessToast(
                    'QR Code Terbaca!',
                    `No. PO: <strong>${noPO || '-'}</strong><br>${shipTo || orderedBy || ''}`
                );
                if (statusEl) {
                    statusEl.textContent = `✅ QR berhasil — ${filled} field terisi otomatis.`;
                    statusEl.className = 'text-xs text-center text-green-600 mb-4 font-semibold';
                }
            } else {
                if (statusEl) {
                    statusEl.textContent = '⚠️ QR terbaca tapi tidak ada data yang cocok. Isi manual.';
                    statusEl.className = 'text-xs text-center text-orange-500 mb-4 italic';
                }
            }
        }

        /**
         * Konversi "16 Juni 2026" → "2026-06-16" untuk input type=date.
         * Juga menangani format dd/mm/yyyy dan yyyy-mm-dd.
         */
        function _parseShippingDateToInput(raw) {
            if (!raw) return '';
            const BULAN = {
                januari: 1, februari: 2, maret: 3, april: 4, mei: 5, juni: 6, juli: 7, agustus: 8, september: 9, oktober: 10, november: 11, desember: 12,
                january: 1, february: 2, march: 3, may: 5, june: 6, july: 7, august: 8, october: 10, december: 12
            };
            // "16 Juni 2026"
            const m1 = raw.match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/);
            if (m1) {
                const mon = BULAN[m1[2].toLowerCase()];
                if (mon) return `${m1[3]}-${String(mon).padStart(2, '0')}-${m1[1].padStart(2, '0')}`;
            }
            // "2026-06-16"
            if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
            // "16/06/2026" or "16-06-2026"
            const m2 = raw.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
            if (m2) return `${m2[3]}-${m2[2].padStart(2, '0')}-${m2[1].padStart(2, '0')}`;
            return '';
        }

        // ─── SCAN PDF Delivery Order / Request Order (koordinat-aware) ───────────
        async function scanDOPdf() {
            const fileInput = document.getElementById('do-pdf-file');
            const statusEl = document.getElementById('do-scan-status');
            if (!fileInput || !fileInput.files || !fileInput.files[0]) {
                showAlert('warning', 'File Belum Dipilih', 'Pilih file PDF Request Order terlebih dahulu.');
                return;
            }

            statusEl.textContent = '⏳ Membaca PDF...';
            statusEl.className = 'text-xs text-center text-amber-500 mb-4 italic';

            try {
                const file = fileInput.files[0];
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                // Kumpulkan semua token dengan posisi X,Y dari seluruh halaman
                const allTokens = [];   // { str, x, y }
                for (let p = 1; p <= pdf.numPages; p++) {
                    const page = await pdf.getPage(p);
                    const tc = await page.getTextContent();
                    const vp = page.getViewport({ scale: 1 });
                    for (const item of tc.items) {
                        if (!item.str || !item.str.trim()) continue;
                        allTokens.push({
                            str: item.str.trim(),
                            x: Math.round(item.transform[4]),
                            y: Math.round(vp.height - item.transform[5])  // flip Y → top-down
                        });
                    }
                }

                const parsed = parseDOFromTokens(allTokens);

                const setField = (id, val) => {
                    const el = document.getElementById(id);
                    if (el && val) el.value = val;
                };
                setField('do-no-po', parsed.noPO);
                setField('do-ordered-by', parsed.orderedBy);
                setField('do-ship-to', parsed.shipTo);
                setField('do-shipping-date', parsed.shippingDate);
                setField('do-alamat', parsed.alamat);
                setField('do-phone', parsed.phone);

                const filled = Object.values(parsed).filter(Boolean).length;
                statusEl.textContent = filled > 0
                    ? `✅ Berhasil membaca ${filled} field dari PDF.`
                    : '⚠️ Tidak ada data yang terbaca. Coba scan QR Code atau isi manual.';
                statusEl.className = filled > 0
                    ? 'text-xs text-center text-green-600 mb-4 font-semibold'
                    : 'text-xs text-center text-orange-500 mb-4 italic';

            } catch (err) {
                statusEl.textContent = '❌ Gagal membaca PDF: ' + err.message;
                statusEl.className = 'text-xs text-center text-red-500 mb-4';
            }
        }

        /**
         * Parser utama berbasis koordinat X,Y — disesuaikan dengan struktur
         * token PDF Request Order NOD yang SESUNGGUHNYA:
         *
         * Struktur token PDF:
         *   y= 94  x= 40   | 'Tanggal'            y= 94  x=119  | ': 14 Juni 2026'
         *   y=111  x= 40   | 'No. PO'              y=111  x=119  | ': OT-15062026-1'
         *   y=111  x=309   | 'Ship To'             y=111  x=388  | ': NOD Astha'
         *   y=128  x= 40   | 'Ordered By'          y=128  x=119  | ': Herfian Juliansyah'
         *   y=128  x=309   | 'Alamat'              y=128  x=388  | ': Jl. Panjang Arteri...'
         *   y=140  x=397   | 'RT.1/RW.3, ...'     ← lanjutan Alamat (TIDAK ADA label)
         *   y=145  x= 40   | 'Phone'               y=145  x=119  | ': 081212345678'
         *   y=151  x=397   | 'Jeruk, Kota ...'    ← lanjutan Alamat
         *   y=163  x=397   | 'Khusus Ibukota ...' ← lanjutan Alamat
         *   y=196  x=309   | 'Shipping Date'       y=196  x=388  | ': 16 Juni 2026'
         */
        function parseDOFromTokens(tokens) {
            const result = { noPO: '', orderedBy: '', phone: '', shipTo: '', alamat: '', shippingDate: '' };
            if (!tokens.length) return result;

            // ── 1. Kelompokkan per baris — Y bucket KECIL (4px) agar baris berdekatan
            //       tidak bercampur (misal y=140 dan y=145 harus beda bucket) ──
            const rowMap = new Map();
            for (const tk of tokens) {
                const bucket = Math.round(tk.y / 4) * 4;
                if (!rowMap.has(bucket)) rowMap.set(bucket, []);
                rowMap.get(bucket).push(tk);
            }
            const rows = Array.from(rowMap.entries())
                .sort((a, b) => a[0] - b[0])
                .map(([y, tks]) => ({ y, tokens: tks.sort((a, b) => a.x - b.x) }));

            // ── 2. LABEL_MAP: token label → key result ──
            const LABEL_MAP = {
                'No. PO': 'noPO',
                'No.PO': 'noPO',
                'Ordered By': 'orderedBy',
                'Phone': 'phone',
                'Ship To': 'shipTo',
                'Alamat': 'alamat',
                'Shipping Date': 'shippingDate',
                'Tanggal': '_tanggal',
                'Kategori': '_kategori',
            };

            const stripColon = s => s.replace(/^\s*:\s*/, '').trim();

            let alamatRowY = -1;

            // ── 3. Pass pertama: scan setiap baris, pasangkan label → nilai ──
            for (const row of rows) {
                let currentLabel = null;
                for (const tk of row.tokens) {
                    const s = tk.str;

                    // Token adalah label yang dikenal?
                    const key = LABEL_MAP[s];
                    if (key) {
                        currentLabel = key;
                        if (key === 'alamat') alamatRowY = row.y;
                        continue;
                    }

                    // Token adalah nilai (dimulai ':') → pasangkan ke label aktif
                    if (s.startsWith(':') && currentLabel) {
                        const val = stripColon(s);
                        if (val && !result[currentLabel] && !currentLabel.startsWith('_')) {
                            result[currentLabel] = val;
                        }
                        currentLabel = null;
                        continue;
                    }

                    // Nilai tanpa ':' (fallback untuk format berbeda)
                    if (currentLabel && !s.startsWith(':') && !LABEL_MAP[s]) {
                        const looksLikeValue = /\d/.test(s) || /[,.\-\/]/.test(s);
                        if (looksLikeValue && !result[currentLabel] && !currentLabel.startsWith('_')) {
                            result[currentLabel] = s;
                        }
                        currentLabel = null;
                    }
                }
            }

            // ── 4. Kumpulkan baris lanjutan Alamat ──
            // Lanjutan Alamat = baris di BAWAH baris Alamat pertama,
            // token berada di kolom KANAN (x > 280), TIDAK dimulai ':'
            // BERHENTI di baris tabel item (ada token "No" + "Item"/"Qty")
            if (alamatRowY >= 0) {
                // Cari Y tabel item
                let tableY = 9999;
                for (const row of rows) {
                    const texts = row.tokens.map(t => t.str);
                    if (texts.some(t => /^No\.?$/i.test(t)) && texts.some(t => /^(Item|Qty)$/i.test(t))) {
                        tableY = row.y;
                        break;
                    }
                }

                for (const row of rows) {
                    if (row.y <= alamatRowY) continue;   // hanya baris DI BAWAH Alamat
                    if (row.y >= tableY) break;        // stop di tabel item

                    // Ambil token kolom kanan yang BUKAN label dan BUKAN nilai ber-':'
                    const rightTokens = row.tokens.filter(tk =>
                        tk.x > 280 &&
                        !tk.str.startsWith(':') &&
                        !LABEL_MAP[tk.str]
                    );
                    if (rightTokens.length > 0) {
                        const cont = rightTokens.map(t => t.str).join(' ').trim();
                        if (cont.length > 2) {
                            result.alamat = (result.alamat + ' ' + cont).trim();
                        }
                    }
                }
            }

            // ── 5. Fallback No. PO dari header jika belum terisi ──
            if (!result.noPO) {
                // Cari token seperti "No. PO: OT-15062026-1" dalam satu string
                for (const row of rows) {
                    for (const tk of row.tokens) {
                        const m = tk.str.match(/No\.?\s*PO\s*[:\-]\s*([A-Z0-9\-\/]+)/i);
                        if (m) { result.noPO = m[1]; break; }
                    }
                    if (result.noPO) break;
                }
            }
            if (!result.noPO) {
                const allText = rows.flatMap(r => r.tokens.map(t => t.str)).join(' ');
                const m = allText.match(/\b([A-Z]{1,5}-\d{5,}[-\d]*)\b/);
                if (m) result.noPO = m[1];
            }

            // ── 6. Bersihkan ──
            if (result.noPO) result.noPO = result.noPO.split(/\s+/)[0];
            if (result.phone) result.phone = result.phone.replace(/[^\d+]/g, '');
            if (result.shippingDate) result.shippingDate = _parseShippingDateToInput(result.shippingDate);
            if (result.alamat) result.alamat = result.alamat.replace(/\s*(?:Shipping\s*Date|Phone|Telp)\s*:.*/i, '').trim();

            return result;
        }

        /** Cek apakah string kemungkinan adalah nilai (bukan label) */
        function val_looks_like_value(s) {
            return /\d/.test(s) || /[,.\-\/]/.test(s) || s.split(/\s+/).length > 3;
        }

            const shipTo = document.getElementById('do-ship-to')?.value?.trim();

            if (!shipTo) missing.push('Ship To');
            if (!shippingDate) missing.push('Shipping Date');
            if (!alamat) missing.push('Alamat');
            if (!phone) missing.push('Phone');
            if (!namaDriver) missing.push('Nama Driver');

            if (missing.length > 0) {
                showAlert('warning', 'Data Belum Lengkap', `Field berikut masih kosong: ${missing.join(', ')}`);

            }

            const ok = await showConfirm(
                'Konfirmasi Selesai Pengantaran?',

            }

            const payload = {
                action: 'deliveryDone',
                token: sessionToken,
                noPO,
                orderedBy,
                shipTo,
                shippingDate,
                alamat,
                phone,
                tglKonfirmasi,
                driver: namaDriver

                    method: 'POST',

                        rowEl.classList.add('bg-green-50', 'opacity-70');

                    showAlert('success', '✅ Pengantaran Selesai!',
                        `PO <b>${noPO}</b> berhasil dicatat ke Delivery_Log.<br>Status PO_Data & Report Status telah diubah menjadi <b>Done</b>.`);

                    // Reset form setelah sukses
                    setTimeout(() => {
                        document.getElementById('do-no-po').value = '';
                        document.getElementById('do-ordered-by').value = '';
                        document.getElementById('do-ship-to').value = '';
                        document.getElementById('do-shipping-date').value = '';
                        document.getElementById('do-alamat').value = '';
                        document.getElementById('do-phone').value = '';
                        document.getElementById('do-nama-driver').value = '';
                        document.getElementById('do-manual-po').value = '';
                        const pdfIn = document.getElementById('do-pdf-file');
                        if (pdfIn) pdfIn.value = '';
                        const st = document.getElementById('do-scan-status');
                        if (st) { st.textContent = 'Tekan tombol di atas untuk membuka kamera dan scan QR Code dari lembar Request Order'; st.className = 'text-xs text-center text-gray-400 mb-4 italic'; }
                    }, 1200);
                } else {

                }

                showAlert('error', 'Terjadi Kesalahan', 'Tidak dapat terhubung ke server: ' + err.message);

                if (btn) { btn.disabled = false; btn.innerHTML = origHTML; }
            }
        }

        async function showPlanTask() {
            setLoading();

            try {

                const data = await response.json();
                const taskData = data.slice(1).filter(row =>
                    row[0] && !row[0].toString().includes('Tidak ada tugas aktif') && row[0] !== ''
                );

                if (taskData.length === 0) {
                    contentArea.innerHTML = `
                    <h1 class="text-3xl font-semibold text-gray-700 mb-6">Plan Task</h1>
                    <div class="flex flex-col items-center justify-center h-64 bg-white rounded-lg border border-gray-300 shadow-sm">
                        <p class="text-4xl mb-4">✅</p>
                        <p class="text-xl font-bold text-gray-600">Task Clear</p>
                        <p class="text-gray-400">Tidak ada tugas yang perlu dikerjakan saat ini.</p>
                    </div>`;
                    return;
                }

                function formatDeadline(cell) {
                    const raw = String(cell).trim();
                    if (!raw.includes('T')) return raw;
                    const date = new Date(raw.split('T')[0]);
                    date.setDate(date.getDate() + 1);
                    const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
                    return `${String(date.getDate()).padStart(2, '0')}-${months[date.getMonth()]}-${date.getFullYear()}`;
                }

                let rows_html = '';
                taskData.forEach(row => {
                    rows_html += '<tr class="hover:bg-gray-50 text-xs">';
                    row.forEach((cell, index) => {
                        let value = String(cell || '-').trim();
                        if (index === 0 || index === 2) {
                            value = value.split('\n').map(t => t.replace(/^- /, '').trim()).filter(t => t !== '').join('<br>');
                        } else if (index === 1) {
                            value = formatDeadline(cell);
                        } else if (index === 4) {
                            const statuses = value.split('\n').map(s => s.replace(/^- /, '').trim()).filter(s => s !== '' && s !== '-');
                            value = [...new Set(statuses)].join('<br>');
                        }
                        const extra = index === 1 ? 'whitespace-nowrap' : '';
                        rows_html += `<td class="p-3 border-r border-gray-200 text-center ${extra}">${value}</td>`;
                    });
                    rows_html += '</tr>';
                });

                contentArea.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-semibold text-gray-700">Task</h1>
                    <button id="shareBtn" onclick="shareToWhatsApp()"

                        Share to WhatsApp
                    </button>
                </div>

                    <h1 class="text-3xl font-semibold text-gray-700 mb-6">Plan Task</h1>
                    <div class="rounded-lg shadow-sm border border-gray-300 overflow-hidden">
                        <table class="w-full border-collapse">
                            <thead>
                                <tr class="bg-gray-100 border-b border-gray-300 text-gray-700 text-xs">
                                    ${data[0].map(h => `<th class="p-3 text-center border-r">${h}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody class="text-gray-600 divide-y divide-gray-200">${rows_html}</tbody>
                        </table>
                    </div>
                </div>`;
            } catch (err) { setError(err.message); }
        }
